function parseSkuUnit(sku) {
  // "10kg/포대" → { perUnit: 10, unitName: '포대', raw: 'kg' }
  // "18L/통"   → { perUnit: 18, unitName: '통', raw: 'L' }
  // "30알/판"  → { perUnit: 1.5, unitName: '판', raw: '알', isEgg: true }  (30알=1.5kg)
  const m = sku?.match(/^(\d+)(kg|L|알)\/(통|판|포대|봉)/);
  if (!m) return null;
  const num = parseFloat(m[1]);
  const raw = m[2];
  const unitName = m[3];
  if (raw === '알') return { perUnit: num * 0.05, unitName, raw, isEgg: true, eggPerTray: num };
  if (raw === 'L') return { perUnit: num, unitName, raw };
  return { perUnit: num, unitName, raw };
}

function updateReceiveUnit() {
  const sel = $id('rcv-item');
  const opt = sel?.selectedOptions[0];
  const sku = opt?.dataset?.sku || '';
  const parsed = parseSkuUnit(sku);

  // SKU 단위 뱃지 업데이트
  const unitEl = $id('rcv-sku-unit');
  if (unitEl) unitEl.textContent = parsed ? parsed.unitName : 'kg';

  // hidden unit 값 세팅
  const unitInput = $id('rcv-unit');
  if (unitInput) unitInput.value = parsed ? parsed.unitName : 'kg';

  // 변환 정보 초기화
  updateReceiveConvert();

  // 소비기한·보관온도 자동 세팅
  const type = $id('rcv-type')?.value;
  const code = sel?.value;
  const items = type === '원재료' ? (window._rcvRmItems || []) : (window._rcvSpItems || []);
  const item = items.find(i => i[0] === code);
  if (item) {
    const days = parseInt(item[7]) || 90;
    $id('rcv-exp').value = formatDate(new Date(Date.now() + days * 86400000));
    const temp = item[8] || '상온 15~25℃';
    const tempSel = $id('rcv-temp');
    if (tempSel) {
      for (const o of tempSel.options) { if (o.value === temp) { tempSel.value = temp; break; } }
    }
  }
}

function updateReceiveConvert() {
  const sel = $id('rcv-item');
  const opt = sel?.selectedOptions[0];
  const sku = opt?.dataset?.sku || '';
  const parsed = parseSkuUnit(sku);
  const qty = parseInt($id('rcv-qty')?.value) || 0;
  const infoEl = $id('rcv-convert-info');
  const indivEl = $id('rcv-indiv-count');

  if (!parsed || qty <= 0) {
    if (infoEl) infoEl.style.display = 'none';
    if (indivEl) indivEl.value = qty > 0 ? qty : 1;
    return;
  }

  const totalKg = Math.round(qty * parsed.perUnit * 100) / 100;
  const icon = parsed.isEgg ? '🥚' : parsed.raw === 'L' ? '🛢️' : '📦';
  const perLabel = parsed.isEgg ? parsed.perUnit + 'kg(' + parsed.eggPerTray + '알)' : parsed.perUnit + 'kg';

  if (infoEl) {
    infoEl.style.display = '';
    infoEl.innerHTML = `${icon} <strong>${qty}${parsed.unitName}</strong> × ${perLabel} = <strong style="font-size:13px">${totalKg}kg</strong> 저장 · QR 라벨 <strong>${qty}</strong>매 자동 생성`;
  }
  if (indivEl) indivEl.value = qty;
}

// previewReceivePhoto 삭제됨 — 입고 사진 기능 제거

async function submitReceiving() {
  if (!acquireLock('submitReceiving')) return;
  const submitBtn = document.querySelector('button[onclick="submitReceiving()"]');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '등록 처리 중...'; }

  const type = $id('rcv-type')?.value;
  const itemCode = $id('rcv-item')?.value;
  const itemName = $id('rcv-item')?.selectedOptions[0]?.textContent?.split(' ').slice(1).join(' ') || '';
  const sku = $id('rcv-item')?.selectedOptions[0]?.dataset?.sku || '';
  const supplier = $id('rcv-supplier')?.value;
  const inputQty = parseFloat($id('rcv-qty')?.value) || 0;
  const exp = $id('rcv-exp')?.value;
  const temp = $id('rcv-temp')?.value;
  // SKU → kg 변환
  const parsed = parseSkuUnit(sku);
  const qtyKg = parsed ? Math.round(inputQty * parsed.perUnit * 100) / 100 : inputQty;
  const unit = 'kg';
  const indivCount = parsed ? inputQty : (parseInt($id('rcv-indiv-count')?.value) || 1);
  const qty = String(qtyKg);

  // 필수 필드 검증
  const missing = [];
  if (!itemCode) missing.push('품목');
  if (!supplier?.trim()) missing.push('공급업체');
  if (!inputQty || inputQty <= 0) missing.push('수량');
  if (!exp) missing.push('소비기한');
  if (missing.length > 0) {
    toast('미입력 항목: ' + missing.join(', '), 'err');
    releaseLock('submitReceiving');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '입고 등록 + QR 생성'; }
    return;
  }

  try {
    showLoading();

    let photoUrl = '';

    // Generate IDs — 새 포맷: [대분류]-[품목번호]-[입고일]-[사용기한]-[입고순번]
    const prefix = type === '원재료' ? 'RM' : 'SP';
    const rcvId = await generateSeqId('RCV', '입고기록');
    const lotId = await generateLotId(prefix, itemCode, exp, type === '원재료' ? '원재료LOT' : '소모품LOT');

    // 1. Append to 입고기록
    await SheetsAPI.append('입고기록', [
      rcvId, type, supplier, itemCode, itemName, lotId, qty, unit, formatDateTime(), State.user?.email, '완료', photoUrl
    ]);

    // 2. Append to LOT tab
    const lotTab = type === '원재료' ? '원재료LOT' : '소모품LOT';
    if (type === '원재료') {
      await SheetsAPI.append(lotTab, [
        lotId, itemCode, itemName, supplier, qty, unit, formatDate(), exp, qty, '미사용', indivCount, temp
      ]);
    } else {
      await SheetsAPI.append(lotTab, [
        lotId, itemCode, itemName, qty, unit, formatDate(), qty, '미사용'
      ]);
    }

    // 3. Generate individual QR records + QR 이미지 수식
    if (type === '원재료') {
      const perUnit = parseFloat(qty) / indivCount;
      const indivRows = [];
      for (let i = 1; i <= indivCount; i++) {
        const indivId = `${lotId}-${String(i).padStart(2, '0')}`;
        // 컬럼: [개별ID, LOT ID, 품목코드, 상태, 수량, 비고, QR이미지]
        const rowNum = ''; // placeholder — IMAGE 수식은 아래에서 별도 처리
        indivRows.push([indivId, lotId, itemCode, '미사용', String(perUnit), '', qrImageUrl(indivId)]);
      }
      await SheetsAPI.append('원재료개별', indivRows);
    }

    toast(`입고 등록 완료! QR ${indivCount}개 생성`, 'suc');

    // Offer label print
    confirm('라벨 인쇄', `QR 라벨 ${indivCount}매를 인쇄하시겠습니까?`, () => {
      Router.go('label-print', { lotId, count: indivCount, itemName, type: 'rm' });
    }, () => {
      Router.go('inventory');
    });

  } catch (e) {
    toast('입고 등록 실패: ' + e.message, 'err');
  } finally {
    hideLoading();
    releaseLock('submitReceiving');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '입고 등록 + QR 생성'; }
  }
}

async function stopQRScan() {
  if (window._qrScanner) {
    try { await window._qrScanner.stop(); } catch(e) {}
    try { window._qrScanner.clear(); } catch(e) {}
    window._qrScanner = null;
  }
}

async function onQRScanSuccess(decodedText) {
  stopQRScan();
  const resultEl = $id('qr-result');
  resultEl.innerHTML = `<div class="spinner" style="margin:0 auto"></div>`;

  try {
    // QR 형식 검증: RM-, FG-, SP- 접두어 확인
    const id = decodedText.trim();
    if (!id.match(/^(RM|FG|SP)-/)) {
      resultEl.innerHTML = `
        <div class="fs-14 fw-7 mb-8">스캔 결과</div>
        <div class="c-err fs-13">유효하지 않은 QR 형식입니다</div>
        <div class="fs-11 c-txt-l mt-4">QR 코드는 RM-, FG-, SP-로 시작해야 합니다</div>
        <div class="fs-11 c-txt-l mt-2">인식된 값: ${id.substring(0, 50)}</div>
        <button class="btn btn-info btn-full mt-12" onclick="Router.go('qr-scan')">다시 스캔</button>
      `;
      return;
    }
    let data = null, type = '';

    if (id.startsWith('RM-')) {
      type = '원재료';
      const indivs = await SheetsAPI.getAll('원재료개별');
      const indiv = indivs.find(r => r[0] === id);
      if (indiv) {
        const lots = await SheetsAPI.getAll('원재료LOT');
        const lot = lots.find(l => l[0] === indiv[1]);
        data = { id, lotId: indiv[1], itemName: lot?.[2] || '', remain: indiv[4], status: indiv[3], exp: lot?.[7] || '' };
      }
    } else if (id.startsWith('FG-')) {
      type = '완제품';
      const indivs = await SheetsAPI.getAll('완제품개별');
      const indiv = indivs.find(r => r[0] === id);
      if (indiv) {
        const lots = await SheetsAPI.getAll('완제품LOT');
        const lot = lots.find(l => l[0] === indiv[1]);
        data = { id, lotId: indiv[1], itemName: lot?.[2] || '', status: indiv[3], exp: lot?.[6] || '' };
      }
    } else if (id.startsWith('SP-')) {
      type = '소모품';
      const lots = await SheetsAPI.getAll('소모품LOT');
      const lot = lots.find(l => l[0] === id);
      if (lot) {
        data = { id, lotId: id, itemName: lot[2] || '', remain: lot[6], status: lot[7] };
      }
    }

    if (!data) {
      resultEl.innerHTML = `
        <div class="fs-14 fw-7 mb-8">스캔 결과</div>
        <div class="c-err fs-13">인식할 수 없는 QR: ${id}</div>
        <button class="btn btn-info btn-full mt-12" onclick="Router.go('qr-scan')">다시 스캔</button>
      `;
      return;
    }

    // 완제품: 출하 가능 여부 체크 (냉동 12h 이상)
    let shipBtn = '';
    if (type === '완제품') {
      const fgStatus = data.status || '';
      const canShip = fgStatus === '출하가능';
      if (canShip) {
        shipBtn = `<button class="btn btn-suc flex-1" onclick="processShipment('${data.id}','${data.lotId}','${data.itemName}')">출하처리</button>`;
      } else if (fgStatus === '냉동보관중') {
        shipBtn = `<button class="btn btn-gray flex-1" disabled>출하불가 (냉동보관중)</button>`;
      } else {
        shipBtn = `<button class="btn btn-suc flex-1" onclick="processShipment('${data.id}','${data.lotId}','${data.itemName}')">출하처리</button>`;
      }
    }

    resultEl.innerHTML = `
      <div class="fs-14 fw-7 mb-8">스캔 결과</div>
      <div class="card bl-info">
        <div class="lot-id" style="font-size:13px">${data.id}</div>
        <div class="fs-12 c-txt-l mt-4">${data.itemName} · ${data.remain ? data.remain + 'kg' : ''} · 소비기한 ${(data.exp||'').substring(0,10)}</div>
        <div class="fs-11 ${data.status === '냉동보관중' ? 'c-warn' : 'c-suc'} mt-4">상태: ${data.status || '냉동보관중'}</div>
      </div>
      <div class="row mt-12" style="gap:8px">
        ${shipBtn}
        <button class="btn btn-outline btn-err flex-1" onclick="processDisposal('${data.id}','${data.lotId||''}','${type}','${data.itemName}')">폐기</button>
      </div>
      ${type !== '완제품' ? '<div class="fs-11 c-txt-l" style="text-align:center;margin-top:8px">* 생산 투입은 작업지시서 공정에서만 가능합니다</div>' : ''}
      <button class="btn btn-outline btn-gray btn-full mt-8" onclick="Router.go('qr-scan')">다시 스캔</button>
    `;

  } catch (e) {
    resultEl.innerHTML = `<div class="c-err fs-13">조회 실패: ${e.message}</div>
    <button class="btn btn-info btn-full mt-12" onclick="Router.go('qr-scan')">다시 스캔</button>`;
  }
}

  }
};

function getSavedPrinter() {
  return localStorage.getItem('mt_printer') || 'slp-dx220';
}
function savePrinterSetting(key) {
  localStorage.setItem('mt_printer', key);
}
function getLabelSize() {
  // SLP-DX220 고정 사이즈: 60×40mm (프린터 설정 UI 제거됨)
  return { w: 60, h: 40 };
}
function saveLabelSize(w, h) {
  localStorage.setItem('mt_label_size', JSON.stringify({ w, h }));
}

function applyPrintCSS() {
  const pk = getSavedPrinter();
  const preset = PRINTER_PRESETS[pk] || PRINTER_PRESETS['slp-dx220'];
  const sz = getLabelSize();
  const r = document.documentElement;
  r.style.setProperty('--lbl-w', sz.w + 'mm');
  r.style.setProperty('--lbl-h', sz.h + 'mm');
  r.style.setProperty('--qr-sz', preset.qrSz + 'mm');
  r.style.setProperty('--lbl-fs', preset.lblFs + 'pt');
  r.style.setProperty('--lbl-txt-w', (sz.w - preset.qrSz - preset.lblGap - 4) + 'mm');
  r.style.setProperty('--lbl-gap', preset.lblGap + 'mm');
  r.style.setProperty('--lbl-pad', preset.lblPad);
}

function onPrinterChange() {
  const pk = $id('sel-printer')?.value || 'slp-dx220';
  savePrinterSetting(pk);
  const preset = PRINTER_PRESETS[pk];
  // 라벨 사이즈도 프리셋으로 리셋
  if ($id('lbl-w-input')) $id('lbl-w-input').value = preset.lblW;
  if ($id('lbl-h-input')) $id('lbl-h-input').value = preset.lblH;
  saveLabelSize(preset.lblW, preset.lblH);
  // 팁 업데이트
  if ($id('printer-tips')) $id('printer-tips').innerHTML = preset.tips;
  // 커스텀 필드 표시
  const customRow = $id('custom-size-row');
  if (customRow) customRow.style.display = pk === 'custom' ? 'flex' : 'none';
  applyPrintCSS();
}

function onLabelSizeChange() {
  const w = parseInt($id('lbl-w-input')?.value) || 50;
  const h = parseInt($id('lbl-h-input')?.value) || 30;
  saveLabelSize(w, h);
  applyPrintCSS();
}

}

// ── 재고 기반 드릴다운: Step 1 - 품목 리스트 ──
async function loadReprintStock() {
  const area = $id('reprint-stock-area');
  if (!area) return;
  area.innerHTML = '<div class="loading-inline"><div class="spinner-s"></div> 재고 조회 중...</div>';

  try {
    // 원재료/완제품/소모품 LOT 시트에서 잔량 > 0 인 품목 집계
    const [rmLots, fgLots, spLots] = await Promise.all([
      SheetsAPI.getAll('원재료LOT').catch(() => []),
      SheetsAPI.getAll('완제품LOT').catch(() => []),
      SheetsAPI.getAll('소모품LOT').catch(() => []),
    ]);

    // 캐시에 저장 (LOT 선택 단계에서 재사용)
    window._reprintCache = { rmLots, fgLots, spLots };

    // 품목별 집계: { code: { name, type, totalStock, lotCount } }
    const items = {};

    rmLots.forEach(l => {
      const remain = parseFloat(l[8]) || 0;
      if (remain <= 0) return;
      const key = `rm:${l[1]}`;
      if (!items[key]) items[key] = { code: l[1], name: l[2], type: 'rm', typeLabel: '원재료', totalStock: 0, lotCount: 0, unit: l[5] || 'kg' };
      items[key].totalStock += remain;
      items[key].lotCount++;
    });

    fgLots.forEach(l => {
      const remain = parseFloat(l[7]) || 0;
      if (remain <= 0) return;
      const key = `fg:${l[1]}`;
      if (!items[key]) items[key] = { code: l[1], name: l[2], type: 'fg', typeLabel: '완제품', totalStock: 0, lotCount: 0, unit: l[4] || 'ea' };
      items[key].totalStock += remain;
      items[key].lotCount++;
    });

    spLots.forEach(l => {
      const remain = parseFloat(l[6]) || 0;
      if (remain <= 0) return;
      const key = `sp:${l[1]}`;
      if (!items[key]) items[key] = { code: l[1], name: l[2], type: 'sp', typeLabel: '소모품', totalStock: 0, lotCount: 0, unit: l[4] || '' };
      items[key].totalStock += remain;
      items[key].lotCount++;
    });

    const itemList = Object.values(items);
    if (itemList.length === 0) {
      area.innerHTML = '<div class="empty-state"><div class="es-icon">📭</div><div class="es-title">재고 없음</div><div class="es-desc">현재 잔량이 있는 LOT가 없습니다</div></div>';
      return;
    }

    // 유형 뱃지 색상
    const typeBg = { rm: 'var(--pri-bg)', fg: 'var(--suc-bg)', sp: '#fff8e1' };
    const typeColor = { rm: 'var(--pri)', fg: 'var(--suc)', sp: '#f57f17' };

    area.innerHTML = `
      <div class="fs-11 c-txt-l mb-8">품목을 선택하면 해당 LOT와 개별 제품을 확인할 수 있습니다</div>
      ${itemList.map(it => `
        <div class="card" style="cursor:pointer;border:1px solid var(--gray-l);transition:all .15s"
             onclick="loadReprintLots('${it.type}','${it.code}','${it.name}')"
             onmousedown="this.style.transform='scale(.98)'" onmouseup="this.style.transform=''">
          <div class="row between" style="align-items:center">
            <div>
              <span class="badge" style="background:${typeBg[it.type]};color:${typeColor[it.type]};font-size:10px">${it.typeLabel}</span>
              <span class="fw-6 fs-13 ml-4">${it.name}</span>
              <span class="fs-11 c-txt-l ml-4">${it.code}</span>
            </div>
            <div style="text-align:right">
              <div class="fw-7 fs-13">${it.totalStock}${it.unit}</div>
              <div class="fs-10 c-txt-l">LOT ${it.lotCount}건</div>
            </div>
          </div>
        </div>
      `).join('')}
    `;
  } catch (e) {
    area.innerHTML = `<div class="card" style="color:var(--err)">재고 조회 실패: ${e.message}</div>`;
  }
}

// ── Step 2 - 선택한 품목의 LOT 리스트 ──
async function loadReprintLots(type, itemCode, itemName) {
  const area = $id('reprint-stock-area');
  area.innerHTML = '<div class="loading-inline"><div class="spinner-s"></div> LOT 조회 중...</div>';

  try {
    const cache = window._reprintCache || {};
    let lots = [];
    if (type === 'rm') lots = (cache.rmLots || await SheetsAPI.getAll('원재료LOT')).filter(l => l[1] === itemCode && (parseFloat(l[8]) || 0) > 0);
    else if (type === 'fg') lots = (cache.fgLots || await SheetsAPI.getAll('완제품LOT')).filter(l => l[1] === itemCode && (parseFloat(l[7]) || 0) > 0);
    else if (type === 'sp') lots = (cache.spLots || await SheetsAPI.getAll('소모품LOT')).filter(l => l[1] === itemCode && (parseFloat(l[6]) || 0) > 0);

    area.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button class="btn btn-out" onclick="loadReprintStock()" style="padding:6px 10px;font-size:12px">← 품목목록</button>
        <div class="fw-7 fs-13">${itemName}</div>
        <span class="fs-11 c-txt-l">${itemCode}</span>
      </div>
      ${lots.length === 0 ? '<div class="fs-12 c-txt-l">잔량이 있는 LOT가 없습니다</div>' : lots.map(l => {
        const lotId = l[0];
        const remain = type === 'rm' ? l[8] : type === 'fg' ? l[7] : l[6];
        const unit = type === 'rm' ? (l[5]||'kg') : type === 'fg' ? (l[4]||'ea') : (l[4]||'');
        const exp = type === 'rm' ? (l[7]||'') : type === 'fg' ? (l[6]||'') : '';
        const indivCnt = type === 'rm' ? (l[10]||'') : '';
        const date = type === 'rm' ? (l[6]||'') : (l[5]||'');
        return `
          <div class="card" style="cursor:pointer;border:1px solid var(--gray-l);transition:all .15s"
               onclick="loadReprintIndivs('${type}','${lotId}','${itemName}')"
               onmousedown="this.style.transform='scale(.98)'" onmouseup="this.style.transform=''">
            <div class="row between" style="align-items:center">
              <div>
                <div class="fw-6 fs-13">${lotId}</div>
                <div class="fs-11 c-txt-l">${date ? '입고: '+date : ''}${exp ? ' · EXP: '+exp : ''}${indivCnt ? ' · 개별 '+indivCnt+'개' : ''}</div>
              </div>
              <div class="fw-7 fs-14" style="color:var(--pri)">${remain}${unit}</div>
            </div>
          </div>
        `;
      }).join('')}
    `;
  } catch (e) {
    area.innerHTML = `<div class="card" style="color:var(--err)">LOT 조회 실패: ${e.message}<br><button class="btn btn-out mt-8" onclick="loadReprintStock()">← 돌아가기</button></div>`;
  }
}

// ── Step 3 - 선택한 LOT의 개별 제품 리스트 (체크박스 선택) ──
async function loadReprintIndivs(type, lotId, itemName) {
  const area = $id('reprint-stock-area');
  area.innerHTML = '<div class="loading-inline"><div class="spinner-s"></div> 개별 제품 조회 중...</div>';

  try {
    const tabMap = { rm: '원재료개별', fg: '완제품개별', sp: '소모품개별' };
    const lotTabMap = { rm: '원재료LOT', fg: '완제품LOT', sp: '소모품LOT' };
    const allIndivs = await SheetsAPI.getAll(tabMap[type]).catch(() => []);
    const indivs = allIndivs.filter(r => r[1] === lotId);

    // LOT 정보도 가져와서 라벨에 활용
    const cache = window._reprintCache || {};
    let lotRow = null;
    if (type === 'rm') lotRow = (cache.rmLots || []).find(l => l[0] === lotId);
    else if (type === 'fg') lotRow = (cache.fgLots || []).find(l => l[0] === lotId);
    else if (type === 'sp') lotRow = (cache.spLots || []).find(l => l[0] === lotId);
    if (!lotRow) {
      const lotData = await SheetsAPI.getAll(lotTabMap[type]).catch(() => []);
      lotRow = lotData.find(l => l[0] === lotId);
    }

    // 캐시에 LOT 정보 저장
    window._reprintLotRow = lotRow;
    window._reprintType = type;

    const statusBadge = (s) => {
      const map = { '미사용': { bg: 'var(--suc-bg)', c: 'var(--suc)' }, '사용중': { bg: 'var(--pri-bg)', c: 'var(--pri)' }, '소진': { bg: '#f5f5f5', c: 'var(--gray)' } };
      const st = map[s] || map['미사용'];
      return `<span class="badge" style="background:${st.bg};color:${st.c};font-size:10px">${s || '미사용'}</span>`;
    };

    // 개별제품 컬럼: [0]=개별ID, [1]=LOT ID, [2]=품목코드, [3]=상태, [4]=수량, [5]=비고
    area.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <button class="btn btn-out" onclick="loadReprintLots('${type}','${lotRow?.[1]||''}','${itemName}')" style="padding:6px 10px;font-size:12px">← LOT목록</button>
        <div class="fw-7 fs-13">${itemName}</div>
      </div>
      <div class="fs-12 c-txt-l mb-8">${lotId} · 개별 ${indivs.length}건</div>

      ${indivs.length === 0 ? '<div class="fs-12 c-txt-l">개별 제품이 없습니다</div>' : `
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn btn-out" onclick="toggleReprintAll(true)" style="flex:1;font-size:12px">전체 선택</button>
          <button class="btn btn-out" onclick="toggleReprintAll(false)" style="flex:1;font-size:12px">전체 해제</button>
        </div>
        <div id="reprint-indiv-list" style="max-height:300px;overflow-y:auto">
          ${indivs.map((ind, i) => `
            <label class="card" style="display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid var(--gray-l);padding:10px 12px;margin-bottom:4px">
              <input type="checkbox" class="reprint-chk" value="${ind[0]}" data-idx="${i}" style="width:20px;height:20px;accent-color:var(--pri)">
              <div style="flex:1;min-width:0">
                <div class="fw-6 fs-12" style="word-break:break-all">${ind[0]}</div>
                <div class="fs-11 c-txt-l">${ind[4] ? ind[4] + (type==='rm'?(lotRow?.[5]||'kg'):'') : ''} ${statusBadge(ind[3])}</div>
              </div>
            </label>
          `).join('')}
        </div>
        <div class="mt-12" style="display:flex;gap:8px">
          <button class="btn btn-pri btn-full" onclick="generateReprintSelected('${type}','${lotId}','${itemName}')">
            선택 항목 라벨 생성
          </button>
        </div>
      `}
    `;
  } catch (e) {
    area.innerHTML = `<div class="card" style="color:var(--err)">개별 제품 조회 실패: ${e.message}<br><button class="btn btn-out mt-8" onclick="loadReprintStock()">← 처음으로</button></div>`;
  }
}

function toggleReprintAll(checked) {
  document.querySelectorAll('.reprint-chk').forEach(cb => cb.checked = checked);
}

// ── Step 4 - 선택된 개별 제품으로 라벨 생성 ──
function generateReprintSelected(type, lotId, itemName) {
  const checked = [...document.querySelectorAll('.reprint-chk:checked')];
  if (checked.length === 0) { toast('라벨을 출력할 제품을 선택하세요', 'warn'); return; }

  const lotRow = window._reprintLotRow;
  const labels = checked.map(cb => {
    const indivId = cb.value;
    let exp = '', storage = '', date = '', qty = '', unit = '';

    if (type === 'rm' && lotRow) {
      date = lotRow[6] || formatDate();
      exp = lotRow[7] ? `EXP: ${lotRow[7]}` : '';
      storage = lotRow[11] ? `보관: ${lotRow[11]}` : '';
      unit = lotRow[5] || 'kg';
    } else if (type === 'fg' && lotRow) {
      date = lotRow[5] || formatDate();
      exp = lotRow[6] ? `EXP: ${lotRow[6]}` : '';
    } else if (type === 'sp' && lotRow) {
      date = lotRow[5] || formatDate();
      unit = lotRow[4] || '';
    }

    // 개별 수량은 체크박스 부모에서 가져옴
    const parentLabel = cb.closest('label');
    const qtyText = parentLabel?.querySelector('.fs-11')?.textContent?.trim() || '';

    return { indivId, itemName, date, exp, storage, lotId, qty: '' };
  });

  renderLabelCards(labels);
  toast(`${labels.length}매 라벨 미리보기가 생성되었습니다`, 'suc');
}

// ── LOT 일괄 발행 (기존 로직 개선) ──
async function generateLabelsLot() {
  const lotId = $id('lbl-lot')?.value?.trim();
  const count = parseInt($id('lbl-count')?.value) || 1;
  if (!lotId) { toast('LOT 번호를 입력하세요', 'err'); return; }

  let itemNameVal = $id('lbl-item-name')?.value?.trim();
  let expDate = '', storageTemp = '', unit = 'kg';

  // 시트에서 LOT 정보 자동조회 (소비기한·보관온도는 항상 조회)
  showLoading();
  try {
    let lots = [];
    if (lotId.startsWith('RM-')) lots = await SheetsAPI.getAll('원재료LOT').catch(() => []);
    else if (lotId.startsWith('FG-')) lots = await SheetsAPI.getAll('완제품LOT').catch(() => []);
    else if (lotId.startsWith('SP-')) lots = await SheetsAPI.getAll('소모품LOT').catch(() => []);
    const lot = lots.find(l => l[0] === lotId);
    if (lot) {
      if (!itemNameVal) itemNameVal = lot[2] || '품목명 미확인';
      if (lotId.startsWith('RM-')) { expDate = lot[7] || ''; storageTemp = lot[11] || ''; unit = lot[5] || 'kg'; }
      else if (lotId.startsWith('FG-')) { expDate = lot[6] || ''; }
      $id('lbl-item-name').value = itemNameVal;
    }
  } catch(e) { console.warn(e); }
  hideLoading();
  if (!itemNameVal) itemNameVal = '품목명 미확인';

  const isFGLot = lotId.startsWith('FG-');
  renderLabelCards(
    Array.from({length: count}, (_, i) => ({
      indivId: `${lotId}-${String(i + 1).padStart(2, '0')}`,
      itemName: itemNameVal,
      lotId: isFGLot ? '' : lotId,
      date: isFGLot ? `생산날짜: ${formatDate()}` : formatDate(),
      exp: expDate ? (isFGLot ? `소비기한: ${expDate}까지` : `EXP: ${expDate}`) : '',
      storage: storageTemp ? (isFGLot ? `보관: ${storageTemp} 이하` : `보관: ${storageTemp}`) : '',
      company: isFGLot ? '' : undefined,
    }))
  );
}

// ── 개별 재프린트 (직접 ID 입력) ──
async function generateLabelsIndiv() {
  const raw = $id('lbl-indiv-id')?.value?.trim();
  if (!raw) { toast('개별 QR ID를 입력하세요', 'err'); return; }

  const ids = raw.split(/[,\n]+/).map(s => s.trim()).filter(Boolean);
  if (ids.length === 0) { toast('유효한 ID를 입력하세요', 'err'); return; }

  showLoading();
  const labels = [];

  try {
    const rmIndivs = ids.some(id => id.startsWith('RM-')) ? await SheetsAPI.getAll('원재료개별').catch(() => []) : [];
    const rmLots = ids.some(id => id.startsWith('RM-')) ? await SheetsAPI.getAll('원재료LOT').catch(() => []) : [];
    const fgIndivs = ids.some(id => id.startsWith('FG-')) ? await SheetsAPI.getAll('완제품개별').catch(() => []) : [];
    const fgLots = ids.some(id => id.startsWith('FG-')) ? await SheetsAPI.getAll('완제품LOT').catch(() => []) : [];
    const spIndivs = ids.some(id => id.startsWith('SP-')) ? await SheetsAPI.getAll('소모품개별').catch(() => []) : [];
    const spLots = ids.some(id => id.startsWith('SP-')) ? await SheetsAPI.getAll('소모품LOT').catch(() => []) : [];

    for (const qrId of ids) {
      let found = false;
      if (qrId.startsWith('RM-')) {
        const indiv = rmIndivs.find(r => r[0] === qrId);
        if (indiv) {
          const lot = rmLots.find(l => l[0] === indiv[1]);
          labels.push({ indivId: qrId, itemName: lot?.[2] || '원재료', date: lot?.[6] || formatDate(),
            exp: lot?.[7] ? `EXP: ${lot[7]}` : '', storage: lot?.[11] ? `보관: ${lot[11]}` : '', lotId: indiv[1] });
          found = true;
        }
      } else if (qrId.startsWith('FG-')) {
        const indiv = fgIndivs.find(r => r[0] === qrId);
        if (indiv) {
          const lot = fgLots.find(l => l[0] === indiv[1]);
          const fgDate = lot?.[5] || formatDate();
          const fgExp = lot?.[6] || '';
          const fgStorage = lot?.[11] || '냉동 -18°C';
          labels.push({ indivId: qrId, itemName: lot?.[2] || '완제품',
            date: `생산날짜: ${fgDate}`, exp: fgExp ? `소비기한: ${fgExp}까지` : '',
            storage: `보관: ${fgStorage} 이하`, lotId: '', company: '' });
          found = true;
        }
      } else if (qrId.startsWith('SP-')) {
        const indiv = spIndivs.find(r => r[0] === qrId);
        if (indiv) {
          const lot = spLots.find(l => l[0] === indiv[1]);
          labels.push({ indivId: qrId, itemName: lot?.[2] || '소모품', date: lot?.[5] || formatDate(),
            exp: '', storage: '', lotId: indiv[1] });
          found = true;
        }
      }
      if (!found) labels.push({ indivId: qrId, itemName: '⚠ 미등록 ID', date: '', exp: '', storage: '', lotId: '', error: true });
    }
  } catch (e) { toast('데이터 조회 실패: ' + e.message, 'err'); hideLoading(); return; }
  hideLoading();

  const errors = labels.filter(l => l.error);
  if (errors.length > 0) toast(`${errors.length}개 ID를 찾을 수 없습니다`, 'warn');
  const validLabels = labels.filter(l => !l.error);
  if (validLabels.length === 0) { toast('출력 가능한 라벨이 없습니다', 'err'); return; }
  renderLabelCards(validLabels);
}

// ── 공통 라벨 렌더링 ──
function renderLabelCards(labels) {
  const previewEl = $id('label-preview');
  const sz = getLabelSize();
  const pk = getSavedPrinter();
  const pName = (PRINTER_PRESETS[pk] || {}).name || '프린터';
  previewEl.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="fs-13 fw-7">라벨 미리보기 (${labels.length}매)</div>
      <div class="fs-11 c-txt-l">${sz.w}×${sz.h}mm · ${pName}</div>
    </div>`;
  const printArea = $id('print-area');
  printArea.innerHTML = '';

  labels.forEach((lb, i) => {
    const idx = i + 1;
    // ── 안전한 값 추출 (null/undefined 방어) ──
    const sId = (lb && lb.indivId) ? String(lb.indivId).trim() : '';
    const sName = (lb && lb.itemName) ? String(lb.itemName).trim() : '(품목명 없음)';
    const sLot = (lb && lb.lotId) ? String(lb.lotId).trim() : '';
    const sDate = (lb && lb.date) ? String(lb.date).trim() : '';
    const sExp = (lb && lb.exp) ? String(lb.exp).trim() : '';
    const sStor = (lb && lb.storage) ? String(lb.storage).trim() : '';
    const sComp = lb ? lb.company : '';

    // Preview card — 콤팩트 미리보기 (QR 왼쪽 | 정보 오른쪽)
    const card = document.createElement('div');
    card.style.cssText = 'position:relative;width:100%;border:1.5px solid var(--gray-l);border-radius:6px;display:flex;flex-direction:row;align-items:center;gap:6px;padding:5px 6px;margin-bottom:8px;background:#fff;overflow:hidden;box-sizing:border-box';
    card.innerHTML = `
      <div id="qr-preview-${idx}" style="width:62px;height:62px;min-width:62px;flex-shrink:0;overflow:hidden"></div>
      <div style="flex:1;min-width:0;overflow:hidden;line-height:1.25">
        <div style="font-size:12px;font-weight:700;word-break:keep-all;overflow-wrap:break-word">${sName}</div>
        ${sLot ? `<div style="font-size:10px;font-weight:600;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.5px">LOT: ${sLot}</div>` : ''}
        ${sDate ? `<div style="font-size:9px;font-weight:600;color:#666">${sDate}</div>` : ''}
        ${sExp ? `<div style="font-size:9px;font-weight:600;color:#666">${sExp}</div>` : ''}
        ${sStor ? `<div style="font-size:9px;font-weight:600;color:#666">${sStor}</div>` : ''}
        ${sId ? `<div style="font-size:9px;font-weight:600;color:#666;word-break:break-all;letter-spacing:-0.3px">${sId}</div>` : ''}
        ${sComp !== '' ? `<div style="font-size:9px;font-weight:700;color:#333">${sComp || '메이투투'}</div>` : ''}
      </div>
      <div style="position:absolute;top:2px;right:5px;font-size:8px;color:#bbb">${idx}/${labels.length}</div>
    `;

// ── Canvas 텍스트 말줄임 헬퍼 ──
function canvasTruncate(ctx, text, maxW) {
  if (!text) return '';
  if (ctx.measureText(text).width <= maxW) return text;
  let t = text;
  while (t.length > 1 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
  return t + '…';
}

// ── 라벨 1장을 Canvas에 그려서 dataURL 반환 ──
function renderLabelToCanvas(lb) {
  return new Promise(resolve => {
    const _logTag = '[Label]';
    try {
      // ── 입력 검증 ──
      const safeId = (lb && lb.indivId) ? String(lb.indivId).trim() : '';
      const safeName = (lb && lb.itemName) ? String(lb.itemName).trim() : '(품목명 없음)';
      const safeLotId = (lb && lb.lotId) ? String(lb.lotId).trim() : '';
      const safeDate = (lb && lb.date) ? String(lb.date).trim() : '';
      const safeExp = (lb && lb.exp) ? String(lb.exp).trim() : '';
      const safeStorage = (lb && lb.storage) ? String(lb.storage).trim() : '';
      const safeCompany = lb ? lb.company : '';

      if (!safeId) console.warn(_logTag, '개별ID(indivId) 누락 — 빈 QR 생성됨', lb);

      // SLP-DX220: 203 DPI, 60×40mm
      const DPI = 203;
      const mm = (v) => Math.round(v * DPI / 25.4);
      const W = mm(60), H = mm(40);

      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // 흰 배경
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // QR 코드 생성 (임시 div에)
      const qrBox = document.createElement('div');
      qrBox.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
      document.body.appendChild(qrBox);
      const qrPx = mm(26);
      try {
        new QRCode(qrBox, { text: safeId || 'N/A', width: qrPx, height: qrPx, correctLevel: QRCode.CorrectLevel.M });
      } catch (qrErr) {
        console.error(_logTag, 'QR 생성 실패:', safeId, qrErr);
      }

      // 자간 축소(80%) 텍스트 그리기 헬퍼
      function drawCondensed(ctx, text, x, y, scale) {
        if (!text) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, 1);
        ctx.fillText(text, 0, 0);
        ctx.restore();
      }
      // 자간 축소 시 실제 폭 계산
      function condensedWidth(ctx, text, scale) {
        if (!text) return 0;
        return ctx.measureText(text).width * scale;
      }
      // 자간 축소 말줄임
      function condensedTruncate(ctx, text, maxW, scale) {
        if (!text) return '';
        if (condensedWidth(ctx, text, scale) <= maxW) return text;
        let t = text;
        while (t.length > 1 && condensedWidth(ctx, t + '…', scale) > maxW) t = t.slice(0, -1);
        return t + '…';
      }
      // y좌표 하단 초과 방어 — 남은 공간 체크
      function canDrawLine(y, lineH) { return (y + lineH) <= H + mm(1); }

      // QR 렌더 대기 후 canvas에 그리기 (저사양 기기 고려 500ms)
      setTimeout(() => {
        try {
          const qrCanvas = qrBox.querySelector('canvas');
          const topMargin = mm(5);
          const qrMarginX = mm(1.5);
          const qrY = topMargin + Math.round(((H - topMargin) - qrPx) / 2);
          if (qrCanvas) {
            ctx.drawImage(qrCanvas, qrMarginX, qrY, qrPx, qrPx);
          } else {
            console.warn(_logTag, 'QR canvas 미생성 — 빈 영역으로 진행:', safeId);
          }
          // DOM 정리 — 안전하게
          try { document.body.removeChild(qrBox); } catch (e) { qrBox.remove && qrBox.remove(); }

          // 텍스트 영역 — QR 상단과 정렬
          const textX = qrMarginX + qrPx + mm(2.5);
          const textMaxW = W - textX - mm(1.5);
          let y = qrY;  // QR코드 상단에 맞춤
          const cScale = 0.8;

          const fontTitle = `bold ${mm(3.5)}px "Malgun Gothic","맑은 고딕",sans-serif`;
          const fontMain  = `bold ${mm(2.8)}px "Malgun Gothic","맑은 고딕",sans-serif`;
          const fontSub   = `bold ${mm(2.4)}px "Malgun Gothic","맑은 고딕",sans-serif`;
          const lineH = mm(4.2);

          // ── 품목명 (길면 2줄 분할) ──
          ctx.fillStyle = '#000000';
          ctx.font = fontTitle;
          const nameW = condensedWidth(ctx, safeName, cScale);
          if (nameW > textMaxW && safeName.length > 6) {
            let splitIdx = safeName.indexOf(' (');
            if (splitIdx < 0) splitIdx = safeName.indexOf('(');
            if (splitIdx < 0) splitIdx = Math.floor(safeName.length / 2);
            const line1 = safeName.substring(0, splitIdx).trim();
            const line2 = safeName.substring(splitIdx).trim();
            drawCondensed(ctx, condensedTruncate(ctx, line1, textMaxW, cScale), textX, y + mm(2.5), cScale);
            y += lineH - mm(0.5);
            ctx.font = fontMain;
            drawCondensed(ctx, condensedTruncate(ctx, line2, textMaxW, cScale), textX, y + mm(2), cScale);
            y += lineH;
          } else {
            drawCondensed(ctx, condensedTruncate(ctx, safeName, textMaxW, cScale), textX, y + mm(2.5), cScale);
            y += lineH + mm(0.5);
          }

          // ── LOT 번호 ──
          ctx.font = fontMain;
          if (safeLotId && canDrawLine(y, lineH)) {
            drawCondensed(ctx, condensedTruncate(ctx, 'LOT: ' + safeLotId, textMaxW, cScale), textX, y + mm(2), cScale);
            y += lineH;
          }

          // ── 입고일/생산일 ──
          if (safeDate && canDrawLine(y, lineH)) {
            drawCondensed(ctx, condensedTruncate(ctx, safeDate, textMaxW, cScale), textX, y + mm(2), cScale);
            y += lineH;
          }

          // ── 사용기한/소비기한 ──
          if (safeExp && canDrawLine(y, lineH)) {
            drawCondensed(ctx, condensedTruncate(ctx, safeExp, textMaxW, cScale), textX, y + mm(2), cScale);
            y += lineH;
          }

          // ── 보관조건 ──
          if (safeStorage && canDrawLine(y, lineH)) {
            drawCondensed(ctx, condensedTruncate(ctx, safeStorage, textMaxW, cScale), textX, y + mm(2), cScale);
            y += lineH;
          }

          // ── 개별 ID — 긴 ID는 3번째 '-' 기준 2줄 분할 ──
          if (safeId && canDrawLine(y, lineH)) {
            ctx.font = fontSub;
            const idW = condensedWidth(ctx, safeId, cScale);
            if (idW > textMaxW) {
              let dashCount = 0, idSplit = -1;
              for (let i = 0; i < safeId.length; i++) {
                if (safeId[i] === '-') { dashCount++; if (dashCount === 3) { idSplit = i; break; } }
              }
              if (idSplit > 0) {
                const idLine1 = safeId.substring(0, idSplit);
                const idLine2 = safeId.substring(idSplit);
                drawCondensed(ctx, condensedTruncate(ctx, idLine1, textMaxW, cScale), textX, y + mm(2), cScale);
                y += lineH - mm(0.8);
                if (canDrawLine(y, lineH)) {
                  drawCondensed(ctx, condensedTruncate(ctx, idLine2, textMaxW, cScale), textX, y + mm(2), cScale);
                  y += lineH;
                }
              } else {
                drawCondensed(ctx, condensedTruncate(ctx, safeId, textMaxW, cScale), textX, y + mm(2), cScale);
                y += lineH;
              }
            } else {
              drawCondensed(ctx, safeId, textX, y + mm(2), cScale);
              y += lineH;
            }
          }

          // ── 회사명 ──
          if (safeCompany !== '' && canDrawLine(y, lineH)) {
            ctx.font = `bold ${mm(2.6)}px "Malgun Gothic","맑은 고딕",sans-serif`;
            drawCondensed(ctx, safeCompany || '메이투투', textX, y + mm(2), cScale);
          }

          resolve(canvas.toDataURL('image/png'));
        } catch (drawErr) {
          console.error(_logTag, '라벨 Canvas 그리기 실패:', safeId, drawErr);
          // 에러 시에도 흰 캔버스라도 반환 — 전체 인쇄 중단 방지
          resolve(canvas.toDataURL('image/png'));
        }
      }, 500);
    } catch (initErr) {
      console.error('[Label] 라벨 초기화 실패:', initErr);
      // 빈 1x1 캔버스로 fallback — Promise reject 방지
      const fb = document.createElement('canvas'); fb.width = 1; fb.height = 1;
      resolve(fb.toDataURL('image/png'));
    }
  });
}

// ── 라벨 인쇄 (Canvas→이미지→iframe 인쇄 — WYSIWYG) ──
function printLabels() {
  const labels = window._currentLabels;
  if (!labels || labels.length === 0) { toast('인쇄할 라벨이 없습니다', 'err'); return; }

  const sz = getLabelSize();
  const pk = getSavedPrinter();
  const pName = (PRINTER_PRESETS[pk] || PRINTER_PRESETS['slp-dx220']).name;

  toast(`${pName} | ${sz.w}×${sz.h}mm | ${labels.length}매 이미지 생성 중...`, 'info');

  // 모든 라벨을 Canvas 이미지로 변환
  Promise.all(labels.map(lb => renderLabelToCanvas(lb))).then(images => {
    // 이미지가 페이지 전체를 100% 채우도록 — 프린터 드라이버가 용지 크기 제어
    const imgsHtml = images.map(src =>
      '<div class="page">' +
      '<img src="' + src + '">' +
      '</div>'
    ).join('');

    const iframeDoc = '<!DOCTYPE html><html><head><meta charset="utf-8"><style>' +
      '*{margin:0;padding:0;box-sizing:border-box}' +
      '@page{margin:0}' +
      'html,body{margin:0;padding:0}' +
      '.page{page-break-after:always;page-break-inside:avoid}' +
      '.page:last-child{page-break-after:auto}' +
      '.page img{width:100%;display:block}' +
      '</style></head><body>' + imgsHtml + '</body></html>';

    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:800px;height:600px;border:none;visibility:hidden';
    document.body.appendChild(iframe);

    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(iframeDoc);
    doc.close();

    setTimeout(() => {
      try {
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
      } catch(e) { window.print(); }
      setTimeout(() => {
        try { document.body.removeChild(iframe); } catch(e) {}
        toast('인쇄가 완료되었습니다', 'suc');
      }, 2000);
    }, 500);
  });
}

let _selectedSopId = null;

function selectSOP(sopId) {
  _selectedSopId = sopId;

  // Show steps preview
  const steps = State.sopSteps.filter(s => s[0] === sopId);
  $id('wo-steps-preview').innerHTML = steps.map(s =>
    `<div style="padding:4px 0;border-bottom:1px solid var(--bg)">${s[1]}. ${s[2]||''}</div>`
  ).join('');

  updateWOCalc();
}

function updateWOCalc() {
  const qty = parseFloat($id('wo-qty')?.value) || 0;
  const unitSize = parseInt($id('wo-unit')?.value) || 1;
  const calcEl = $id('wo-calc');
  const totalEl = $id('wo-total-production');

  if (qty <= 0 || !_selectedSopId) {
    calcEl.style.display = 'none';
    if (totalEl) totalEl.style.display = 'none';
    return;
  }

  const totalKg = qty * unitSize;
  const recipes = State.sopRecipes.filter(r => r[0] === _selectedSopId);

  // 총 생산량 표시
  if (totalEl) {
    totalEl.style.display = '';
    totalEl.innerHTML = `
      <div class="info-box suc" style="margin-bottom:12px">
        <div class="fs-12 fw-6 c-suc">총 생산량</div>
        <div class="fs-20 fw-8 c-suc mt-4">${totalKg} kg</div>
        <div class="fs-11 c-txt-l mt-2">${qty}개 × ${unitSize}kg = ${totalKg}kg</div>
      </div>
    `;
  }

  calcEl.style.display = '';
  calcEl.innerHTML = `
    <div class="card info-box suc">
      <div class="fs-13 fw-7 c-suc mb-8">원재료 투입 목표 (배합비 × ${totalKg}kg × 1.01)</div>
      <div class="fs-12 c-txt-l mb-4">+1% 여유분 자동 반영</div>
      ${recipes.map(r => {
        const target = (parseFloat(r[3]) || 0) * totalKg * 1.01;
        const isEgg = (r[1]||'') === 'RM001';
        const eggCnt = isEgg ? Math.ceil(target * 1000 / 50) : 0;
        const eggPan = Math.floor(eggCnt / 30);
        const eggAl = eggCnt % 30;
        const eggTxt = eggCnt > 0 ? (eggPan > 0 && eggAl > 0 ? eggPan + '판 ' + eggAl + '알' : eggPan > 0 ? eggPan + '판' : eggAl + '알') : '';
        return `
          <div class="row between" style="padding:6px 0;border-bottom:1px solid var(--gray-l)">
            <span class="fs-13">${r[2]||''} (${r[1]||''})</span>
            <span class="fs-13 fw-7 c-suc">${target.toFixed(2)} kg${eggTxt ? ' <span style="background:#fff8e1;border:1px solid #ffe082;border-radius:4px;padding:1px 6px;font-size:11px;color:#e65100">🥚 ' + eggTxt + '</span>' : ''}</span>
          </div>
        `;
      }).join('')}
      <div class="fs-11 c-txt-l mt-8">예상 포장 수: ${qty}개</div>
    </div>
  `;
}

async function startWorkOrder() {
  const qty = parseFloat($id('wo-qty')?.value) || 0;
  const unitSize = parseInt($id('wo-unit')?.value) || 1;
  const reqId = $id('wo-req')?.value || '';
  const totalKg = qty * unitSize;

  if (!_selectedSopId) { toast('SOP를 선택하세요', 'err'); return; }
  if (qty <= 0) { toast('생산 수량을 입력하세요', 'err'); return; }

  try {
    showLoading();
    const woId = await generateSeqId('WO', '작업지시서');
    const sop = State.sops.find(s => s[0] === _selectedSopId);

    await SheetsAPI.append('작업지시서', [
      woId, _selectedSopId, reqId, sop?.[2] || 'FG002', sop?.[1]?.replace('제조','').trim() || '앙호두 (호두과자 전용반죽)',
      totalKg, `${unitSize}kg`, qty, State.user?.email,
      formatDateTime(), '', '', '진행중', '0', '', '', '', '', ''
    ]);

    // Update production request if linked
    if (reqId) {
      await SheetsAPI.updateCell('생산요청', 0, reqId, 7, '배정완료');
    }

    toast(`작업지시서 ${woId} 생성 완료`, 'suc');
    Router.go('wo-execute', { woId });
  } catch (e) {
    toast('생성 실패: ' + e.message, 'err');
  } finally {
    hideLoading();
  }
}

/* ═══════════════════════════════════════════════
   WORK ORDER EXECUTION (Phase 4 - 핵심)
   ═══════════════════════════════════════════════ */
Screens['wo-execute'] = async (params = {}) => {
  const { woId } = params;
  showLoading();

  try {
    // Load WO data — 항상 최신 데이터 (캐시 bypass)
    // PC에서 열 때 휴대폰에서 업데이트된 데이터를 즉시 반영하기 위함
    SheetsAPI.invalidateCache('작업지시서');
    SheetsAPI.invalidateCache('공정기록');
    const wos = await SheetsAPI.getAll('작업지시서', false);
    const wo = wos.find(w => w[0] === woId) || wos.find(w => w[12] === '진행중');
    if (!wo) { toast('작업지시서를 찾을 수 없습니다', 'err'); hideLoading(); Router.go('production'); return; }

    // Load SOP steps & recipes
    const sopId = wo[1];
    const [steps, recipes, records] = await Promise.all([
      SheetsAPI.getAll('SOP공정단계').then(all => all.filter(s => s[0] === sopId)),
      SheetsAPI.getAll('SOP레시피').then(all => all.filter(r => r[0] === sopId)),
      SheetsAPI.getAll('공정기록').then(all => all.filter(r => r[0] === wo[0])),
    ]);

    const lastSaved = parseInt(wo[13]) || 0;
    const targetQty = parseFloat(wo[5]) || 50;

    // maxStep: 공정기록에서 '완료' 상태인 최대 stepNo 기반으로 계산 (DB 기준 진실)
    let maxStepFromRecords = lastSaved;
    records.forEach(r => {
      if (r[10] === '완료' || r[10] === '임시저장') {
        const sIdx = steps.findIndex(s => String(s[1]) === String(r[1]));
        if (sIdx >= 0 && (sIdx + 1) > maxStepFromRecords) maxStepFromRecords = sIdx + 1;
      }
    });
    // maxStep = max(lastSaved, records 기반 계산값) — 데이터 무결성 보장
    const maxStep = Math.max(lastSaved, maxStepFromRecords);
    console.log(`[WO실행] woId=${wo[0]}, lastSaved=${lastSaved}, maxStepFromRecords=${maxStepFromRecords}, maxStep=${maxStep}`);

    // Store in state
    // currentStep: 현재 보고 있는 단계 (viewing position)
    // maxStep: 완료된 최대 단계 (navigation boundary) — 절대 감소하지 않음
    // ── 기존 인메모리 데이터 보존 (LiveSync 리로드 시 스캔/사진 데이터 유실 방지) ──
    const prevScannedLots = State.woExec?._scannedLots;
    const prevPendingPhotos = State.woExec?._pendingPhotos;
    const prevUseType = State.woExec?._useType;
    const prevCurrentStep = State.woExec?.currentStep;
    const isSameWo = State.woExec?.woId === wo[0];

    State.woExec = {
      woId: wo[0], wo, sopId, steps, recipes, records, targetQty,
      currentStep: isSameWo ? (prevCurrentStep ?? lastSaved) : lastSaved,
      maxStep: maxStep,
      unit: wo[6] || '1kg',
      packCount: parseInt(wo[7]) || 50,
    };

    // 같은 WO 리로드 시 인메모리 데이터 복원
    if (isSameWo) {
      if (prevScannedLots) State.woExec._scannedLots = prevScannedLots;
      if (prevPendingPhotos) State.woExec._pendingPhotos = prevPendingPhotos;
      if (prevUseType) State.woExec._useType = prevUseType;
    }

    hideLoading();
    renderWOExecute();
  } catch (e) {
    hideLoading();
    toast('작업지시서 로드 실패: ' + e.message, 'err');
    Router.go('production');
  }
};

function renderWOExecute() {
  const { woId, steps, currentStep, maxStep, targetQty, unit, packCount } = State.woExec;
  const total = steps.length;
  const step = steps[currentStep];
  if (!step) return;

  const stepType = step[3] || 'input';
  const isMixingStep = stepType === 'process' && (step[2]||'').includes('믹싱');
  const typeColor = { input: 'info', process: isMixingStep ? 'teal' : 'pri', inspect: 'warn', pack: 'gray-d', store: 'teal' };
  const typeLabel = { input: '투입', process: isMixingStep ? '믹싱' : '공정', inspect: '검사(CCP)', pack: '포장', store: '보관' };

  // Header
  renderHeader(woId, `${State.woExec.wo?.[4] || ''} ${targetQty}kg · ${unit}포장`);

  $id('content').innerHTML = `
    <!-- Progress: maxStep 기준으로 진행률 표시 -->
    <div style="background:var(--white);padding:8px 16px">
      <div class="row between mb-4">
        <span class="fs-11 fw-6 c-txt-l">공정 ${currentStep + 1} / ${total} ${currentStep < maxStep ? '<span style="color:var(--info);font-size:10px">(이전 공정 보기 중)</span>' : ''}</span>
        <span class="fs-11 c-txt-l">${Math.round((maxStep / total) * 100)}% 완료</span>
      </div>
      <div class="progress-bar"><div class="fill" style="width:${(maxStep / total) * 100}%"></div></div>
    </div>

    <!-- Step dots: maxStep 기준으로 done/locked, currentStep 기준으로 current -->
    <div class="step-nav">
      ${steps.map((s, i) => {
        const isDone = i < maxStep && i !== currentStep;
        const isCurrent = i === currentStep;
        const isAccessible = i <= maxStep; // maxStep 이하는 클릭 가능
        const dotClass = isCurrent ? 'current' : isDone ? 'done' : 'locked';
        const dotStyle = !isAccessible ? 'style="opacity:0.3;cursor:not-allowed"' : '';
        return `<div class="step-dot ${dotClass}" onclick="goToStep(${i})" ${dotStyle}>${i + 1}</div>`;
      }).join('')}
    </div>

    <!-- Step content -->
    <div style="flex:1;padding:16px;overflow-y:auto" id="step-content"></div>

    <!-- Bottom nav -->
    <div style="display:flex;gap:6px;padding:10px 12px;background:var(--white);border-top:1px solid var(--gray-l)">
      <button class="btn btn-sm btn-outline btn-gray" style="min-width:56px;white-space:nowrap"
              onclick="goToStep(${currentStep - 1})" ${currentStep === 0 ? 'disabled' : ''}>← 이전</button>
      <button class="btn btn-sm btn-outline btn-info" style="min-width:64px;white-space:nowrap"
              onclick="tempSaveWO()">임시저장</button>
      ${currentStep < total - 1 ? `
        <button class="btn btn-sm btn-pri flex-1" style="white-space:nowrap"
                onclick="handleCompleteStep()">공정 완료 · 다음 →</button>
      ` : `
        <button class="btn btn-sm btn-suc flex-1" style="white-space:nowrap"
                onclick="handleCompleteStep(true)">전체 완료 · 냉동보관 시작</button>
      `}
    </div>
  `;

  // Render step-specific content
  renderStepContent(step, stepType);

  // Validate inputs on initial render (disable next button until all filled)
  setTimeout(() => validateStepInputs(State.woExec.currentStep + 1), 100);
}

              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp2-sus','합격',${stepNo})">합격</button>
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp2-sus','불합격',${stepNo})">불합격</button>

    // Step 3 — 초회 검증 (Fe / SUS304 각각)
    html += `

        <div class="fs-13 fw-6 mb-4">Step 3. 초회 검증</div>

            <div class="fs-11 c-txt-l">Fe 시편</div>
            <div class="row mt-4" style="gap:6px">
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp3-fe','합격',${stepNo})">합격</button>

              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp3-sus','합격',${stepNo})">합격</button>
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp3-sus','불합격',${stepNo})">불합격</button>

            <div class="fs-10 c-txt-l mt-4" id="ccp3-sus-time" style="display:none">⏱ <span></span></div>

    // Step 4 — 생산 통과 시작 (수동 시간)
    html += `

    html += `

        <div class="fs-13 fw-6 mb-8">Step 5. 2시간 주기 검증</div>

          <div class="fs-12 fw-6 c-warn">검증 시간은 Step4 시작 시간 기준 +2시간 자동 계산</div>

        <div id="ccp5-records-${stepNo}">
          <div class="ccp5-record" data-result="" style="border:1px solid var(--gray-l);border-radius:8px;padding:8px;margin-bottom:6px">

            <div class="row mb-8" style="gap:8px">
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle5(this.closest('.ccp5-record'),'합격',${stepNo})">합격</button>
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle5(this.closest('.ccp5-record'),'불합격',${stepNo})">불합격</button>

            <div class="row" style="gap:8px;align-items:center">
              <span class="fs-12 c-txt-l">검사 시간:</span>

    // Step 6 — 최종 시편 단독 통과 (Fe / SUS304 각각, Step 2와 동일 로직)
    html += `
      <div class="card bl-teal" style="padding:10px">
        <div class="fs-13 fw-6 mb-4">Step 6. 최종 시편 단독 통과</div>
        <div class="fs-12 c-txt-l mb-8">최종 완제품 통과 후 시편만 단독 통과</div>
        <div class="row mb-8" style="gap:8px">
          <div id="ccp6-fe" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--gray-l);text-align:center" data-result="">
            <div class="fs-11 c-txt-l">Fe 시편 검출</div>
            <div class="row mt-4" style="gap:6px">
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp6-fe','합격',${stepNo})">합격</button>
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp6-fe','불합격',${stepNo})">불합격</button>
            </div>
            <div class="fs-10 c-txt-l mt-4" id="ccp6-fe-time" style="display:none">⏱ <span></span></div>
          </div>
          <div id="ccp6-sus" style="flex:1;padding:8px;border-radius:6px;border:1px solid var(--gray-l);text-align:center" data-result="">
            <div class="fs-11 c-txt-l">SUS304 시편 검출</div>
            <div class="row mt-4" style="gap:6px">
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp6-sus','합격',${stepNo})">합격</button>
              <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle('ccp6-sus','불합격',${stepNo})">불합격</button>
            </div>
            <div class="fs-10 c-txt-l mt-4" id="ccp6-sus-time" style="display:none">⏱ <span></span></div>
          </div>
        </div>
      </div>
    `;

    // Step 7 — 기계 스크린 촬영 (unchanged)
    html += `
      <div class="card bl-teal" style="padding:10px">
        <div class="fs-13 fw-6 mb-8">Step 7. 기계 스크린 촬영</div>
        <div class="input-group"><label>총 검사 수량</label><div class="input-suffix"><input type="number" id="ccp-total" placeholder="수량 입력" oninput="validateStepInputs(${stepNo})"><span>개</span></div></div>
        <div class="photo-upload" onclick="this.querySelector('input').click()">
          <input type="file" accept="image/*" multiple onchange="previewStepPhoto(this, '${stepNo}-ccp7');validateStepInputs(${stepNo})">
          <div class="photo-label">📷 검출기 기계 화면 사진 <span class="c-err">*필수</span></div>
          <div class="photo-preview" id="photo-preview-${stepNo}-ccp7"></div>
        </div>
      </div>
    `;
  }

  else if (stepType === 'qr-label') {
    // QR 라벨 출력 공정 — 밀봉 수량 기반 자동 생성 (기존 라벨 시스템 통일)
    const sealQty = State.woExec.packCount || 0;
    html += `
      <div class="card" style="padding:14px;border-left:3px solid var(--info)">
        <div class="fs-13 fw-7 c-info mb-4">QR 라벨 출력</div>
        <div class="fs-11 c-txt-l">최종 생산 완료된 완제품 수량을 입력하면 개별 QR 코드가 자동 생성되어 라벨을 출력할 수 있습니다.</div>
      </div>
      <div class="input-group mt-12">
        <label>최종 완제품 수량 <span class="c-err">*필수</span></label>
        <div class="input-suffix">
          <input type="number" id="qr-label-qty-${stepNo}" value="${sealQty}" placeholder="생산 완료 수량 입력" oninput="validateStepInputs(${stepNo})">
          <span>개</span>
        </div>
        <div class="input-hint">입력한 수량만큼 개별 QR 코드 및 라벨이 생성됩니다</div>
      </div>
      <button class="btn btn-info mt-8" onclick="previewQRLabels(${stepNo})" style="width:100%">
        🏷️ QR 라벨 미리보기
      </button>
      <button class="btn btn-suc mt-8" id="btn-wo-print-${stepNo}" style="width:100%;display:none;font-size:15px;padding:14px" onclick="printLabels()">
        🖨️ 라벨 프린터기로 인쇄
      </button>
      <div id="label-preview" class="mt-12"></div>
    `;
  }

  else if (stepType === 'store') {
    html += `
      <div class="info-box teal">
        <div class="fs-12 fw-6 c-teal">보관 기준</div>
        <div class="fs-20 fw-8 c-teal mt-4">${step[5] || '-18°C 이하 · 최소 12시간'}</div>
      </div>
      <div class="photo-upload" onclick="this.querySelector('input').click()">
        <input type="file" accept="image/*" multiple onchange="previewStepPhoto(this, ${stepNo});validateStepInputs(${stepNo})">
        <div class="photo-label">📷 냉동고 온도계 사진 <span class="c-err">*필수</span></div>
        <div class="photo-preview" id="photo-preview-${stepNo}"></div>
      </div>
      <div class="input-group mt-12">
        <label>보관 시작 시간</label>
        <input type="text" id="freeze-start" value="${formatDateTime()} (자동)" readonly>
        <div class="input-hint">현재 시간 자동 기록 — 이 시점부터 12시간 이후 출하승인 가능</div>
      </div>
    `;
  }

  // Check items for non-input, non-process, non-inspect types (input has its own above)
  if (stepType !== 'input' && stepType !== 'process' && stepType !== 'inspect') {
    const checks = (step[6] || '').split(',').filter(c => c.trim() && !c.trim().includes('라벨 부착'));
    if (checks.length > 0) {
      html += `<div class="fs-12 fw-6 c-txt-l mb-4 mt-8" style="border-top:1px solid var(--gray-l);padding-top:10px">체크항목</div>`;
      checks.forEach((c, i) => {
        html += `<div class="check-item"><div class="check-box" onclick="toggleCheck(this)"></div><span>${c.trim()}</span></div>`;
      });
    }
  }

  html += `</div>`; // Close card
  el.innerHTML = html;

  // ── 기존 공정기록에서 저장된 데이터 복원 (임시저장/완료 모두) ──
  restoreSavedStepData(stepNo, stepType, step);
}

/**
 * restoreSavedStepData: 공정기록(records)에서 해당 stepNo의 저장 데이터를 DOM에 복원
 * — 이전 단계로 돌아갔을 때 입력값, 체크상태, CCP 결과 등이 유지되도록 함
 */
function restoreSavedStepData(stepNo, stepType, step) {
  try {
    const { records } = State.woExec;
    if (!records || records.length === 0) return;

    // 해당 stepNo의 기존 기록 찾기 (완료 우선, 임시저장 차선)
    const stepRecords = records.filter(r => String(r[1]) === String(stepNo));
    if (stepRecords.length === 0) return;

    // 완료 기록 우선, 없으면 임시저장
    const rec = stepRecords.find(r => r[10] === '완료') || stepRecords.find(r => r[10] === '임시저장') || stepRecords[0];
    const savedDataStr = rec[5] || ''; // stepData (col 5)
    if (!savedDataStr) return;

    let data;
    try {
      data = JSON.parse(savedDataStr);
    } catch (e) {
      console.warn(`[WO복원] stepNo=${stepNo} JSON 파싱 실패:`, e.message);
      return;
    }

    console.log(`[WO복원] stepNo=${stepNo}, type=${stepType}, status=${rec[10]}, data keys=${Object.keys(data).join(',')}`);

    if (stepType === 'input') {
      // 투입량 복원
      if (data.inputQty) {
        const qtyEl = $id(`input-qty-${stepNo}`);
        if (qtyEl) qtyEl.value = data.inputQty;
      }
      // 체크항목 복원
      if (Array.isArray(data.checks)) {
        data.checks.forEach((c, i) => {
          if (c.checked) {
            const chkEl = $id(`check-${stepNo}-${i}`);
            if (chkEl) { chkEl.classList.add('checked'); chkEl.textContent = '✓'; }
          }
        });
      }

      // ── 스캔된 LOT 리스트 UI 복원 (State._scannedLots에서) ──
      if (State.woExec._scannedLots?.[stepNo]?.length > 0) {
        renderScannedList(stepNo);
      }
      // DB 기록(usedLotIds)에서 스캔 데이터 복원 (State에 없을 때)
      else if (rec[4]) {
        const lotIds = rec[4].split(',').filter(Boolean);
        if (lotIds.length > 0 && (!State.woExec._scannedLots || !State.woExec._scannedLots[stepNo]?.length)) {
          // DB에 저장된 LOT ID로 State 복원 (비동기)
          (async () => {
            try {
              if (!State.woExec._scannedLots) State.woExec._scannedLots = {};
              if (!State.woExec._scannedLots[stepNo]) State.woExec._scannedLots[stepNo] = [];
              const indivs = await SheetsAPI.getAll('원재료개별');
              const lots = await SheetsAPI.getAll('원재료LOT');
              lotIds.forEach(qrId => {
                if (State.woExec._scannedLots[stepNo].find(s => s.qrId === qrId)) return;
                const indiv = indivs.find(r => r[0] === qrId);
                const lot = indiv ? lots.find(l => l[0] === indiv[1]) : null;
                State.woExec._scannedLots[stepNo].push({
                  qrId, lotId: indiv?.[1] || '', name: lot?.[2] || '',
                  remain: indiv?.[4] || '0', expiry: (lot?.[7]||'').substring(0,10), status: indiv?.[3] || ''
                });
              });
              renderScannedList(stepNo);
            } catch (e) { console.warn('[WO복원] LOT 복원 실패:', e.message); }
          })();
        }
      }
      // ── useType UI 복원 (스캔 리스트 유무와 무관) ──
      if (State.woExec._useType?.[stepNo]) {
        setUseType(stepNo, State.woExec._useType[stepNo]);
      }
    }

    else if (stepType === 'process') {
      // 체크항목 복원
      if (Array.isArray(data.checks)) {
        data.checks.forEach((c, i) => {
          if (c.checked) {
            const chkEl = $id(`check-${stepNo}-${i}`);
            if (chkEl) { chkEl.classList.add('checked'); chkEl.textContent = '✓'; }
          }
        });
      }
    }

    else if (stepType === 'pack') {
      if (data.packQty) {
        const el = $id(`pack-qty-${stepNo}`);
        if (el) el.value = data.packQty;
      }
      if (Array.isArray(data.samples)) {
        data.samples.forEach((s, i) => {
          if (s.weight) {
            const el = $id(`sample-wt-${stepNo}-${i + 1}`);
            if (el) el.value = s.weight;
          }
        });
      }
    }

    else if (stepType === 'seal') {
      if (data.sealQty) {
        const el = $id(`seal-qty-${stepNo}`);
        if (el) el.value = data.sealQty;
      }
      if (data.labelCheck) {
        const el = $id(`check-seal-${stepNo}-0`);
        if (el) { el.classList.add('checked'); el.textContent = '✓'; }
      }
      if (data.sealCheck) {
        const el = $id(`check-seal-${stepNo}-1`);
        if (el) { el.classList.add('checked'); el.textContent = '✓'; }
      }
    }

    else if (stepType === 'inspect') {
      // CCP Step 1 — time
      if (data.step1Time) {
        const el = $id('ccp-time-1');
        if (el) el.value = data.step1Time;
      }
      // CCP Step 2 — Fe/SUS toggle 복원
      if (data.step2) {
        if (data.step2.fe?.result) ccpToggle('ccp2-fe', data.step2.fe.result, stepNo);
        if (data.step2.sus?.result) ccpToggle('ccp2-sus', data.step2.sus.result, stepNo);
      }
      // CCP Step 3
      if (data.step3) {
        if (data.step3.fe?.result) ccpToggle('ccp3-fe', data.step3.fe.result, stepNo);
        if (data.step3.sus?.result) ccpToggle('ccp3-sus', data.step3.sus.result, stepNo);
      }
      // CCP Step 4 — time
      if (data.step4Time) {
        const el = $id('ccp-time-4');
        if (el) { el.value = data.step4Time; ccpCalcStep5Time(stepNo); }
      }
      // CCP Step 5 — periodic records
      if (Array.isArray(data.step5) && data.step5.length > 0) {
        const container = $id('ccp5-records-' + stepNo);
        if (container) {
          // 기존 첫 번째 레코드 복원
          const firstRec = container.querySelector('.ccp5-record');
          if (firstRec && data.step5[0]?.result) {
            ccpToggle5(firstRec, data.step5[0].result, stepNo);
          }
          // 추가 레코드 생성 및 복원
          for (let i = 1; i < data.step5.length; i++) {
            addCCP5Record(String(stepNo));
            const allRecs = container.querySelectorAll('.ccp5-record');
            const newRec = allRecs[allRecs.length - 1];
            if (newRec && data.step5[i]?.result) {
              ccpToggle5(newRec, data.step5[i].result, stepNo);
            }
          }
        }
      }
      // CCP Step 6
      if (data.step6) {
        if (data.step6.fe?.result) ccpToggle('ccp6-fe', data.step6.fe.result, stepNo);
        if (data.step6.sus?.result) ccpToggle('ccp6-sus', data.step6.sus.result, stepNo);
      }
      // CCP total
      if (data.ccpTotal) {
        const el = $id('ccp-total');
        if (el) el.value = data.ccpTotal;
      }
    }

    else if (stepType === 'qr-label') {
      if (data.qrQty) {
        const el = $id(`qr-label-qty-${stepNo}`);
        if (el) el.value = data.qrQty;
      }
    }

    else if (stepType === 'store') {
      if (data.freezeStart) {
        const el = $id('freeze-start');
        if (el) el.value = data.freezeStart;
      }
    }

    // ── 사진 복원 (모든 stepType 공통) ──
    const savedPhotoUrls = rec[6] || '';
    if (savedPhotoUrls) {
      const urls = savedPhotoUrls.split(' | ').filter(u => u.trim());
      if (urls.length > 0) {
        restorePhotoThumbnails(stepNo, stepType, urls);
      }
    }

    // ── 인메모리 _pendingPhotos blob URL 복원 (아직 업로드되지 않은 사진) ──
    restorePendingPhotos(stepNo, stepType);

    // 복원 완료 로그
    console.log(`[WO복원] stepNo=${stepNo} 데이터 복원 완료 (사진 ${savedPhotoUrls ? savedPhotoUrls.split(' | ').length : 0}장)`);
  } catch (err) {
    console.error(`[WO복원] stepNo=${stepNo} 복원 중 오류:`, err);
    // 복원 실패해도 시스템은 정상 동작 — 빈 폼으로 표시됨
  }
}

/**
 * restorePendingPhotos: State._pendingPhotos에 남아있는 미업로드 파일의 blob URL을 DOM에 복원
 * — DOM 재렌더(goToStep, LiveSync 등) 후 사진 미리보기가 사라지는 문제 방지
 */
function restorePendingPhotos(stepNo, stepType) {
  const pendingPhotos = State.woExec?._pendingPhotos;
  if (!pendingPhotos) return;

  // 단일 preview 복원 헬퍼
  const fillPreview = (key, previewId) => {
    const files = pendingPhotos[key];
    if (!files || files.length === 0) return;
    const preview = $id(previewId);
    if (!preview || preview.innerHTML.trim()) return; // 이미 Drive URL 썸네일이 있으면 skip
    preview.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-top:8px';
    files.forEach(f => {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--gray-l)';
      preview.appendChild(img);
    });
    // photo-upload 컨테이너에 has-photo 클래스 추가
    const uploadEl = preview.closest('.photo-upload');
    if (uploadEl) uploadEl.classList.add('has-photo');
  };

  // stepType별 preview 요소 매핑
  if (stepType === 'pack') {
    for (let n = 1; n <= 3; n++) fillPreview(`${stepNo}-s${n}`, `photo-preview-${stepNo}-s${n}`);
  } else if (stepType === 'seal') {
    for (let n = 1; n <= 3; n++) fillPreview(`${stepNo}-seal${n}`, `photo-preview-${stepNo}-seal${n}`);
  } else if (stepType === 'inspect') {
    fillPreview(`${stepNo}-ccp7`, `photo-preview-${stepNo}-ccp7`);
  } else {
    fillPreview(String(stepNo), `photo-preview-${stepNo}`);
  }
}

/**
 * restorePhotoThumbnails: 저장된 Drive URL에서 사진 썸네일을 복원
 */
function restorePhotoThumbnails(stepNo, stepType, urls) {
  const extractFileId = (url) => {
    const m = url.match(/\/d\/([^/]+)\//);
    return m ? m[1] : null;
  };

  const createThumb = (url) => {
    const fileId = extractFileId(url);
    const img = document.createElement('img');
    img.src = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w128` : url;
    img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--suc);cursor:pointer';
    img.title = '저장된 사진 (터치하여 보기)';
    img.onclick = (e) => { e.stopPropagation(); window.open(url, '_blank'); };
    img.onerror = () => {
      img.style.cssText = 'width:64px;height:64px;border-radius:6px;border:1px solid var(--suc);display:flex;align-items:center;justify-content:center;background:#e8f5e9;font-size:10px;color:var(--suc)';
      img.outerHTML = `<div style="width:64px;height:64px;border-radius:6px;border:1px solid var(--suc);display:flex;align-items:center;justify-content:center;background:#e8f5e9;font-size:20px;cursor:pointer" title="저장된 사진" onclick="window.open('${url}','_blank')">📷✓</div>`;
    };
    return img;
  };

  const fillPreview = (previewId, thumbUrls) => {
    const preview = $id(previewId);
    if (!preview) return;
    preview.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-top:8px';
    thumbUrls.forEach(u => preview.appendChild(createThumb(u)));
    // photo-upload 상위에 has-photo 표시
    preview.closest('.photo-upload')?.classList.add('has-photo');
  };

  if (stepType === 'input' || stepType === 'process' || stepType === 'store') {
    fillPreview(`photo-preview-${stepNo}`, urls);
  } else if (stepType === 'pack') {
    // 3개 샘플에 분배
    for (let n = 0; n < 3; n++) {
      if (urls[n]) fillPreview(`photo-preview-${stepNo}-s${n+1}`, [urls[n]]);
    }
    // 3개 초과 시 나머지는 마지막 샘플에
    if (urls.length > 3) fillPreview(`photo-preview-${stepNo}-s3`, urls.slice(2));
  } else if (stepType === 'seal') {
    for (let n = 0; n < 3; n++) {
      if (urls[n]) fillPreview(`photo-preview-${stepNo}-seal${n+1}`, [urls[n]]);
    }
    if (urls.length > 3) fillPreview(`photo-preview-${stepNo}-seal3`, urls.slice(2));
  } else if (stepType === 'inspect') {
    fillPreview(`photo-preview-${stepNo}-ccp7`, urls);
  }
}

// ── CCP 합격/불합격 토글 (Step 2,3,6 공용) ──
function ccpToggle(boxId, result, stepNo) {
  const box = $id(boxId);
  if (!box) return;
  const btns = box.querySelectorAll('button');
  const timeEl = $id(boxId + '-time');

  box.dataset.result = result;
  if (result === '합격') {
    btns[0].style.background = 'var(--suc)';

    btns[1].style.background = 'var(--gray-l)';
    btns[1].style.color = 'var(--txt)';
    box.style.borderColor = 'var(--suc)';

    const now = new Date().toTimeString().substring(0, 5);
    if (timeEl) {
      timeEl.style.display = 'block';
      timeEl.querySelector('span').textContent = now;
      timeEl.dataset.time = now;
    }
  } else {
    btns[1].style.background = 'var(--err)';

      timeEl.dataset.time = '';

}

// ── Step4 시간 변경 시 Step5 검증 시간 자동 계산 ──
function ccpCalcStep5Time(stepNo) {
  const t4 = $id('ccp-time-4')?.value;
  if (!t4) return;
  const container = $id('ccp5-records-' + stepNo);
  if (!container) return;
  const records = container.querySelectorAll('.ccp5-record');
  records.forEach((rec, i) => {
    const display = rec.querySelector('.ccp5-time-display');
    if (display) {
      const calcTime = addHoursToTime(t4, (i + 1) * 2);
      display.textContent = calcTime;
      display.dataset.time = calcTime;
    }
  });
}

// ── 시간 문자열에 N시간 더하기 ──
function addHoursToTime(timeStr, hours) {
  const [h, m] = timeStr.split(':').map(Number);
  const totalMin = h * 60 + m + hours * 60;
  const nh = Math.floor(totalMin / 60) % 24;
  const nm = totalMin % 60;
  return String(nh).padStart(2, '0') + ':' + String(nm).padStart(2, '0');
}

function addCCP5Record(stepNo) {
  const container = $id('ccp5-records-' + stepNo);
  if (!container) return;
  const count = container.querySelectorAll('.ccp5-record').length + 1;

  // Calculate time: Step4 start + (count * 2h)
  const t4 = $id('ccp-time-4')?.value;
  let calcTime = '';
  let calcDisplay = 'Step4 입력 대기...';
  if (t4) {
    calcTime = addHoursToTime(t4, count * 2);
    calcDisplay = calcTime;
  }

  const div = document.createElement('div');
  div.className = 'ccp5-record';
  div.dataset.result = '';
  div.style.cssText = 'border:1px solid var(--gray-l);border-radius:8px;padding:8px;margin-bottom:6px';
  div.innerHTML = `
    <div class="fs-11 fw-6 c-txt-l mb-4">검증 #${count}</div>
    <div class="row mb-8" style="gap:8px">
      <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle5(this.closest('.ccp5-record'),'합격',${stepNo})">합격</button>
      <button class="btn btn-sm flex-1" style="padding:4px 6px;font-size:11px;background:var(--gray-l);color:var(--txt)" onclick="ccpToggle5(this.closest('.ccp5-record'),'불합격',${stepNo})">불합격</button>
    </div>
    <div class="row" style="gap:8px;align-items:center">
      <span class="fs-12 c-txt-l">검사 시간:</span>
      <span class="ccp5-time-display fs-13 fw-6" style="color:var(--info)" data-time="${calcTime}">${calcDisplay}</span>
    </div>
  `;
  container.appendChild(div);
  toast(`검증 #${count} 추가됨 (예정: ${calcDisplay})`, 'suc');
}

// ── 공정 사진 수집 (File 객체 배열 리턴) ──
function collectStepPhotos(stepNo, stepType) {
  const files = [];
  const addFilesFrom = (inputEl) => {
    if (inputEl?.files) Array.from(inputEl.files).forEach(f => files.push(f));
  };

  if (stepType === 'input') {
    addFilesFrom($id(`photo-camera-${stepNo}`));
    addFilesFrom($id(`photo-gallery-${stepNo}`));
  } else if (stepType === 'process' || stepType === 'store') {
    const preview = $id(`photo-preview-${stepNo}`);
    if (preview) {
      const fileInput = preview.closest('.photo-upload')?.querySelector('input[type="file"]');
      addFilesFrom(fileInput);
    }
  } else if (stepType === 'pack') {
    for (let n = 1; n <= 3; n++) {
      const prev = $id(`photo-preview-${stepNo}-s${n}`);
      if (prev) {
        const fi = prev.closest('.photo-upload')?.querySelector('input[type="file"]');
        addFilesFrom(fi);
      }
    }
  } else if (stepType === 'seal') {
    for (let n = 1; n <= 3; n++) {
      const prev = $id(`photo-preview-${stepNo}-seal${n}`);
      if (prev) {
        const fi = prev.closest('.photo-upload')?.querySelector('input[type="file"]');
        addFilesFrom(fi);
      }
    }
  } else if (stepType === 'inspect') {
    const ccpPrev = $id(`photo-preview-${stepNo}-ccp7`);
    if (ccpPrev) {
      const fi = ccpPrev.closest('.photo-upload')?.querySelector('input[type="file"]');
      addFilesFrom(fi);
    }
  }

  // ── DOM file input이 비어있으면 State에 보관된 파일 사용 (단계 이동 후 복귀 시) ──
  if (files.length === 0 && State.woExec?._pendingPhotos) {
    // 단일 프리뷰 타입
    const singleKey = String(stepNo);
    if (State.woExec._pendingPhotos[singleKey]?.length > 0) {
      files.push(...State.woExec._pendingPhotos[singleKey]);
    }
    // 멀티 프리뷰 타입 (pack: s1~s3, seal: seal1~seal3, inspect: ccp7)
    if (stepType === 'pack') {
      for (let n = 1; n <= 3; n++) {
        const key = `${stepNo}-s${n}`;
        if (State.woExec._pendingPhotos[key]?.length > 0) files.push(...State.woExec._pendingPhotos[key]);
      }
    } else if (stepType === 'seal') {
      for (let n = 1; n <= 3; n++) {
        const key = `${stepNo}-seal${n}`;
        if (State.woExec._pendingPhotos[key]?.length > 0) files.push(...State.woExec._pendingPhotos[key]);
      }
    } else if (stepType === 'inspect') {
      const key = `${stepNo}-ccp7`;
      if (State.woExec._pendingPhotos[key]?.length > 0) files.push(...State.woExec._pendingPhotos[key]);
    }
  }
  return files;
}

// ── 공정 입력값 수집 (JSON string 리턴) ──
function collectStepData(stepNo, stepType, step) {
  const data = {};

  if (stepType === 'input') {
    data.inputQty = $id(`input-qty-${stepNo}`)?.value || '';
    data.targetQty = $id(`input-qty-${stepNo}`)?.dataset?.target || '';
    const checks = (step[6] || '').split(',').filter(c => c.trim());
    data.checks = checks.map((c, i) => ({
      name: c.trim(),
      checked: $id(`check-${stepNo}-${i}`)?.textContent === '✓'
    }));
  }
  else if (stepType === 'process') {
    const checks = (step[6] || '').split(',').filter(c => c.trim());
    const isMixing = (step[2]||'').includes('믹싱');
    if (isMixing) {
      if (!checks.includes('RPM 확인')) checks.push('RPM 확인');
      if (!checks.includes('믹싱 시간 확인')) checks.push('믹싱 시간 확인');
    }
    data.checks = checks.map((c, i) => ({
      name: c.trim(),
      checked: $id(`check-${stepNo}-${i}`)?.textContent === '✓'
    }));
  }
  else if (stepType === 'pack') {
    data.packQty = $id(`pack-qty-${stepNo}`)?.value || '';
    data.samples = [];
    for (let n = 1; n <= 3; n++) {
      data.samples.push({
        weight: $id(`sample-wt-${stepNo}-${n}`)?.value || ''
      });
    }
  }
  else if (stepType === 'seal') {
    data.sealQty = $id(`seal-qty-${stepNo}`)?.value || '';
    data.labelCheck = $id(`check-seal-${stepNo}-0`)?.textContent === '✓';
    data.sealCheck = $id(`check-seal-${stepNo}-1`)?.textContent === '✓';
  }
  else if (stepType === 'inspect') {
    data.ccpTotal = $id('ccp-total')?.value || '';
    // Step 1 time
    data.step1Time = $id('ccp-time-1')?.value || '';
    // Step 2 results (Fe / SUS304)
    data.step2 = {
      fe: { result: $id('ccp2-fe')?.dataset?.result || '', time: $id('ccp2-fe-time')?.dataset?.time || '' },
      sus: { result: $id('ccp2-sus')?.dataset?.result || '', time: $id('ccp2-sus-time')?.dataset?.time || '' }
    };
    // Step 3 results (Fe / SUS304)
    data.step3 = {
      fe: { result: $id('ccp3-fe')?.dataset?.result || '', time: $id('ccp3-fe-time')?.dataset?.time || '' },
      sus: { result: $id('ccp3-sus')?.dataset?.result || '', time: $id('ccp3-sus-time')?.dataset?.time || '' }
    };
    // Step 4 time
    data.step4Time = $id('ccp-time-4')?.value || '';
    // Step 5 periodic records
    const step5Container = document.getElementById('ccp5-records-' + stepNo);
    data.step5 = [];
    if (step5Container) {
      step5Container.querySelectorAll('.ccp5-record').forEach((rec, i) => {
        const timeDisp = rec.querySelector('.ccp5-time-display');
        data.step5.push({
          num: i + 1,
          result: rec.dataset?.result || '',
          time: timeDisp?.dataset?.time || ''
        });
      });
    }
    // Step 6 results (Fe / SUS304)
    data.step6 = {
      fe: { result: $id('ccp6-fe')?.dataset?.result || '', time: $id('ccp6-fe-time')?.dataset?.time || '' },
      sus: { result: $id('ccp6-sus')?.dataset?.result || '', time: $id('ccp6-sus-time')?.dataset?.time || '' }
    };
  }
  else if (stepType === 'qr-label') {
    data.qrQty = $id(`qr-label-qty-${stepNo}`)?.value || '';
  }
  else if (stepType === 'store') {
    data.freezeStart = $id('freeze-start')?.value || '';
  }

  return JSON.stringify(data);
}

// ── 사진 일괄 업로드 → URL 배열 리턴 ──
async function uploadStepPhotos(files) {
  if (!files || files.length === 0) return '';
  const urls = [];
  let failCount = 0;
  for (const file of files) {
    try {
      const url = await DriveAPI.uploadPhoto(file);
      if (url) urls.push(url);
    } catch (e) {
      failCount++;
      console.error('Photo upload failed:', e);
    }
  }
  if (failCount > 0 && urls.length === 0) {
    toast(`⚠️ 사진 ${failCount}장 업로드 실패. 인증이 만료되었을 수 있습니다.`, 'err', 4000);
  } else if (failCount > 0) {
    toast(`⚠️ 사진 ${failCount}장 업로드 실패 (${urls.length}장 성공)`, 'warn', 3000);
  }
  return urls.join(' | ');
}

// Helper functions for WO execution
function toggleCheck(el) {
  el.classList.toggle('checked');
  el.textContent = el.classList.contains('checked') ? '✓' : '';
}

function previewStepPhoto(input, stepNo) {
  const preview = $id(`photo-preview-${stepNo}`);
  if (!preview) return;
  preview.innerHTML = '';
  preview.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-top:8px';

  // 파일을 State에 보관 (단계 이동 후에도 유지)
  if (!State.woExec._pendingPhotos) State.woExec._pendingPhotos = {};
  if (!State.woExec._pendingPhotos[stepNo]) State.woExec._pendingPhotos[stepNo] = [];
  Array.from(input.files).forEach(f => {
    // 중복 방지
    if (!State.woExec._pendingPhotos[stepNo].some(p => p.name === f.name && p.size === f.size)) {
      State.woExec._pendingPhotos[stepNo].push(f);
    }
  });

  // 모든 보관된 사진 프리뷰 표시
  State.woExec._pendingPhotos[stepNo].forEach(f => {
