}

async function previewQRLabels(stepNo) {
  const qty = parseInt($id(`qr-label-qty-${stepNo}`)?.value) || 0;
  if (qty <= 0) { toast('라벨 수량을 입력하세요', 'err'); return; }
  if (qty > 200) { toast('라벨 수량이 너무 많습니다 (최대 200매)', 'err'); return; }

  const { woId, wo } = State.woExec;
  const productName = wo ? wo[4] : '';
  const fgItemCode = wo ? (wo[3] || 'FG002') : 'FG002';

  // 생산일 = WO 시작시간 기준 (실제 제조일)
  const prodDateStr = wo ? (wo[9] || formatDate()) : formatDate();
  const prodDate = new Date(prodDateStr);
  const productionDate = formatDate(prodDate);

  // 소비기한 = 생산일 + 6개월
  const expDate = new Date(prodDate);
  expDate.setMonth(expDate.getMonth() + 6);
  const expStr = formatDate(expDate);

  showLoading();

  try {
    // FG LOT ID 사전 채번 — approveWO에서 동일 ID 재사용됨
    let fgLotId = wo ? wo[14] : '';
    if (!fgLotId || !fgLotId.startsWith('FG-')) {
      fgLotId = await generateLotId('FG', fgItemCode, expStr, '완제품LOT', 0, productionDate);
      // WO에 사전 저장 — 승인 시 이 ID를 그대로 사용
      await SheetsAPI.updateCell('작업지시서', 0, woId, 14, fgLotId);
      if (wo) wo[14] = fgLotId;
      console.log(`[QR라벨] FG LOT ID 사전 채번 및 저장: ${fgLotId}`);
    } else {
      console.log(`[QR라벨] 기존 FG LOT ID 재사용: ${fgLotId}`);
    }

    // FG LOT ID 기반 개별 QR 라벨 생성 — approveWO와 동일 형식
    const labels = [];
    for (let i = 1; i <= qty; i++) {
      const indivId = `${fgLotId}-${String(i).padStart(2, '0')}`;
      labels.push({
        indivId: indivId,
        itemName: productName,
        lotId: fgLotId,
        date: `제조일자: ${productionDate}`,
        exp: `소비기한: ${expStr}`,
        storage: '보관: 냉동 -18°C 이하',
        company: '',
      });
    }

    hideLoading();

    // renderLabelCards 사용 (기존 라벨 시스템과 동일한 QR 미리보기)
    applyPrintCSS();
    renderLabelCards(labels);

    // 인쇄 버튼 표시
    const btnPrint = $id(`btn-wo-print-${stepNo}`);
    if (btnPrint) btnPrint.style.display = '';

    toast(`QR 라벨 ${qty}매 미리보기 생성 완료 (${fgLotId})`, 'suc');
  } catch (e) {
    hideLoading();
    console.error('[QR라벨] 미리보기 생성 실패:', e);
    toast('라벨 생성 실패: ' + e.message, 'err');
  }
}

function goToStep(idx) {
  if (idx < 0 || idx >= State.woExec.steps.length) return;
  const { maxStep, currentStep } = State.woExec;
  // maxStep 이하는 자유 이동, maxStep 초과는 불가 (완료되지 않은 미래 공정)
  if (idx > maxStep) {
    toast('해당 공정은 아직 완료되지 않았습니다. 순서대로 진행해주세요.', 'err', 3000);
    return;
  }
  console.log(`[WO실행] goToStep: ${currentStep} → ${idx} (maxStep=${maxStep})`);
  State.woExec.currentStep = idx;
  renderWOExecute();
}

async function tempSaveWO() {
  try {
    showLoading();
    const { woId, currentStep, steps } = State.woExec;
    const step = steps[currentStep];
    const stepNo = parseInt(step[1]);
    const stepType = step[3] || 'input';

    // 사진 업로드
    const photos = collectStepPhotos(stepNo, stepType);
    let photoUrls = '';
    if (photos.length > 0) {
      toast('사진 업로드 중...', 'info', 2000);
      photoUrls = await uploadStepPhotos(photos);
    }

    // 새 사진이 없으면 기존 저장된 사진 URL 유지
    const allRecords = await SheetsAPI.getAll('공정기록').catch(() => []);
    const existingIdx = allRecords.findIndex(r => r[0] === woId && r[1] === String(stepNo));
    if (!photoUrls && existingIdx >= 0) {
      photoUrls = allRecords[existingIdx][6] || '';
    }

    // 입력값 수집
    const stepData = collectStepData(stepNo, stepType, step);
    const usedLotIds = (stepType === 'input') ?
      (State.woExec._scannedLots?.[stepNo] || []).map(s => s.lotId).filter(Boolean).join(',') : '';

    // 공정기록 임시 저장 (기존 기록 있으면 덮어쓰기)
    // ⚠️ 이미 '완료'된 기록은 상태를 유지 (다운그레이드 방지)
    const existingStatus = existingIdx >= 0 ? (allRecords[existingIdx][10] || '') : '';
    const saveStatus = existingStatus === '완료' ? '완료' : '임시저장';
    if (existingStatus === '완료') {
      console.log(`[WO실행] 임시저장: stepNo=${stepNo} 이미 완료된 공정 — 데이터만 갱신, 상태 유지`);
    }
    if (existingIdx >= 0) {
      await SheetsAPI.updateRowByIndex('공정기록', existingIdx + 2, {
        0: woId, 1: String(stepNo), 2: step[2], 3: stepType,
        4: usedLotIds, 5: stepData, 6: photoUrls,
        7: '', 8: '', 9: '', 10: saveStatus,
        11: formatDateTime(), 12: State.user?.email
      });
    } else {
      await SheetsAPI.append('공정기록', [
        woId, String(stepNo), step[2], stepType,
        usedLotIds, stepData, photoUrls,
        '', '', '', '임시저장',
        formatDateTime(), State.user?.email
      ]);
    }
    SheetsAPI.invalidateCache('공정기록');

    // lastSavedStep: 절대 감소하지 않도록 방어 — maxStep과 현재 위치 중 큰 값만 기록
    const { maxStep } = State.woExec;
    const newLastSaved = Math.max(currentStep, maxStep);
    await SheetsAPI.updateCell('작업지시서', 0, woId, 13, String(newLastSaved));
    console.log(`[WO실행] 임시저장: step=${currentStep}, maxStep=${maxStep}, lastSavedStep=${newLastSaved}`);

    // records 캐시 갱신 — 이후 단계 이동 시 최신 데이터 복원 가능하도록
    try {
      const freshRecords = await SheetsAPI.getAll('공정기록', false);
      State.woExec.records = freshRecords.filter(r => r[0] === woId);
    } catch (e) { console.warn('[WO실행] records 갱신 실패:', e.message); }

    const statusMsg = saveStatus === '완료' ? ' (완료 상태 유지)' : '';
    toast(`저장 완료${statusMsg}${photos.length > 0 ? ` (사진 ${photos.length}장 업로드됨)` : ''}`, 'suc');
  } catch (e) {
    toast('임시저장 실패: ' + e.message, 'err');
  } finally {
    hideLoading();
  }
}

async function handleCompleteStep(isFinal = false) {
  const step = State.woExec?.steps?.[State.woExec?.currentStep];
  if (!step) return;
  const stepNo = parseInt(step[1]);
  const stepType = step[3] || 'input';
  const isWater = (step[4] || '') === 'RM002';

  const missing = [];

  if (stepType === 'input') {
    const qtyInput = $id(`input-qty-${stepNo}`);
    const qtyVal = parseFloat(qtyInput?.value);
    if (!qtyVal || qtyVal <= 0) missing.push('실제 투입량');

    // ±5% 범위 검증
    if (qtyVal > 0 && qtyInput?.dataset?.target) {
      const targetVal = parseFloat(qtyInput.dataset.target);
      if (targetVal > 0) {
        const lo = targetVal * 0.95, hi = targetVal * 1.05;
        if (qtyVal < lo || qtyVal > hi) {
          missing.push(`투입량 범위 초과 (목표 ${targetVal}kg 의 ±5%: ${lo.toFixed(2)}~${hi.toFixed(2)}kg, 입력값 ${qtyVal}kg)`);
        }
      }
    }

    const photoPreview = $id(`photo-preview-${stepNo}`);
    if (!photoPreview || !photoPreview.innerHTML.trim()) missing.push('저울 사진');

    const checks = (step[6] || '').split(',').filter(c => c.trim());
    let unchecked = 0;
    checks.forEach((_, i) => {
      const cb = $id(`check-${stepNo}-${i}`);
      if (cb && cb.textContent !== '✓') unchecked++;
    });
    if (unchecked > 0) missing.push(`체크항목 (${unchecked}건 미체크)`);

    if (!isWater) {
      const scanned = State.woExec._scannedLots?.[stepNo]?.length || 0;
      if (scanned === 0) missing.push('QR 스캔 (원재료 LOT)');
    }
  }

  if (stepType === 'process') {
    // 체크항목 전부 체크 확인
    const checks = (step[6] || '').split(',').filter(c => c.trim());
    const isMixing = (step[2]||'').includes('믹싱');
    const allChecks = [...checks];
    if (isMixing) {
      if (!allChecks.includes('RPM 확인')) allChecks.push('RPM 확인');
      if (!allChecks.includes('믹싱 시간 확인')) allChecks.push('믹싱 시간 확인');
    }
    let unchecked = 0;
    allChecks.forEach((_, i) => {
      const cb = $id(`check-${stepNo}-${i}`);
      if (cb && cb.textContent !== '✓') unchecked++;
    });
    if (unchecked > 0) missing.push(`체크항목 (${unchecked}건 미체크)`);
    // 사진 필수
    const photoPreview = $id(`photo-preview-${stepNo}`);
    if (!photoPreview || !photoPreview.innerHTML.trim()) missing.push('공정 사진');
  }

  if (stepType === 'inspect') {
    // CCP 금속검출 — 전체 검증
    if (!$id('ccp-time-1')?.value) missing.push('Step1 시작 시간');
    // Step 2 합격 필수
    if ($id('ccp2-fe')?.dataset?.result !== '합격') missing.push('Step2 Fe 시편 합격');
    if ($id('ccp2-sus')?.dataset?.result !== '합격') missing.push('Step2 SUS304 시편 합격');
    // Step 3 합격 필수
    if ($id('ccp3-fe')?.dataset?.result !== '합격') missing.push('Step3 Fe 초회검증 합격');
    if ($id('ccp3-sus')?.dataset?.result !== '합격') missing.push('Step3 SUS304 초회검증 합격');
    // Step 4 시간
    if (!$id('ccp-time-4')?.value) missing.push('Step4 시작 시간');
    // Step 5 — 모든 기록 합격 필수
    const ccp5Container = document.getElementById('ccp5-records-' + stepNo);
    if (ccp5Container) {
      ccp5Container.querySelectorAll('.ccp5-record').forEach((rec, i) => {
        if (rec.dataset?.result !== '합격') missing.push(`Step5 검증 #${i+1} 합격`);
      });
    }
    // Step 6 합격 필수
    if ($id('ccp6-fe')?.dataset?.result !== '합격') missing.push('Step6 Fe 최종 합격');
    if ($id('ccp6-sus')?.dataset?.result !== '합격') missing.push('Step6 SUS304 최종 합격');
    // Step 7 수량 + 사진
    const ccpTotal = parseInt($id('ccp-total')?.value);
    if (!ccpTotal || ccpTotal <= 0) missing.push('총 검사 수량');
    const ccpPhoto = $id(`photo-preview-${stepNo}-ccp7`);
    if (!ccpPhoto || !ccpPhoto.innerHTML.trim()) missing.push('검출기 기계 화면 사진');
  }

  if (stepType === 'pack') {
    // 실제 생산 수량
    const packQty = parseInt($id(`pack-qty-${stepNo}`)?.value);
    if (!packQty || packQty <= 0) missing.push('실제 생산 수량');
    // 3개 샘플 사진
    let photoCount = 0;
    for (let n = 1; n <= 3; n++) {
      const prev = $id(`photo-preview-${stepNo}-s${n}`);
      if (prev && prev.innerHTML.trim()) photoCount++;
    }
    if (photoCount < 3) missing.push(`샘플 사진 (${3-photoCount}건 미촬영)`);
    // 3개 샘플 무게
    let weightCount = 0;
    for (let n = 1; n <= 3; n++) {
      const wt = parseFloat($id(`sample-wt-${stepNo}-${n}`)?.value);
      if (wt && wt > 0) weightCount++;
    }
    if (weightCount < 3) missing.push(`샘플 무게 (${3-weightCount}건 미입력)`);
  }

  if (stepType === 'seal') {
    // 밀봉 체크항목 확인
    const sealCheck0 = $id(`check-seal-${stepNo}-0`);
    const sealCheck1 = $id(`check-seal-${stepNo}-1`);
    if (!sealCheck0 || sealCheck0.textContent !== '✓') missing.push('제품 라벨 부착 확인');
    if (!sealCheck1 || sealCheck1.textContent !== '✓') missing.push('밀봉 상태 확인');
    // 사진 확인
    let photoCount = 0;
    for (let n = 1; n <= 3; n++) {
      const prev = $id(`photo-preview-${stepNo}-seal${n}`);
      if (prev && prev.innerHTML.trim()) photoCount++;
    }
    if (photoCount < 3) missing.push(`샘플 사진 (${3-photoCount}건 미촬영)`);
    // 수량 확인
    const sealQty = parseInt($id(`seal-qty-${stepNo}`)?.value);
    if (!sealQty || sealQty <= 0) missing.push('최종 완제품 수량');
    else State.woExec.packCount = sealQty; // 최종 재고 인정 수량 반영
  }

  if (stepType === 'qr-label') {
    const qrQty = parseInt($id(`qr-label-qty-${stepNo}`)?.value);
    if (!qrQty || qrQty <= 0) missing.push('QR 라벨 수량');
  }

  if (stepType === 'store') {
    // 냉동고 온도계 사진 필수
    const photoPreview = $id(`photo-preview-${stepNo}`);
    if (!photoPreview || !photoPreview.innerHTML.trim()) missing.push('냉동고 온도계 사진');
  }

  if (missing.length > 0) {
    toast('미입력 항목:\n• ' + missing.join('\n• '), 'err', 4000);
    return;
  }

  if (isFinal) {
    // 전체 완료 전 이전 공정 기록 사전 검증
    try {
      showLoading();
      const allRecs = await SheetsAPI.getAll('공정기록').catch(() => []);
      const woRecs = allRecs.filter(r => r[0] === State.woExec.woId);
      const incompSteps = [];
      for (let i = 0; i < State.woExec.steps.length - 1; i++) {
        const sNo = State.woExec.steps[i][1];
        const rec = woRecs.find(r => r[1] === String(sNo) && r[10] === '완료');
        if (!rec) incompSteps.push(`${sNo}. ${State.woExec.steps[i][2] || ''}`);
      }
      hideLoading();
      if (incompSteps.length > 0) {
        toast(`⚠️ 이전 공정 ${incompSteps.length}건 미완료:\n• ${incompSteps.join('\n• ')}\n\n모든 공정을 순서대로 완료해주세요.`, 'err', 6000);
        return;
      }
    } catch (e) {
      hideLoading();
    }
    submitForApproval();
  } else {
    completeStep();
  }
}

async function completeStep() {
  if (!acquireLock('completeStep')) return;
  const { woId, steps, currentStep } = State.woExec;
  const step = steps[currentStep];
  const stepNo = parseInt(step[1]);
  const stepType = step[3] || 'input';

  try {
    showLoading();

    // ⚠️ 이전 공정 완료 여부 사전 검증 (건너뛰기 방지)
    if (currentStep > 0) {
      const allRecs = await SheetsAPI.getAll('공정기록').catch(() => []);
      const woRecs = allRecs.filter(r => r[0] === woId);
      const incompSteps = [];
      for (let i = 0; i < currentStep; i++) {
        const sNo = steps[i][1];
        const rec = woRecs.find(r => r[1] === String(sNo) && r[10] === '완료');
        if (!rec) incompSteps.push(`${sNo}. ${steps[i][2] || ''}`);
      }
      if (incompSteps.length > 0) {
        hideLoading();
        releaseLock('completeStep');
        toast(`⚠️ 이전 공정 ${incompSteps.length}건 미완료:\n• ${incompSteps.join('\n• ')}\n\n이전 공정을 먼저 완료해주세요.`, 'err', 5000);
        return;
      }
    }

    // input step: 원재료 재고 차감 (스캔된 LOT)
    let usedLotIds = '';
    if (stepType === 'input') {
      const scannedItems = State.woExec._scannedLots?.[stepNo] || [];
      const qtyInput = $id(`input-qty-${stepNo}`);
      const consumedQty = parseFloat(qtyInput?.value) || 0;

      // ① 모든 개별 항목 소진 처리 (병렬)
      await Promise.all(scannedItems.map(item =>
        SheetsAPI.updateRow('원재료개별', 0, item.qrId, { 3: '소진' })
      ));

      // ② LOT별 그룹핑 → 잔량 차감 + 소진 판정 (LOT당 1회만 조회/업데이트)
      const lotGroups = {};
      scannedItems.forEach(item => {
        if (item.lotId) {
          if (!lotGroups[item.lotId]) lotGroups[item.lotId] = 0;
          lotGroups[item.lotId]++;
        }
      });

      SheetsAPI.invalidateCache('원재료LOT');
      SheetsAPI.invalidateCache('원재료개별');
      const lots = await SheetsAPI.getAll('원재료LOT', false);
      const allIndivs = await SheetsAPI.getAll('원재료개별');

      for (const [lotId, count] of Object.entries(lotGroups)) {
        const lot = lots.find(l => l[0] === lotId);
        if (!lot) continue;
        // 개별 단위(perUnit) 기반 차감 — 투입량 편차에 의한 오차 방지
        const totalIndivCount = parseInt(lot[10]) || 1;
        const totalQty = parseFloat(lot[4]) || 0;
        const perUnit = totalQty / totalIndivCount;
        const prevRemain = parseFloat(lot[8]) || 0;
        const deductQty = perUnit * count;
        const newRemain = Math.max(0, prevRemain - deductQty);
        // 활성 개별 수 기준 소진 판정
        const activeIndivs = allIndivs.filter(iv => iv[1] === lotId && !['폐기','소진'].includes(iv[3]));
        const newStatus = activeIndivs.length === 0 ? '소진' : '사용중';
        await SheetsAPI.updateRow('원재료LOT', 0, lotId, {
          8: String(newRemain.toFixed(2)),
          9: newStatus,
        });
        console.log(`[재고차감] ${lotId}: -${count}개(${deductQty.toFixed(2)}kg), 잔량 ${prevRemain}→${newRemain.toFixed(2)}, 활성 ${activeIndivs.length}개, 상태 ${newStatus}`);
      }
      usedLotIds = scannedItems.map(s => s.lotId).filter(Boolean).join(',');
    }

    // qr-label step: QR 라벨 수량 저장
    if (stepType === 'qr-label') {
      const qrQty = parseInt($id(`qr-label-qty-${stepNo}`)?.value) || State.woExec.packCount || 0;
      if (qrQty > 0) {
        await SheetsAPI.updateCell('작업지시서', 0, woId, 7, String(qrQty));
        State.woExec.packCount = qrQty;
      }
    }

    // seal step: 최종 완제품 수량 반영
    if (stepType === 'seal') {
      const sealQty = parseInt($id(`seal-qty-${stepNo}`)?.value);
      if (sealQty > 0) {
        await SheetsAPI.updateCell('작업지시서', 0, woId, 7, String(sealQty));
        State.woExec.packCount = sealQty;
      }
    }

    // 사진 업로드
    const photos = collectStepPhotos(stepNo, stepType);
    let photoUrls = '';
    if (photos.length > 0) {
      toast('사진 업로드 중...', 'info', 2000);
      photoUrls = await uploadStepPhotos(photos);
    }

    // 새 사진이 없으면 기존 저장된 사진 URL 유지
    const allRecords = await SheetsAPI.getAll('공정기록').catch(() => []);
    const existingIdx = allRecords.findIndex(r => r[0] === woId && r[1] === String(stepNo));
    if (!photoUrls && existingIdx >= 0) {
      photoUrls = allRecords[existingIdx][6] || '';
    }

    // 입력값 수집
    const stepData = collectStepData(stepNo, stepType, step);

    // 기존 임시저장 기록 있으면 덮어쓰기, 없으면 새로 추가
    if (existingIdx >= 0) {
      await SheetsAPI.updateRowByIndex('공정기록', existingIdx + 2, {
        0: woId, 1: step[1], 2: step[2], 3: step[3],
        4: usedLotIds, 5: stepData, 6: photoUrls,
        7: '', 8: '', 9: '', 10: '완료',
        11: formatDateTime(), 12: State.user?.email
      });
    } else {
      await SheetsAPI.append('공정기록', [
        woId, step[1], step[2], step[3],
        usedLotIds, stepData, photoUrls,
        '', '', '', '완료',
        formatDateTime(), State.user?.email
      ]);
    }
    SheetsAPI.invalidateCache('공정기록');

    // Update lastSavedStep — 절대 감소하지 않음 (maxStep 보호)
    const prevMaxStep = State.woExec.maxStep || 0;
    const newMaxStep = Math.max(currentStep + 1, prevMaxStep);
    State.woExec.maxStep = newMaxStep;
    await SheetsAPI.updateCell('작업지시서', 0, woId, 13, String(newMaxStep));
    console.log(`[WO실행] completeStep: step=${currentStep}, prevMaxStep=${prevMaxStep}, newMaxStep=${newMaxStep}`);

    // 업로드 완료된 사진 State에서 제거 (재업로드 방지)
    if (State.woExec._pendingPhotos) {
      delete State.woExec._pendingPhotos[stepNo];
      if (stepType === 'pack') { for (let n=1;n<=3;n++) delete State.woExec._pendingPhotos[`${stepNo}-s${n}`]; }
      if (stepType === 'seal') { for (let n=1;n<=3;n++) delete State.woExec._pendingPhotos[`${stepNo}-seal${n}`]; }
      if (stepType === 'inspect') delete State.woExec._pendingPhotos[`${stepNo}-ccp7`];
    }

    // records 캐시 갱신 — 이후 단계 이동 시 최신 데이터 복원 가능하도록
    try {
      const freshRecords = await SheetsAPI.getAll('공정기록', false);
      State.woExec.records = freshRecords.filter(r => r[0] === woId);
    } catch (e) { console.warn('[WO실행] records 갱신 실패:', e.message); }

    // 다음 공정으로 이동
    State.woExec.currentStep = currentStep + 1;
    hideLoading();
    renderWOExecute();
  } catch (e) {
    hideLoading();
    toast('공정 기록 실패: ' + e.message, 'err');
  } finally {
    releaseLock('completeStep');
  }
}

async function submitForApproval() {
  confirm('냉동보관 시작', '모든 공정이 완료되었습니다. 냉동보관을 시작하시겠습니까?\n12시간 이후 관리자가 출하승인하면 완제품 재고로 등록됩니다.', async () => {
    if (!acquireLock('submitForApproval')) return;
    try {
      showLoading();
      const { woId, steps } = State.woExec;

      // ── 전체 공정기록 완료 검증 ──
      const allRecords = await SheetsAPI.getAll('공정기록').catch(() => []);
      const woRecords = allRecords.filter(r => r[0] === woId);
      const missingSteps = [];
      // 마지막 스텝(현재 스텝)은 아래에서 저장하므로 제외하고 검증
      for (let i = 0; i < steps.length - 1; i++) {
        const sNo = steps[i][1]; // stepNo (string)
        const rec = woRecords.find(r => r[1] === String(sNo) && r[10] === '완료');
        if (!rec) missingSteps.push(`${sNo}. ${steps[i][2] || ''}`);
      }
      if (missingSteps.length > 0) {
        hideLoading();
        toast(`⚠️ 미완료 공정이 있습니다:\n• ${missingSteps.join('\n• ')}\n\n모든 공정을 순서대로 완료해주세요.`, 'err', 6000);
        return;
      }

      const freezeStart = formatDateTime();

      // Save last step record with photos and data
      const step = steps[State.woExec.currentStep];
      const stepNo = parseInt(step[1]);
      const stepType = step[3] || 'store';
      const photos = collectStepPhotos(stepNo, stepType);
      let photoUrls = '';
      if (photos.length > 0) {
        toast('사진 업로드 중...', 'info', 2000);
        photoUrls = await uploadStepPhotos(photos);
      }
      // 새 사진이 없으면 기존 저장된 사진 URL 유지
      const existingIdx = allRecords.findIndex(r => r[0] === woId && r[1] === String(stepNo));
      if (!photoUrls && existingIdx >= 0) {
        photoUrls = allRecords[existingIdx][6] || '';
      }
      const stepData = collectStepData(stepNo, stepType, step);

      if (existingIdx >= 0) {
        await SheetsAPI.updateRowByIndex('공정기록', existingIdx + 2, {
          0: woId, 1: step[1], 2: step[2], 3: step[3],
          4: '', 5: stepData, 6: photoUrls,
          7: '', 8: '', 9: '', 10: '완료',
          11: formatDateTime(), 12: State.user?.email
        });
      } else {
        await SheetsAPI.append('공정기록', [
          woId, step[1], step[2], step[3],
          '', stepData, photoUrls,
          '', '', '', '완료',
          formatDateTime(), State.user?.email
        ]);
      }
      SheetsAPI.invalidateCache('공정기록');

      // Update WO status → 냉동보관중
      await SheetsAPI.updateRow('작업지시서', 0, woId, {
        10: formatDateTime(),   // endTime
        11: freezeStart,        // freezeStartTime
        12: '냉동보관중',        // status
        13: String(State.woExec.steps.length), // lastSavedStep
      });

      toast('냉동보관이 시작되었습니다. 12시간 후 출하승인 가능합니다.', 'suc');
      Router.go('production');
    } catch (e) {
      toast('냉동보관 시작 실패: ' + e.message, 'err');
    } finally {
      hideLoading();
      releaseLock('submitForApproval');
    }
  });
}

// QR scan for material input during WO execution
let _qrScannerInstance = null;

function startQRCamera(stepNo, rmCode) {
  const cameraArea = $id(`qr-camera-area-${stepNo}`);
  if (!cameraArea) return;

  // Stop previous instance
  if (_qrScannerInstance) { try { _qrScannerInstance.stop(); } catch(e){} _qrScannerInstance = null; }

  cameraArea.innerHTML = '';
  cameraArea.style.minHeight = '250px';
  cameraArea.style.background = '#000';
  cameraArea.id = `qr-camera-area-${stepNo}`;

  if (typeof Html5Qrcode === 'undefined') {
    cameraArea.innerHTML = '<div class="fs-12 c-err" style="text-align:center;padding:20px">QR 스캐너를 불러올 수 없습니다</div>';
    return;
  }

  try {
    _qrScannerInstance = new Html5Qrcode(`qr-camera-area-${stepNo}`);
    _qrScannerInstance.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 },
      (decodedText) => {
        // QR 인식 성공 → 카메라 멈추고 조회
        try { _qrScannerInstance.stop(); } catch(e){}
        cameraArea.innerHTML = '<div class="fs-12 c-suc" style="text-align:center;padding:12px">✅ QR 인식 완료</div>';
        cameraArea.style.minHeight = '';
        cameraArea.style.background = '';
        processScannedQR(stepNo, rmCode, decodedText);
      },
      () => {} // scan miss — ignore
    ).catch((err) => {
      cameraArea.style.minHeight = '';
      cameraArea.style.background = '';
      cameraArea.innerHTML = '<div class="fs-12 c-err" style="text-align:center;padding:12px">카메라 접근이 거부되었습니다.<br>브라우저 설정에서 카메라 권한을 허용해주세요.</div>';
    });
  } catch(e) {
    cameraArea.innerHTML = '<div class="fs-12 c-err" style="text-align:center;padding:12px">카메라 초기화 실패</div>';
  }
}

async function processScannedQR(stepNo, rmCode, qrId) {
  if (!qrId) return;

  try {
    showLoading();
    const indivs = await SheetsAPI.getAll('원재료개별');
    const indiv = indivs.find(r => r[0] === qrId);
    if (!indiv) { toast('해당 QR을 찾을 수 없습니다', 'err'); hideLoading(); return; }

    const lots = await SheetsAPI.getAll('원재료LOT');
    const lot = lots.find(l => l[0] === indiv[1]);

    // Save scanned item
    if (!State.woExec._scannedLots) State.woExec._scannedLots = {};
    if (!State.woExec._scannedLots[stepNo]) State.woExec._scannedLots[stepNo] = [];

    // Prevent duplicate
    if (State.woExec._scannedLots[stepNo].find(s => s.qrId === qrId)) {
      toast('이미 스캔된 QR입니다', 'warn');
      hideLoading();
      return;
    }

    State.woExec._scannedLots[stepNo].push({
      qrId, lotId: indiv[1], name: lot?.[2] || '', remain: indiv[4] || '0',
      expiry: (lot?.[7]||'').substring(0,10), status: indiv[3] || ''
    });

    hideLoading();
    renderScannedList(stepNo);
    validateStepInputs(stepNo);
    toast(`${qrId} 스캔 완료`, 'suc');
  } catch (e) {
    hideLoading();
    toast('조회 실패: ' + e.message, 'err');
  }
}

function renderScannedList(stepNo) {
  const listEl = $id(`scanned-list-${stepNo}`);
  if (!listEl) return;
  const items = State.woExec._scannedLots?.[stepNo] || [];

  if (items.length === 0) { listEl.innerHTML = ''; return; }

  const useType = State.woExec._useType?.[stepNo];
  listEl.innerHTML = `
    <div class="fs-12 fw-6 c-txt-l mb-4">투입 제품 목록 (${items.length}건)</div>
    ${items.map((item, i) => `
      <div class="card" style="padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--suc);flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          ${useType === 'full' ? `
            <div class="lot-id" style="font-size:12px">${item.qrId}</div>
            <div class="fs-11 c-txt-l">전량 소진</div>
          ` : `
            <div class="fs-12 fw-6">${item.name}</div>
            <div class="lot-id" style="font-size:11px;font-weight:600">${item.qrId}</div>
            <div class="fs-11 c-txt-l">잔량 ${item.remain}kg · ${item.expiry}</div>
          `}
        </div>
        <button class="btn btn-sm" style="padding:2px 8px;font-size:11px;color:var(--err);background:none;border:1px solid var(--err)"
                onclick="removeScannedItem(${stepNo},${i})">삭제</button>
      </div>
    `).join('')}
  `;
}

function removeScannedItem(stepNo, index) {
  if (State.woExec._scannedLots?.[stepNo]) {
    State.woExec._scannedLots[stepNo].splice(index, 1);
    renderScannedList(stepNo);
    validateStepInputs(stepNo);
  }
}

function setUseType(stepNo, type) {
  const btnFull = $id(`btn-full-${stepNo}`);
  const btnPartial = $id(`btn-partial-${stepNo}`);
  const multiLot = $id(`multi-lot-${stepNo}`);

  if (!State.woExec._useType) State.woExec._useType = {};
  State.woExec._useType[stepNo] = type;

  // Reset both buttons
  if (btnFull) { btnFull.style.background = 'transparent'; btnFull.style.color = 'var(--info)'; }
  if (btnPartial) { btnPartial.style.background = 'transparent'; btnPartial.style.color = 'var(--warn)'; }

  if (type === 'full') {
    // Fill blue
    if (btnFull) { btnFull.style.background = 'var(--info)'; btnFull.style.color = '#fff'; }
    if (multiLot) multiLot.style.display = '';
  } else {
    // Fill orange
    if (btnPartial) { btnPartial.style.background = 'var(--warn)'; btnPartial.style.color = '#fff'; }
    if (multiLot) multiLot.style.display = 'none';
  }
  renderScannedList(stepNo);
  validateStepInputs(stepNo);
}

function validateStepInputs(stepNo) {
  const step = State.woExec?.steps?.[State.woExec?.currentStep];
  if (!step) return;
  const stepType = step[3] || 'input';
  const isWater = (step[4] || '') === 'RM002';

  let allValid = true;

  if (stepType === 'input') {
    // Check: 투입량 입력됨?
    const qtyInput = $id(`input-qty-${stepNo}`);
    const qtyVal = parseFloat(qtyInput?.value);
    if (!qtyVal || qtyVal <= 0) allValid = false;

    // Check: ±5% 범위 내?
    const targetVal = parseFloat(qtyInput?.dataset?.target || '0');
    let rangeHint = $id(`qty-range-hint-${stepNo}`);
    if (!rangeHint) {
      rangeHint = document.createElement('div');
      rangeHint.id = `qty-range-hint-${stepNo}`;
      rangeHint.style.cssText = 'font-size:11px;margin-top:4px';
      qtyInput?.closest('.input-group')?.appendChild(rangeHint);
    }
    if (targetVal > 0 && qtyVal > 0) {
      const lo = targetVal * 0.95, hi = targetVal * 1.05;
      if (qtyVal >= lo && qtyVal <= hi) {
        rangeHint.innerHTML = `<span style="color:var(--suc)">✓ 허용 범위 내 (${lo.toFixed(1)}~${hi.toFixed(1)}kg)</span>`;
      } else {
        rangeHint.innerHTML = `<span style="color:var(--err)">✗ 목표 대비 ±5% 초과 (허용: ${lo.toFixed(1)}~${hi.toFixed(1)}kg)</span>`;
        allValid = false;
      }
    } else if (targetVal > 0) {
      const lo = targetVal * 0.95, hi = targetVal * 1.05;
      rangeHint.innerHTML = `<span style="color:var(--gray)">허용 범위: ${lo.toFixed(1)}~${hi.toFixed(1)}kg (±5%)</span>`;
    }

    // Check: 사진 첨부됨?
    const photoPreview = $id(`photo-preview-${stepNo}`);
    if (!photoPreview || !photoPreview.innerHTML.trim()) allValid = false;

    // Check: 체크항목 전부 체크됨?
    const checks = (step[6] || '').split(',').filter(c => c.trim());
    checks.forEach((_, i) => {
      const cb = $id(`check-${stepNo}-${i}`);
      if (cb && cb.textContent !== '✓') allValid = false;
    });

    // Check: QR 스캔됨? (물 제외)
    if (!isWater) {
      const scanned = State.woExec._scannedLots?.[stepNo]?.length || 0;
      if (scanned === 0) allValid = false;
    }
  }

  // process 타입 검증
  if (stepType === 'process') {
    const checks = (step[6] || '').split(',').filter(c => c.trim());
    const isMixing = (step[2]||'').includes('믹싱');
    const allChecks = [...checks];
    if (isMixing) {
      if (!allChecks.includes('RPM 확인')) allChecks.push('RPM 확인');
      if (!allChecks.includes('믹싱 시간 확인')) allChecks.push('믹싱 시간 확인');
    }
    allChecks.forEach((_, i) => {
      const cb = $id(`check-${stepNo}-${i}`);
      if (cb && cb.textContent !== '✓') allValid = false;
    });
    const photoPreview = $id(`photo-preview-${stepNo}`);
    if (!photoPreview || !photoPreview.innerHTML.trim()) allValid = false;
  }

  // inspect 타입 검증 (CCP) — 전체 합격 + 시간 + 사진
  if (stepType === 'inspect') {
    if (!$id('ccp-time-1')?.value) allValid = false;
    if ($id('ccp2-fe')?.dataset?.result !== '합격') allValid = false;
    if ($id('ccp2-sus')?.dataset?.result !== '합격') allValid = false;
    if ($id('ccp3-fe')?.dataset?.result !== '합격') allValid = false;
    if ($id('ccp3-sus')?.dataset?.result !== '합격') allValid = false;
    if (!$id('ccp-time-4')?.value) allValid = false;
    const ccp5c = document.getElementById('ccp5-records-' + stepNo);
    if (ccp5c) {
      ccp5c.querySelectorAll('.ccp5-record').forEach(rec => {
        if (rec.dataset?.result !== '합격') allValid = false;
      });
    }
    if ($id('ccp6-fe')?.dataset?.result !== '합격') allValid = false;
    if ($id('ccp6-sus')?.dataset?.result !== '합격') allValid = false;
    const ccpTotal = parseInt($id('ccp-total')?.value);
    if (!ccpTotal || ccpTotal <= 0) allValid = false;
    const ccpPhoto = $id(`photo-preview-${stepNo}-ccp7`);
    if (!ccpPhoto || !ccpPhoto.innerHTML.trim()) allValid = false;
  }

  // pack 타입 검증
  if (stepType === 'pack') {
    const packQty = parseInt($id(`pack-qty-${stepNo}`)?.value);
    if (!packQty || packQty <= 0) allValid = false;
    for (let n = 1; n <= 3; n++) {
      const prev = $id(`photo-preview-${stepNo}-s${n}`);
      if (!prev || !prev.innerHTML.trim()) allValid = false;
      const wt = parseFloat($id(`sample-wt-${stepNo}-${n}`)?.value);
      if (!wt || wt <= 0) allValid = false;
    }
  }

  // seal 타입 검증
  if (stepType === 'seal') {
    const sealCheck0 = $id(`check-seal-${stepNo}-0`);
    const sealCheck1 = $id(`check-seal-${stepNo}-1`);
    if (!sealCheck0 || sealCheck0.textContent !== '✓') allValid = false;
    if (!sealCheck1 || sealCheck1.textContent !== '✓') allValid = false;
    for (let n = 1; n <= 3; n++) {
      const prev = $id(`photo-preview-${stepNo}-seal${n}`);
      if (!prev || !prev.innerHTML.trim()) allValid = false;
    }
    const sealQty = parseInt($id(`seal-qty-${stepNo}`)?.value);
    if (!sealQty || sealQty <= 0) allValid = false;
  }

  // qr-label 타입 검증
  if (stepType === 'qr-label') {
    const qrQty = parseInt($id(`qr-label-qty-${stepNo}`)?.value);
    if (!qrQty || qrQty <= 0) allValid = false;
  }

  // store 타입 검증
  if (stepType === 'store') {
    const photoPreview = $id(`photo-preview-${stepNo}`);
    if (!photoPreview || !photoPreview.innerHTML.trim()) allValid = false;
  }

  // Enable/disable next button
  const nextBtn = document.querySelector('#step-content ~ div .btn-pri, #step-content ~ div .btn-suc');
  // Find the bottom buttons container
  const bottomBtns = document.querySelectorAll('#content > div:last-child button');
  bottomBtns.forEach(btn => {
    if (btn.textContent.includes('공정 완료') || btn.textContent.includes('전체 완료')) {
      btn.dataset.valid = allValid ? 'true' : 'false';
      btn.style.opacity = allValid ? '1' : '0.4';
    }
  });
}

              if (stepData.ccpTotal) dataHtml += `<div class="fs-11 c-txt-l mt-4">검사 수량: <strong>${stepData.ccpTotal}개</strong></div>`;
              if (stepData.times) {
                const timeEntries = Object.entries(stepData.times);
                if (timeEntries.length) dataHtml += `<div class="fs-11 c-txt-l">${timeEntries.map(([k,v])=>`${k}: ${v}`).join(' · ')}</div>`;
              }
            }
            if (type === 'qr-label' && stepData.qrQty) {
              dataHtml += `<div class="fs-11 c-txt-l mt-4">QR 라벨 수량: <strong>${stepData.qrQty}매</strong></div>`;
            }
            if (type === 'store' && stepData.freezeStart) {
              dataHtml += `<div class="fs-11 c-txt-l mt-4">냉동 시작: <strong>${stepData.freezeStart}</strong></div>`;
            }

            const statusIcon = recordStatus === '완료' ? '✓' : (recordStatus === '임시저장' ? '⏸' : '✓');
            const statusBg = recordStatus === '임시저장' ? 'var(--warn)' : 'var(--suc)';

            return `
            <div class="card" style="padding:0;overflow:hidden;margin-bottom:6px">
              <div style="padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px"
                   onclick="const d=this.nextElementSibling;d.style.display=d.style.display==='none'?'block':'none';this.querySelector('.arrow').textContent=d.style.display==='none'?'▸':'▾'">
                <div style="width:28px;height:28px;border-radius:14px;background:${statusBg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${statusIcon}</div>
                <div style="flex:1">
                  <div class="fs-13 fw-6">${stepNo}. ${name}</div>
                  <div class="fs-11 c-txt-l">${time} · ${worker.split('@')[0]}</div>
                </div>
                <span style="background:${typeColor}15;color:${typeColor};font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600">${typeLabel}</span>
                <span class="arrow" style="color:var(--txt-l);font-size:12px">▸</span>
              </div>
              <div style="display:none;padding:0 12px 10px;border-top:1px solid var(--gray-l)">
                <div class="fs-11 c-txt-l mt-8">공정 유형: <strong>${type}</strong> ${recordStatus ? `<span style="background:${recordStatus==='완료'?'var(--suc)':'var(--warn)'}22;color:${recordStatus==='완료'?'var(--suc)':'var(--warn)'};padding:1px 4px;border-radius:3px;font-size:10px;margin-left:4px">${recordStatus}</span>` : ''}</div>
                <div class="fs-11 c-txt-l">기록 시간: ${r[11]||'-'}</div>
                <div class="fs-11 c-txt-l">작업자: ${worker}</div>
                ${lotList.length > 0 ? `
                  <div class="fs-11 fw-6 mt-8 mb-4">사용 원재료 LOT (${lotList.length}건)</div>
                  ${lotList.map(lot => `<div class="fs-11 c-info" style="padding:2px 0">📦 ${lot}</div>`).join('')}
                ` : ''}
                ${dataHtml}
                ${photoUrls.length > 0 ? `
                  <div class="fs-11 fw-6 mt-8 mb-4">📷 촬영 사진 (${photoUrls.length}장)</div>
                  <div style="display:flex;gap:6px;flex-wrap:wrap">
                    ${photoUrls.map((url, pi) => `<a href="${url}" target="_blank" rel="noopener" style="display:block;width:64px;height:64px;border-radius:6px;background:#f0f0f0;border:1px solid var(--gray-l);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--pri);text-decoration:none">사진${pi+1}</a>`).join('')}
                  </div>
                ` : ''}
                ${!dataHtml && photoUrls.length === 0 && lotList.length === 0 ? `<div class="fs-11 c-txt-l mt-4" style="font-style:italic">저장된 상세 기록 없음</div>` : ''}
              </div>
            </div>`;
          }).join('')}
      </div>
    `;

    hideLoading();
  } catch (e) {
    hideLoading();
    toast('로드 실패: ' + e.message, 'err');
  }
};

/* ═══════════════════════════════════════════════
   PDF 생성 (HACCP 작업지시서 보고서) v4
   — 라벨 짤림 수정, 빈페이지 제거, 사진 Drive API,
     CCP JSON 파싱, PDF 폴더 분리
   ═══════════════════════════════════════════════ */
async function generateWOPdf(woId) {
  const { jsPDF } = window.jspdf;

  /* ── 데이터 로드 ── */
  const wos = await SheetsAPI.getAll('작업지시서', false);
  const wo = wos.find(w => w[0] === woId);
  if (!wo) throw new Error('작업지시서를 찾을 수 없습니다');

  const records = (await SheetsAPI.getAll('공정기록', false)).filter(r => r[0] === woId);
  records.sort((a, b) => parseInt(a[1]) - parseInt(b[1]));

  /* ── 한글 폰트 로드 ── */
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297, M = 15, CW = PW - M * 2;
  let y = M;

  let fontLoaded = false;
  try {
    const fontUrls = [
      'https://cdn.jsdelivr.net/gh/nicecai/nanum-font@master/NanumGothic.ttf',
      'https://fastly.jsdelivr.net/gh/nicecai/nanum-font@master/NanumGothic.ttf'
    ];
    let fontBuf = null;
    for (const fUrl of fontUrls) {
      try {
        const resp = await fetch(fUrl, { signal: AbortSignal.timeout(8000) });
        if (resp.ok) { fontBuf = await resp.arrayBuffer(); break; }
      } catch(e) { continue; }
    }
    if (fontBuf) {
      let binary = '';
      const bytes = new Uint8Array(fontBuf);
      for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
      const b64Font = btoa(binary);
      doc.addFileToVFS('NanumGothic.ttf', b64Font);
      doc.addFont('NanumGothic.ttf', 'NanumGothic', 'normal');
      doc.addFont('NanumGothic.ttf', 'NanumGothic', 'bold');
      doc.setFont('NanumGothic', 'normal');
      fontLoaded = true;
      console.log('[PDF] 한글 폰트 로드 성공');
    }
  } catch(e) { console.warn('[PDF] 폰트 로드 실패:', e); }

  /* ── Canvas fallback ── */
  const _cfont = '"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif';
  const SC = 4;

  const canvasTextImg = (text, fs, fw, mw, color) => {
    const c = document.createElement('canvas'), ctx = c.getContext('2d');
    ctx.font = `${fw||'normal'} ${fs*SC}px ${_cfont}`;
    const lines = []; let rem = String(text||'');
    while (rem.length > 0) {
      let end = rem.length;
      while (end > 0 && ctx.measureText(rem.substring(0, end)).width > mw*SC) end--;
      if (end === 0) end = 1;
      lines.push(rem.substring(0, end)); rem = rem.substring(end);
    }
    if (lines.length === 0) lines.push('');
    const lh = fs * SC * 1.35;
    c.width = mw * SC + 4;
    c.height = lh * lines.length + fs * SC * 0.2;
    ctx.font = `${fw||'normal'} ${fs*SC}px ${_cfont}`;
    ctx.fillStyle = color || '#000'; ctx.textBaseline = 'top';
    for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], 0, i * lh);
    return { d: c.toDataURL('image/png'), w: c.width / SC, h: c.height / SC, lines: lines.length };
  };

  /* ── 텍스트 렌더링 ── */
  const LH_FACTOR = 0.4; // 줄 높이 계수 (축소)

  const drawText = (text, x, yy, fs, fw, color, mw, align) => {
    if (!text && text !== 0) return { h: 0, y: yy };
    const str = String(text);
    const maxW = mw || CW;
    if (fontLoaded) {
      doc.setFont('NanumGothic', fw === 'bold' ? 'bold' : 'normal');
      doc.setFontSize(fs); doc.setTextColor(color || '#000');
      const splitLines = doc.splitTextToSize(str, maxW);
      const lineH = fs * LH_FACTOR;
      const totalH = splitLines.length * lineH;
      if (yy + totalH > PH - 12) { doc.addPage(); yy = M; }
      for (let i = 0; i < splitLines.length; i++) {
        const tx = align === 'center' ? x + maxW / 2 : (align === 'right' ? x + maxW : x);
        const opt = align ? { align } : {};
        doc.text(splitLines[i], tx, yy + i * lineH + fs * 0.28, opt);
      }
      return { h: totalH, y: yy };
    } else {
      const img = canvasTextImg(str, fs, fw, maxW, color);
      if (yy + img.h > PH - 12) { doc.addPage(); yy = M; }
      doc.addImage(img.d, 'PNG', x, yy, img.w, img.h);
      return { h: img.h, y: yy };
    }
  };

  const measureH = (text, fs, fw, mw) => {
    if (!text && text !== 0) return 0;
    const str = String(text); const maxW = mw || CW;
    if (fontLoaded) {
      doc.setFont('NanumGothic', fw === 'bold' ? 'bold' : 'normal');
      doc.setFontSize(fs);
      return doc.splitTextToSize(str, maxW).length * fs * LH_FACTOR;
    } else {
      const c = document.createElement('canvas'), ctx = c.getContext('2d');
      ctx.font = `${fw||'normal'} ${fs*SC}px ${_cfont}`;
      let rem = str, lines = 0;
      while (rem.length > 0) {
        let end = rem.length;
        while (end > 0 && ctx.measureText(rem.substring(0, end)).width > maxW*SC) end--;
        if (end === 0) end = 1;
        rem = rem.substring(end); lines++;
      }
      return lines * (fs * 1.35) / SC + fs * 0.2 / SC;
    }
  };

  const hLine = (yy, color, w) => {
    doc.setDrawColor(...(color||[21,101,192])); doc.setLineWidth(w||0.4);
    doc.line(M, yy, PW - M, yy);
  };

  /* ── Drive 사진 로드 (인증된 Drive API 사용) ── */
  const loadPhoto = async (url) => {
    try {
      if (!url || !url.trim()) return null;
      const u = url.trim();
      let fileId = null;
      const m1 = u.match(/\/d\/([^\/\?]+)/);
      const m2 = u.match(/[?&]id=([^&]+)/);
      const m3 = u.match(/^([a-zA-Z0-9_-]{20,})$/);
      if (m1) fileId = m1[1];
      else if (m2) fileId = m2[1];
      else if (m3) fileId = m3[1];
      else return null;
      const token = localStorage.getItem('mt_token') || State.token;
      if (!token) return null;
      const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!resp.ok) return null;
      const blob = await resp.blob();
      return await new Promise(r => {
        const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob);
      });
    } catch { return null; }
  };

  /* ── 테이블 행 ── */
  const ROW_FS = 6, ROW_PAD = 1.2, MIN_ROW_H = 4.5;
  const LABEL_W = 35; // 라벨 너비 (한글 5자까지 한 줄 표시)

  const tableRow = (label, value, yy, labelW) => {
    const lw = labelW || LABEL_W;
    const vw = CW - lw;
    const valStr = (!value && value !== 0) || value === '-' || value === '' ? '내용 없음' : String(value);
    const lh = measureH(label, ROW_FS, 'bold', lw - 3);
    const vh = measureH(valStr, ROW_FS, 'normal', vw - 3);
    const rh = Math.max(lh + ROW_PAD * 2, vh + ROW_PAD * 2, MIN_ROW_H);
    if (yy + rh > PH - 12) { doc.addPage(); yy = M; }
    doc.setFillColor(240, 244, 250);
    doc.rect(M, yy, lw, rh, 'F');
    doc.setDrawColor(200, 210, 230); doc.setLineWidth(0.15);
    doc.rect(M, yy, CW, rh);
    doc.line(M + lw, yy, M + lw, yy + rh);
    const lTextY = yy + (rh - lh) / 2;
    const vTextY = yy + (rh - vh) / 2;
    drawText(label, M + 1.5, lTextY, ROW_FS, 'bold', '#333', lw - 3);
    const vColor = valStr === '내용 없음' ? '#999' : '#222';
    drawText(valStr, M + lw + 1.5, vTextY, ROW_FS, 'normal', vColor, vw - 3);
    return { nextY: yy + rh, height: rh };
  };

  /* ── 섹션 제목 ── */
  const sectionTitle = (text, yy, color) => {
    const h = measureH(text, 8, 'bold', CW);
    if (yy + h + 5 > PH - 12) { doc.addPage(); yy = M; }
    const r = drawText(text, M, yy, 8, 'bold', color || '#1565c0', CW);
    yy = r.y + r.h + 1.5;
    hLine(yy); yy += 2;
    return yy;
  };

  /* ── 공정 페이지 헤더 (높이 확대, 겹침 방지) ── */
  const processHeader = (title, subtitle) => {
    const headerH = 28; // 높이 확대 (22→28)
    doc.setFillColor(21, 101, 192);
    doc.rect(0, 0, PW, headerH, 'F');
    // 왼쪽: 공정명 (1줄만, 크기 축소)
    drawText(title, M, 4, 9, 'bold', '#ffffff', CW * 0.55);
    // 왼쪽: 유형|상태 (아래쪽, 충분한 간격)
    if (subtitle) drawText(subtitle, M, 16, 6, 'normal', '#bbdefb', CW * 0.55);
    // 오른쪽: WO번호 (크기 축소)
    drawText(woId, PW - M - 50, 5, 6, 'normal', '#bbdefb', 50);
    // 오른쪽: 제품명
    drawText(wo[4]||'', PW - M - 50, 14, 6, 'normal', '#e3f2fd', 50);
    return headerH + 3;
  };

  /* ═══════════════════════════════════════════
     PAGE 1: 표지 + 기본 정보 + HACCP 요약
     ═══════════════════════════════════════════ */
  doc.setFillColor(21, 101, 192);
  doc.rect(0, 0, PW, 42, 'F');
  drawText('HACCP 생산 기록서', M, 6, 14, 'bold', '#ffffff', CW);
  drawText('작업지시서 (Work Order Report)', M, 18, 8, 'normal', '#bbdefb', CW);
  drawText(woId, M, 27, 7, 'normal', '#e3f2fd', CW);
  // 문서 생성 날짜 (오른쪽 정렬, 줄내림 방지)
  drawText(`${formatDateTime()}`, PW - M - 50, 34, 6, 'normal', '#90caf9', 50, 'right');
  y = 47;

  // ── 1. 기본 정보 ──
  y = sectionTitle('1. 기본 정보', y);

  const infoData = [
    ['제품명', wo[4] || '-'],
    ['제품코드', wo[3] || '-'],
    ['SOP', wo[1] || '-'],
    ['생산량', `${wo[5] || '-'} kg`],
    ['포장단위', wo[6] || '-'],
    ['포장수량', `${wo[7] || '-'} 개`],
    ['작업자', wo[8] || '-'],
    ['시작일시', (wo[9] || '-').substring(0, 16)],
    ['완료일시', (wo[10] || '-').substring(0, 16)],
    ['냉동시작', wo[11] || '-'],
    ['상태', wo[12] || '-'],
    ['완제품LOT', wo[14] || '-'],
    ['승인자', wo[15] || ''],
    ['승인일시', wo[16] ? wo[16].substring(0, 16) : ''],
  ];
  for (const [label, value] of infoData) {
    const r = tableRow(label, value, y);
    y = r.nextY;
  }
  y += 5;

  // ── 2. HACCP 관리 요약 ──
  const ccpRecords = records.filter(r => r[3] === 'inspect');
  const inputRecords = records.filter(r => r[3] === 'input');
  const storeRecords = records.filter(r => r[3] === 'store');

  y = sectionTitle('2. HACCP 관리 요약', y);

  const hacInfo = [
    ['총 공정', `${records.length}단계`],
    ['CCP 검사', `${ccpRecords.length}건`],
    ['원재료투입', `${inputRecords.length}건`],
    ['냉동보관', `${storeRecords.length}건`],
    ['LOT 추적', inputRecords.length > 0 ? '기록됨' : '해당 없음'],
    ['완료여부', records.every(r => r[10] === '완료') ? '전체 완료' : '일부 미완료'],
  ];
  for (const [label, value] of hacInfo) {
    const r = tableRow(label, value, y);
    y = r.nextY;
  }
  y += 4;

  // ── 3. 공정 목록 요약 (컴팩트 형식) ──
  y = sectionTitle('3. 공정 목록 요약', y);
  for (const rec of records) {
    const typeMap = {input:'투입',process:'믹싱',seal:'포장',inspect:'CCP','qr-label':'라벨',store:'보관',pack:'계량'};
    const stepVal = `${typeMap[rec[3]]||rec[3]} | ${rec[10]||'미완료'} | ${(rec[11]||'').substring(11,16)||'-'}`;
    const r = tableRow(`${rec[1]}. ${rec[2]||''}`, stepVal, y, 55);
    y = r.nextY;
  }

  /* ═══════════════════════════════════════════
     각 공정별 페이지
     ═══════════════════════════════════════════ */
  for (let ri = 0; ri < records.length; ri++) {
    const rec = records[ri];
    const stepNo = rec[1] || '';
    const stepName = rec[2] || '';
    const stepType = rec[3] || '';
    const usedLots = rec[4] || '';
    const stepDataRaw = rec[5] || '';
    const photoUrlsRaw = rec[6] || '';
    const actualValue = rec[7] || '';
    const photoUrl = rec[8] || '';
    const checkResult = rec[9] || '';
    const recordStatus = rec[10] || '내용 없음';
    const completedAt = rec[11] || '';
    const worker = rec[12] || '내용 없음';

    const typeLabel = {input:'원재료 투입',process:'믹싱 공정',seal:'포장/밀봉',inspect:'CCP 검사(금속검출)','qr-label':'QR 라벨 출력',store:'냉동보관',pack:'계량/소분'}[stepType] || stepType;
    const isCCP = stepType === 'inspect';

    // ── 항상 새 페이지에서 시작 (각 공정은 독립 페이지) ──
    doc.addPage();
    y = processHeader(`공정 ${stepNo}. ${stepName}`, `${typeLabel}  |  ${recordStatus}`);

    // CCP 배너
    if (isCCP) {
      doc.setFillColor(255, 235, 238);
      doc.rect(M, y, CW, 9, 'F');
      doc.setDrawColor(211, 47, 47); doc.setLineWidth(0.5);
      doc.rect(M, y, CW, 9);
      drawText('⚠ HACCP CCP (Critical Control Point) — 중요관리점', M + 3, y + 2, 8, 'bold', '#c62828', CW - 6);
      y += 11;
    }

    // ── 기록 정보 ──
    y = sectionTitle('기록 정보', y);
    const baseInfo = [
      ['공정번호', stepNo],
      ['공정명', stepName],
      ['유형', typeLabel],
      ['작업자', worker],
      ['기록시간', completedAt ? completedAt.substring(0, 19) : '-'],
      ['상태', recordStatus],
    ];
    if (actualValue) baseInfo.push(['측정값', actualValue]);
    if (checkResult) baseInfo.push(['판정', checkResult]);

    for (const [l, v] of baseInfo) {
      const r = tableRow(l, v, y);
      y = r.nextY;
    }
    y += 4;

    // ── Step Data (작업자 기입 내용) ──
    let stepData = {};
    try { if (stepDataRaw) stepData = JSON.parse(stepDataRaw); } catch(e) {}
    const hasStepData = Object.keys(stepData).length > 0;

    if (hasStepData) {
      y = sectionTitle('작업자 기입 내용', y);

      // ★ 투입량: 목표 먼저, 실제 투입 나중 (순서 수정)
      if (stepData.inputQty != null || stepData.targetQty != null) {
        if (stepData.targetQty != null) {
          const r1 = tableRow('목표 투입량', `${stepData.targetQty} kg`, y);
          y = r1.nextY;
        }
        if (stepData.inputQty != null) {
          const r2 = tableRow('실제 투입량', `${stepData.inputQty} kg`, y);
          y = r2.nextY;
        }
        if (stepData.useType) {
          const r3 = tableRow('사용 구분', stepData.useType === 'full' ? '전량 사용' : '부분 사용', y);
          y = r3.nextY;
        }
      }

      // 체크항목 (HACCP 위생 점검)
      if (stepData.checks && stepData.checks.length > 0) {
        y += 3;
        const chkR = drawText('체크항목 (위생/품질 점검)', M, y, 8, 'bold', '#333', CW);
        y = chkR.y + chkR.h + 2;
        for (const c of stepData.checks) {
          if (y > PH - 12) { doc.addPage(); y = M; }
          const icon = c.checked ? '☑' : '☐';
          const txt = `${icon}  ${c.name}`;
          const chColor = c.checked ? '#2e7d32' : '#c62828';
          // 배경 박스
          doc.setFillColor(c.checked ? 232 : 255, c.checked ? 245 : 235, c.checked ? 233 : 238);
          doc.rect(M + 2, y, CW - 4, 7, 'F');
          drawText(txt, M + 4, y + 1, 6, 'normal', chColor, CW - 8);
          y += 6;
        }
        y += 2;
      }

      // 계량/포장
      if (stepData.packQty != null) {
        const r = tableRow('포장 수량', `${stepData.packQty} 개`, y);
        y = r.nextY;
      }
      if (stepData.samples && stepData.samples.length > 0) {
        y += 2;
        const sr = drawText('중량 검사 샘플 (HACCP 계량 검증)', M, y, 8, 'bold', '#333', CW);
        y = sr.y + sr.h + 2;
        for (let si = 0; si < stepData.samples.length; si++) {
          if (y > PH - 12) { doc.addPage(); y = M; }
          const s = stepData.samples[si];
          const r = tableRow(`샘플 #${si+1}`, `${s.weight||'-'} kg`, y);
          y = r.nextY;
        }
        y += 2;
      }

      // 밀봉/라벨
      if (stepData.sealQty != null) {
        let r;
        r = tableRow('최종 수량', `${stepData.sealQty} 개`, y); y = r.nextY;
        r = tableRow('라벨 부착 확인', stepData.labelCheck ? '확인 완료 ✓' : '미확인 ✗', y); y = r.nextY;
        r = tableRow('밀봉 상태 확인', stepData.sealCheck ? '확인 완료 ✓' : '미확인 ✗', y); y = r.nextY;
      }

      // CCP 검사 (금속검출 — HACCP 핵심)
      if (isCCP) {
        if (stepData.ccpTotal != null) { const r = tableRow('검사 총 수량', `${stepData.ccpTotal} 개`, y); y = r.nextY; }
        if (stepData.passCount != null) { const r = tableRow('합격 수량', `${stepData.passCount} 개`, y); y = r.nextY; }
        if (stepData.failCount != null) { const r = tableRow('불합격 수량', `${stepData.failCount} 개`, y); y = r.nextY; }
        if (stepData.times) {
          y += 2;
          const tr = drawText('CCP 모니터링 시간 기록', M, y, 8, 'bold', '#c62828', CW);
          y = tr.y + tr.h + 2;
          for (const [k, v] of Object.entries(stepData.times)) {
            if (y > PH - 12) { doc.addPage(); y = M; }
            const r = tableRow(k, v, y); y = r.nextY;
          }
        }
        // CCP 판정 결과 강조 박스
        y += 3;
        const ccpResult = (stepData.failCount != null && stepData.failCount > 0) ? '불합격 발생' : '전량 합격';
        const isPass = ccpResult === '전량 합격';
        doc.setFillColor(isPass ? 232 : 255, isPass ? 245 : 235, isPass ? 233 : 238);
        doc.rect(M, y, CW, 9, 'F');
        if (!isPass) { doc.setDrawColor(211, 47, 47); doc.setLineWidth(0.5); doc.rect(M, y, CW, 9); }
        drawText(`CCP 판정 결과: ${ccpResult}`, M + 3, y + 2, 8, 'bold', isPass ? '#2e7d32' : '#c62828', CW - 6);
        y += 11;
      }

      // QR 라벨
      if (stepData.qrQty) { const r = tableRow('QR 라벨 발행 수', `${stepData.qrQty} 매`, y); y = r.nextY; }

      // 냉동보관
      if (stepData.freezeStart) {
        let r;
        r = tableRow('냉동 시작 시간', stepData.freezeStart, y); y = r.nextY;
        r = tableRow('냉동 온도', stepData.freezeTemp || '-18°C (기본)', y); y = r.nextY;
      }

      // 기타 데이터 (JSON 파싱하여 읽기 쉽게 표시)
      const shownKeys = ['inputQty','targetQty','useType','checks','packQty','samples','sealQty',
        'labelCheck','sealCheck','ccpTotal','passCount','failCount','times','qrQty','freezeStart','freezeTemp'];
      const extraKeys = Object.keys(stepData).filter(k => !shownKeys.includes(k));
      if (extraKeys.length > 0) {
        y += 2;
        const er = drawText('기타 기록 데이터', M, y, 8, 'bold', '#666', CW);
        y = er.y + er.h + 2;
        for (const k of extraKeys) {
          if (y > PH - 12) { doc.addPage(); y = M; }
          let val = stepData[k];
          // JSON 객체를 사람이 읽기 쉽게 포맷팅
          if (typeof val === 'object' && val !== null) {
            try {
              if (val.fe || val.sus) {
                // CCP 검사 결과 형식: {fe: {result, time}, sus: {result, time}}
                const parts = [];
                if (val.fe) parts.push(`Fe: ${val.fe.result||'-'} (${val.fe.time||'-'})`);
                if (val.sus) parts.push(`SUS: ${val.sus.result||'-'} (${val.sus.time||'-'})`);
                val = parts.join(' / ');
              } else if (val.num != null) {
                // 샘플 형식: {num, result, time}
                val = `#${val.num} ${val.result||'-'} (${val.time||'-'})`;
              } else {
                val = JSON.stringify(val);
              }
            } catch { val = JSON.stringify(val); }
          }
          const r = tableRow(k, String(val), y); y = r.nextY;
        }
      }
    } else {
      // stepData 없음 → "내용 없음" 표시
      y = sectionTitle('작업자 기입 내용', y);
      const r = tableRow('기록 데이터', '', y);
      y = r.nextY;
      if (isCCP) {
        const r2 = tableRow('CCP 검사 기록', '', y);
        y = r2.nextY;
      }
    }

    y += 4;

    // ── 원재료 LOT (개별 코드 전체 나열) ──
    if (usedLots) {
      y = sectionTitle('원재료 LOT 추적 (Traceability)', y);

      const allLots = usedLots.split(',').map(l => l.trim()).filter(l => l);

      // 개별 LOT 전부 나열 (번호 매김)
      for (let li = 0; li < allLots.length; li++) {
        if (y > PH - 10) { doc.addPage(); y = M; }
        const rowH = 5;
        doc.setFillColor(li % 2 === 0 ? 242 : 232, li % 2 === 0 ? 247 : 245, 253);
        doc.rect(M, y, CW, rowH, 'F');
        doc.setDrawColor(210, 220, 240); doc.setLineWidth(0.1);
        doc.rect(M, y, CW, rowH);
        drawText(`${li + 1}. ${allLots[li]}`, M + 2, y + 0.8, 6, 'normal', '#0d47a1', CW - 4);
        y += rowH;
      }

      // 총 투입 수량 요약
      y += 1;
      doc.setFillColor(248, 250, 255);
      doc.rect(M, y, CW, 5.5, 'F');
      drawText(`총 투입: ${allLots.length}건`, M + 2, y + 1, 6.5, 'bold', '#1565c0', CW - 4);
      y += 7;
    }

    // ── 사진 영역 ──
    const allPhotoUrls = [];
    if (photoUrlsRaw) allPhotoUrls.push(...photoUrlsRaw.split(' | ').filter(u => u.trim()));
    if (photoUrl && !allPhotoUrls.includes(photoUrl)) allPhotoUrls.push(photoUrl);

    if (allPhotoUrls.length > 0) {
      if (y > PH - 50) { doc.addPage(); y = M; }
      y += 2;
      y = sectionTitle(`증빙 사진 (${allPhotoUrls.length}장)`, y);

      const photoW = allPhotoUrls.length === 1 ? Math.min(CW - 4, 130) : (CW - 8) / 2;
      const photoH = photoW * 0.75;
      let px = M + 2, colIdx = 0;

      for (const pUrl of allPhotoUrls) {
        if (y + photoH > PH - 15) { doc.addPage(); y = M; px = M + 2; colIdx = 0; }

        const b64 = await loadPhoto(pUrl);
        if (b64) {
          // 테두리
          doc.setDrawColor(200, 210, 230); doc.setLineWidth(0.3);
          doc.rect(px, y, photoW, photoH);
          doc.addImage(b64, 'JPEG', px + 0.5, y + 0.5, photoW - 1, photoH - 1);
        } else {
          doc.setDrawColor(200); doc.setFillColor(245, 245, 245);
          doc.rect(px, y, photoW, photoH, 'FD');
          drawText('사진 로드 실패', px + 4, y + photoH/2 - 3, 7, 'normal', '#999', photoW - 8);
        }

        colIdx++;
        if (allPhotoUrls.length === 1 || colIdx >= 2) {
          y += photoH + 3; px = M + 2; colIdx = 0;
        } else {
          px += photoW + 4;
        }
      }
      if (colIdx > 0) y += photoH + 3;
    } else {
      // 사진 없음
      if (y > PH - 20) { doc.addPage(); y = M; }
      y += 2;
      y = sectionTitle('증빙 사진', y);
      const r = tableRow('사진 기록', '', y);
      y = r.nextY;
    }
  } // end for each record

  /* ═══════════════════════════════════════════
     마지막 페이지: 확인 및 서명
     ═══════════════════════════════════════════ */
  doc.addPage();
  y = processHeader('확인 및 서명', 'HACCP 생산기록 확인서');
  y += 2;

  y = sectionTitle('HACCP 생산기록 확인', y);

  const confirmItems = [
    ['문서번호', woId],
    ['제품명', wo[4] || '-'],
    ['생산량', `${wo[5]||'-'} kg / ${wo[7]||'-'} 개`],
    ['생산기간', `${(wo[9]||'-').substring(0,16)} ~ ${(wo[10]||'-').substring(0,16)}`],
    ['CCP결과', ccpRecords.length > 0 ? '검사 완료' : '해당 없음'],
    ['LOT추적', inputRecords.filter(r => r[4]).length > 0 ? '전체 기록됨' : '해당 없음'],
    ['냉동보관', storeRecords.length > 0 ? '기록됨' : '해당 없음'],
    ['공정완료', `${records.filter(r=>r[10]==='완료').length} / ${records.length}단계`],
    ['완제품LOT', wo[14] || '-'],
  ];
  for (const [l, v] of confirmItems) {
    const r = tableRow(l, v, y); y = r.nextY;
  }

  y += 10;

  // 서명란
  y = sectionTitle('서명란', y);

  const sigEntries = [
    ['작업자 (생산담당)', wo[8] || '', (wo[10] || '').substring(0, 16)],
    ['승인자 (품질관리)', wo[15] || '', (wo[16] || '').substring(0, 16)],
  ];
  for (const [role, name, dt] of sigEntries) {
    const rr = drawText(role, M + 2, y, 8, 'bold', '#333', CW);
    y = rr.y + rr.h + 2;
    let r;
    r = tableRow('성명', name, y, 30); y = r.nextY;
    r = tableRow('일시', dt, y, 30); y = r.nextY;
    // 서명란 박스
    doc.setDrawColor(180); doc.setLineWidth(0.3);
    drawText('서명:', M + 2, y + 2, 7, 'normal', '#888', 18);
    doc.rect(M + 20, y, 65, 12);
    y += 16;
  }

  /* ── 페이지 번호 + 푸터 ── */
  const totalPages = doc.internal.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(150);
    doc.text(`${i} / ${totalPages}`, PW / 2, PH - 5, { align: 'center' });
    doc.text('MAYTUTU Smart Factory · HACCP', PW - M, PH - 5, { align: 'right' });
    doc.text(woId, M, PH - 5);
  }

  /* ── PDF Blob 생성 ── */
  const pdfBlob = doc.output('blob');
  const productName = (wo[4] || '작업지시서').replace(/[\/\\?%*:|"<>]/g, '');
  const fileName = `${productName}_${woId}.pdf`;

  return { pdfBlob, fileName };
}

// PDF 생성 → Drive 저장 → 작업지시서 URL 기록
async function generateAndSaveWOPdf(woId) {
  console.log(`[PDF] 작업지시서 PDF 생성 시작: ${woId}`);
  try {
    const { pdfBlob, fileName } = await generateWOPdf(woId);
    console.log(`[PDF] PDF 생성 완료: ${fileName} (${(pdfBlob.size/1024).toFixed(1)}KB)`);

    // Drive 업로드
    const { url } = await DriveAPI.uploadPdf(pdfBlob, fileName);
    console.log(`[PDF] Drive 업로드 완료: ${url}`);

    // 작업지시서 col 19 (pdfUrl) 에 저장
    await SheetsAPI.updateRow('작업지시서', 0, woId, { 19: url });
    console.log(`[PDF] 작업지시서 pdfUrl 저장 완료`);

    return url;
  } catch (e) {
    console.error(`[PDF] PDF 생성/저장 실패:`, e);
    throw e;
  }
}

async function approveWO(woId) {
  confirm('출하승인', '냉동 12시간이 경과되었습니다.\n출하승인하시겠습니까? 완제품 재고로 등록됩니다.', async () => {
    if (!acquireLock('approveWO')) return;
    try {
      showLoading();
      const wos = await SheetsAPI.getAll('작업지시서');
      const wo = wos.find(w => w[0] === woId && w[12] !== '삭제');
      if (!wo) throw new Error('WO not found');

      // 12시간 재검증
      const freezeStart = wo[11] ? new Date(wo[11]) : null;
      const freezeHours = freezeStart ? (new Date() - freezeStart) / (1000*60*60) : 0;
      if (freezeHours < 12) {
        toast(`냉동 ${freezeHours.toFixed(1)}시간 경과. 12시간 이후 승인 가능합니다.`, 'err');
        hideLoading();
        return;
      }

      const packCount = parseInt(wo[7]) || 50;
      const qty = parseFloat(wo[5]) || 50;
      const fgItemCode = wo[3] || 'FG002';

      // 생산일 = WO 시작시간(wo[9]) 기준 (실제 제조일)
      const prodDateStr = wo[9] || wo[10] || formatDate();
      const prodDate = new Date(prodDateStr);
      // 소비기한 = 생산일 + 6개월
      const expDt = new Date(prodDate);
      expDt.setMonth(expDt.getMonth() + 6);
      const expDate = formatDate(expDt);
      const productionDate = formatDate(prodDate);

      // FG LOT ID: QR라벨 단계에서 사전 생성된 ID가 있으면 재사용, 없으면 새로 채번
      let fgLotId = wo[14] || '';
      if (!fgLotId || !fgLotId.startsWith('FG-')) {
        fgLotId = await generateLotId('FG', fgItemCode, expDate, '완제품LOT', 0, productionDate);
      } else {
        console.log(`[승인] 사전 생성된 FG LOT ID 재사용: ${fgLotId}`);
      }

      // 1. Update WO — 출하가능 상태로
      await SheetsAPI.updateRow('작업지시서', 0, woId, {
        12: '출하가능',
        14: fgLotId,
        15: State.user?.email,
        16: formatDateTime(),
      });

      // 2. Create FG LOT — status '출하가능', remainQty = 실제 개별 수(packCount)
      await SheetsAPI.append('완제품LOT', [
        fgLotId, fgItemCode, wo[4] || '앙호두 (호두과자 전용반죽)', qty, wo[6] || '1kg',
        productionDate, expDate, woId, String(packCount), '출하가능', packCount, '냉동 -18°C'
      ]);

      // 3. Create FG individual QR records
      const indivRows = [];
      for (let i = 1; i <= packCount; i++) {
        const fgIndivId = `${fgLotId}-${String(i).padStart(2,'0')}`;
        indivRows.push([fgIndivId, fgLotId, fgItemCode, '출하가능', '', '', qrImageUrl(fgIndivId)]);
      }
      await SheetsAPI.append('완제품개별', indivRows);

      toast(`출하승인 완료! ${fgLotId} 완제품 재고 등록 (QR ${packCount}개)`, 'suc', 5000);

      // PDF 자동 생성 (백그라운드 — 실패해도 승인 흐름 중단하지 않음)
      generateAndSaveWOPdf(woId).then(pdfUrl => {
        toast('📄 작업지시서 PDF 저장 완료', 'suc', 3000);
      }).catch(e => {
        console.error('[PDF] 자동 생성 실패:', e);
        toast('⚠️ PDF 생성 실패 — 상세 화면에서 재시도 가능', 'warn', 4000);
      });

      Router.go('production');

    } catch (e) {
      toast('승인 실패: ' + e.message, 'err');
    } finally {
      hideLoading();
      releaseLock('approveWO');
    }
  });
}

// ─── REJECT MODAL ───
Screens['reject-modal'] = (params = {}) => {
  const { woId } = params;
  renderHeader('승인 거부', woId, { back: 'approval-detail' });

  $id('content').innerHTML = `
    <div style="padding:16px">
      <div class="input-group">
        <label>거부 사유</label>
        <textarea id="reject-reason" rows="3" placeholder="거부 사유를 입력하세요"></textarea>
      </div>
      <div class="fs-13 fw-7 mb-8">처리 방법 선택</div>
      <div class="row" style="gap:10px">
        <div class="card clickable flex-1" style="text-align:center;border:2px solid var(--warn);cursor:pointer" onclick="rejectWO('${woId}','재작업')">
          <div style="font-size:24px;margin-bottom:4px">🔄</div>
          <div class="fs-13 fw-7 c-warn">재작업</div>
          <div class="fs-11 c-txt-l">작업자에게 반려</div>
        </div>
        <div class="card clickable flex-1" style="text-align:center;border:2px solid var(--err);cursor:pointer" onclick="rejectWO('${woId}','폐기')">
          <div style="font-size:24px;margin-bottom:4px">🗑️</div>
          <div class="fs-13 fw-7 c-err">폐기</div>
          <div class="fs-11 c-txt-l">해당 생산건 폐기</div>
        </div>
      </div>
    </div>
  `;
};

async function rejectWO(woId, action) {
  const reason = $id('reject-reason')?.value || '';
  if (!reason.trim()) { toast('거부 사유를 입력하세요', 'err'); return; }

  try {
    showLoading();
    await SheetsAPI.updateRow('작업지시서', 0, woId, {
      12: `거부-${action}`,
      15: State.user?.email,
      16: formatDateTime(),
      17: reason,
    });
    toast(`거부 처리 완료 (${action})`, 'suc');
    Router.go('production');
  } catch (e) {
    toast('처리 실패: ' + e.message, 'err');
  } finally {
    hideLoading();
  }
}

// ─── 폐기 처리 (스캔 후) ───
async function processDisposal(itemId, lotId, type, itemName) {
  // 폐기 사유 입력 — 커스텀 모달 (CON-013: prompt() 대체)
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog" style="max-width:340px">
      <div class="d-title">폐기 사유 입력</div>
      <div class="d-msg">${itemId} · ${itemName}</div>
      <div class="input-group" style="margin-bottom:12px">
        <textarea id="disposal-reason" rows="3" placeholder="폐기 사유를 입력하세요" style="width:100%;padding:10px;border-radius:6px;border:1px solid var(--gray-l);font-size:14px"></textarea>
      </div>
      <div class="d-actions">
        <button class="btn btn-sm btn-outline btn-gray" id="disposal-cancel">취소</button>
        <button class="btn btn-sm btn-err" id="disposal-ok">폐기 진행</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#disposal-cancel').onclick = () => overlay.remove();
  overlay.querySelector('#disposal-ok').onclick = () => {
    const reason = overlay.querySelector('#disposal-reason').value?.trim();
    if (!reason) { toast('폐기 사유를 입력해야 합니다', 'err'); return; }
    overlay.remove();
    _executeDisposal(itemId, lotId, type, itemName, reason);
  };
}

async function _executeDisposal(itemId, lotId, type, itemName, reason) {

  confirm('폐기 처리', `${itemId}\n${itemName}\n사유: ${reason}\n\n정말 폐기하시겠습니까?`, async () => {
    try {
      showLoading();
      const isFG = type === '완제품';
      const isRM = type === '원재료';
      const isSP = type === '소모품';

      // 개별 레코드 상태 변경
      if (isFG) {
        await SheetsAPI.updateRow('완제품개별', 0, itemId, { 3: '폐기', 4: formatDateTime(), 5: `폐기:${reason}` });
      } else if (isRM) {
        await SheetsAPI.updateRow('원재료개별', 0, itemId, { 3: '폐기', 4: formatDateTime(), 5: `폐기:${reason}` });
      } else if (isSP && lotId) {
        // 소모품은 LOT 단위
        await SheetsAPI.updateRow('소모품LOT', 0, lotId, { 7: '폐기' });
      }

      // LOT 잔량 업데이트 (개별 폐기 시) — 캐시 무효화 후 fresh 데이터 (CON-014)
      if ((isRM || isFG) && lotId) {
        const lotTab = isFG ? '완제품LOT' : '원재료LOT';
        const indivTab = isFG ? '완제품개별' : '원재료개별';
        SheetsAPI.invalidateCache(indivTab);
        SheetsAPI.invalidateCache(lotTab);
        const lots = await SheetsAPI.getAll(lotTab, false);
        const lot = lots.find(l => l[0] === lotId);
        if (lot) {
          const indivs = await SheetsAPI.getAll(indivTab, false);
          const activeIndivs = indivs.filter(iv => iv[1] === lotId && !['폐기','소진','출하완료'].includes(iv[3]));
          if (activeIndivs.length === 0) {
            const statusCol = isFG ? 9 : 9;
            await SheetsAPI.updateRow(lotTab, 0, lotId, { [statusCol]: '소진' });
          }
        }
      }

      toast(`폐기 완료: ${itemId}`, 'suc');
      setTimeout(() => Router.go('qr-scan'), 1500);
    } catch (e) {
      toast('폐기 실패: ' + e.message, 'err');
    } finally {
      hideLoading();
    }
  });
}

// ─── 출하 처리 (스캔 후) ───
// ── 출하 거래처 선택 팝업 ──
async function showShipmentPopup(indivId, lotId, itemName) {
  let vendors = [];
  try { vendors = await SheetsAPI.getAll('거래처').catch(() => []); } catch(e) {}
  const customerVendors = vendors.filter(v => (v[2]||'') === '고객' || (v[2]||'') === '');

  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog" style="max-width:360px;max-height:80vh;overflow-y:auto">
      <div class="fs-16 fw-7 mb-8">출하 처리</div>
      <div class="fs-12 c-txt-l mb-12">${indivId}<br>${itemName}</div>
      <div class="fs-13 fw-6 mb-8">거래처 선택</div>
      ${customerVendors.length === 0 ?
        '<div class="fs-12 c-txt-l mb-8">등록된 거래처가 없습니다. Google Sheets에서 거래처를 추가하세요.</div>' :
        customerVendors.map(v => `
          <div class="card clickable" style="padding:10px;margin-bottom:6px;border:1.5px solid var(--gray-l)" onclick="executeShipment('${indivId}','${lotId}','${itemName}','${(v[1]||'').replace(/'/g,"\\'")}','${v[0]}');this.closest('.dialog-overlay').remove()">
            <div class="fs-13 fw-6">${v[1] || ''} <span class="fs-11 c-txt-l">${v[0]}</span></div>
            ${v[3] ? `<div class="fs-11 c-txt-l">${v[3]}</div>` : ''}
          </div>
        `).join('')
      }
      <div class="row mt-12" style="gap:8px">
        <button class="btn btn-outline btn-gray flex-1" onclick="this.closest('.dialog-overlay').remove()">취소</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function executeShipment(indivId, lotId, itemName, customerName, customerCode) {
  if (!acquireLock('executeShipment')) return;
  try {
    showLoading();
    const shipTime = formatDateTime();

    // 1. 완제품개별 상태 + 출하기록을 병렬로 처리
    const shipId = await generateSeqId('SHP', '출하기록');
    const [indivRowIdx] = await Promise.all([
      SheetsAPI.findRowIndex('완제품개별', 0, indivId),
      SheetsAPI.append('출하기록', [
        shipId, lotId, indivId, customerName, '1', 'ea', shipTime, State.user?.email
      ])
    ]);

    // 2. 개별 상태 업데이트 (batchUpdate)
    if (indivRowIdx > 0) {
      await SheetsAPI.batchUpdate([
        { range: `완제품개별!D${indivRowIdx}`, values: [['출하완료']] },
        { range: `완제품개별!E${indivRowIdx}`, values: [[shipTime]] },
        { range: `완제품개별!F${indivRowIdx}`, values: [[State.user?.email || '']] },
      ]);
    }

    // 3. LOT 잔량 업데이트 (캐시 무효화 후 fresh 데이터)
    SheetsAPI.invalidateCache('완제품개별');
    const allIndivs = await SheetsAPI.getAll('완제품개별', false);
    const lotIndivs = allIndivs.filter(iv => iv[1] === lotId);
    const activeCount = lotIndivs.filter(iv => !['출하완료','폐기'].includes(iv[3])).length;

    // 4. LOT remain + 상태를 한 번에 업데이트
    const lotRowIdx = await SheetsAPI.findRowIndex('완제품LOT', 0, lotId);
    if (lotRowIdx > 0) {
      const lotBatch = [{ range: `완제품LOT!I${lotRowIdx}`, values: [[String(activeCount)]] }];
      if (activeCount === 0) {
        lotBatch.push({ range: `완제품LOT!J${lotRowIdx}`, values: [['출하완료']] });
      }
      await SheetsAPI.batchUpdate(lotBatch);
    }

    // 5. LOT 전체 출하 시 WO 상태도 '출하완료'로 전환 (CON-010)
    if (activeCount === 0) {
      try {
        const wos = await SheetsAPI.getAll('작업지시서');
        const wo = wos.find(w => w[14] === lotId && (w[12] === '출하가능' || w[12] === '냉동보관중'));
        if (wo) {
          await SheetsAPI.updateCell('작업지시서', 0, wo[0], 12, '출하완료');
        }
      } catch (e) { console.warn('WO 상태 전환 실패:', e); }
    }

    toast(`출하 완료: ${indivId} → ${customerName}`, 'suc');
    if (State.currentScreen === 'qr-scan') {
      setTimeout(() => Router.go('qr-scan'), 1000);
    } else {
      setTimeout(() => Router.go('inventory'), 1000);
    }
  } catch (e) {
    toast('출하 실패: ' + e.message, 'err');
  } finally {
    hideLoading();
    releaseLock('executeShipment');
  }
}

// 하위호환: 기존 processShipment 호출 시 팝업으로 전환
async function processShipment(indivId, lotId, itemName) {
  showShipmentPopup(indivId, lotId, itemName);
}

// [제거됨] checkFreezeAndUpdateStatus — 관리자 승인(approveWO)만이 출하가능 전환 경로

// ─── QR 라벨 프린트 (재고 화면에서) ───
async function printFGLabels(itemCode, itemName) {
  // printLotLabels와 동일한 방식 — 개별 레코드 조회 후 preLabels 전달
  try {
    showLoading();
    const lots = (State.finishedGoodsLots || []).filter(l => l[1] === itemCode);
    if (lots.length === 0) { toast('해당 완제품 LOT가 없습니다', 'err'); hideLoading(); return; }
    const lot = lots[lots.length - 1];
    const lotId = lot[0];
    await printLotLabels(lotId, itemName, 'fg');
  } catch (e) {
    hideLoading();
    toast('라벨 로드 실패: ' + e.message, 'err');
  }
}

/* ═══════════════════════════════════════════════
   APP INITIALIZATION
   ═══════════════════════════════════════════════ */
async function initApp() {
  // Load settings
  CONFIG.SHEET_ID = localStorage.getItem('mt_sheet_id') || CONFIG.SHEET_ID;
  CONFIG.DRIVE_FOLDER_ID = localStorage.getItem('mt_drive_folder') || CONFIG.DRIVE_FOLDER_ID;

  // Check auth FIRST (before replaceState, to preserve OAuth callback hash)
  const hasToken = Auth.init();

  // Set initial browser history state AFTER auth (prevents immediate exit on first back press)
  history.replaceState({ screen: 'init' }, '', window.location.href.split('#')[0] + '#init');

  if (hasToken) {
    showLoading();
    // Load user info
    const savedUser = localStorage.getItem('mt_user');
    if (savedUser) {
      State.user = JSON.parse(savedUser);
    }

    // Validate token
    const valid = await Auth.validateToken();
    if (!valid) {
      hideLoading();
      Auth.logout();
      return;
    }

    // If no user info yet, load it
    if (!State.user) {
      await Auth.loadUserInfo();
    }

    hideLoading();

    // Check if Sheet ID is set
    if (!CONFIG.SHEET_ID) {
      Router.go('settings');
      toast('Google Sheets ID를 설정해주세요', 'warn');
      return;
    }

    Router.go('dashboard');

    // LiveSync 초기화 — PC↔모바일 실시간 동기화
    LiveSync.init();

    // [제거됨] 냉동 상태 체크 — 관리자 승인 경로만 사용

    // ── 마이그레이션: 진행중 WO에 FG LOT ID 사전 채번 ──
    if (!localStorage.getItem('mt_migr_fg_lot_preassign')) {
      (async () => {
        try {
          const targetWOs = ['WO-20260421-001', 'WO-20260422-001', 'WO-20260422-002'];
          const allWO = await SheetsAPI.getAll('작업지시서');
          for (const woId of targetWOs) {
            const wo = allWO.find(r => r[0] === woId);
            if (!wo) { console.log(`[마이그레이션] ${woId} 미발견, skip`); continue; }
            if (wo[14] && wo[14].startsWith('FG-')) {
              console.log(`[마이그레이션] ${woId} 이미 FG LOT ID 존재: ${wo[14]}, skip`);
              continue;
            }
            // 생산일 = WO 시작시간(col9) 기준
            const prodDateStr = wo[9] || formatDate();
            const prodDate = new Date(prodDateStr);
            const productionDate = formatDate(prodDate);
            // 소비기한 = 생산일 + 6개월
            const expDate = new Date(prodDate);
            expDate.setMonth(expDate.getMonth() + 6);
            const expStr = formatDate(expDate);
            const fgItemCode = wo[3] || 'FG002';
            const fgLotId = await generateLotId('FG', fgItemCode, expStr, '완제품LOT', 0, productionDate);
            await SheetsAPI.updateCell('작업지시서', 0, woId, 14, fgLotId);
            console.log(`[마이그레이션] ${woId} → FG LOT ID 사전 채번 완료: ${fgLotId} (생산일: ${productionDate})`);
          }
          localStorage.setItem('mt_migr_fg_lot_preassign', '1');
          console.log('[마이그레이션] FG LOT ID 사전 채번 마이그레이션 완료');
        } catch (e) {
          console.error('[마이그레이션] FG LOT ID 사전 채번 실패:', e.message);
          // 실패 시 플래그 미설정 → 다음 로그인 시 재시도
        }
      })();
    }

    // ── LOT 잔량-개별 정합성 자동 체크 (매 로그인 시) ──
    (async () => {
      try {
        const rmLots = await SheetsAPI.getAll('원재료LOT');
        const rmIndivs = await SheetsAPI.getAll('원재료개별');
        const fgLots = await SheetsAPI.getAll('완제품LOT');
        const fgIndivs = await SheetsAPI.getAll('완제품개별');
        let fixCount = 0;

        // 원재료 LOT: 잔량 = 활성개별수 × perUnit, 상태 = 활성개별 기반
        for (const lot of rmLots) {
          const lotId = lot[0], totalQty = parseFloat(lot[4]) || 0;
          const totalIndivCount = parseInt(lot[10]) || 1;
          const perUnit = totalQty / totalIndivCount;
          const remain = parseFloat(lot[8]) || 0;
          const status = lot[9] || '';
          const myIndivs = rmIndivs.filter(iv => iv[1] === lotId);
          const active = myIndivs.filter(iv => !['폐기','소진'].includes(iv[3]));
          const consumed = myIndivs.filter(iv => iv[3] === '소진');
          const correctRemain = Math.round(active.length * perUnit * 100) / 100;
          const correctStatus = active.length === 0 ? '소진' : (consumed.length > 0 ? '사용중' : '미사용');
          if (Math.abs(remain - correctRemain) > 0.01 || status !== correctStatus) {
            await SheetsAPI.updateRow('원재료LOT', 0, lotId, { 8: String(correctRemain), 9: correctStatus });
            console.log(`[정합성] ${lotId}: 잔량 ${remain}→${correctRemain}, 상태 ${status}→${correctStatus}`);
            fixCount++;
          }
        }

        // 완제품 LOT: remainQty = 활성개별수(냉동보관중+출하가능)
        for (const lot of fgLots) {
          const lotId = lot[0];
          const dbRemain = parseInt(lot[8]) || 0;
          const active = fgIndivs.filter(iv => iv[1] === lotId && ['냉동보관중','출하가능'].includes(iv[3]));
          if (dbRemain !== active.length) {
            await SheetsAPI.updateRow('완제품LOT', 0, lotId, { 8: String(active.length) });
            console.log(`[정합성] ${lotId}: remainQty ${dbRemain}→${active.length}`);
            fixCount++;
          }
        }

        if (fixCount > 0) {
          SheetsAPI.invalidateAllCache();
          console.log(`[정합성] ${fixCount}건 자동 보정 완료`);
        }
      } catch (e) {
        console.warn('[정합성] 체크 실패:', e.message);
      }
    })();

    // ── 완료된 마이그레이션 플래그 설정 (더 이상 실행 불필요) ──
    ['mt_migr_step2_check','mt_migr_qr_url_cleanup','mt_migr_gen_indiv_v2','mt_migr_lot_id_v1']
      .forEach(k => { if (!localStorage.getItem(k)) localStorage.setItem(k, '1'); });

  } else {
    Router.go('login');
  }
}

// Start the app
initApp();
