<style>
/* ═══════════════════════════════════════════════

:root {

/* ═══════════════════════════════════════════════

.fab:active { transform:scale(0.95); }
.progress-bar { background:var(--bg); border-radius:4px; height:6px; overflow:hidden; }
.progress-bar .fill { background:var(--suc); height:100%; border-radius:4px; transition:width 0.3s; }

.row { display:flex; gap:8px; align-items:center; }
.row.between { justify-content:space-between; }
.card .row.between > span:first-child { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }

.card .row.between > span.badge,
.card .row.between > span:last-child { flex-shrink:0; white-space:nowrap; }
.card > .fs-11.c-txt-l,
.card > .fs-12.c-txt-l,
.card .fs-11.c-txt-l,
.card .fs-12.c-txt-l,
.card .fs-14.fw-6,

/* LOT ID 전용 — 모바일에서 잘림 방지 */
.lot-id { font-family:monospace; font-size:12px; font-weight:700; word-break:break-all; white-space:normal!important; overflow:visible!important; text-overflow:unset!important; line-height:1.4; color:var(--pri); letter-spacing:-0.3px; }
.lot-card-header { display:flex; flex-direction:column; gap:6px; }
.lot-card-header .lot-actions { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.flex-1 { flex:1; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.mt-4 { margin-top:4px; } .mt-8 { margin-top:8px; } .mt-12 { margin-top:12px; } .mt-16 { margin-top:16px; }
.mb-4 { margin-bottom:4px; } .mb-8 { margin-bottom:8px; } .mb-12 { margin-bottom:12px; }
.fs-11 { font-size:11px; } .fs-12 { font-size:12px; } .fs-13 { font-size:13px; } .fs-14 { font-size:14px; } .fs-16 { font-size:16px; } .fs-20 { font-size:20px; }
.fw-6 { font-weight:600; } .fw-7 { font-weight:700; } .fw-8 { font-weight:800; }
.c-txt-l { color:var(--txt-l); } .c-pri { color:var(--pri); } .c-suc { color:var(--suc); } .c-err { color:var(--err); } .c-warn { color:var(--warn); } .c-info { color:var(--info); } .c-teal { color:var(--teal); } .c-gray { color:var(--gray); }

/* Toast notification */
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:10px 20px; border-radius:8px; color:#fff; font-size:13px; font-weight:600; z-index:100; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }
.toast.suc { background:var(--suc); }
.toast.err { background:var(--err); }

#loading { position:fixed; inset:0; background:rgba(255,255,255,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99; }

.spinner { width:36px; height:36px; border:3px solid var(--gray-l); border-top-color:var(--pri); border-radius:50%; animation:spin 0.8s linear infinite; }

/* Border left accent */

.bl-warn { border-left:4px solid var(--warn); }
.bl-suc { border-left:4px solid var(--suc); }

.bl-err { border-left:4px solid var(--err); }

/* Login screen */
#screen-login { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; background:var(--bg); padding:32px; }

/* ═══════════════════════════════════════════════
   PRINT STYLES — SLP-DX220 60×40mm 가로형 라벨
   ═══════════════════════════════════════════════ */

/* 프린터 설정 패널 */
.printer-setting-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.printer-setting-row label { font-size:12px; font-weight:600; min-width:70px; color:var(--txt-l); }

</style>

<script>
/* ═══════════════════════════════════════════════
   CONFIG

  SHEET_ID: '1_koe58lReouU_ZZxzUh5SU8gUkuHjlwb1LNjZbJGSLU',

  API_KEY: '',
};

/* ═══════════════════════════════════════════════
   STATE MANAGEMENT
   ═══════════════════════════════════════════════ */
const State = {
  user: null,        // { email, name, role, picture }
  token: null,       // OAuth access token
  currentScreen: 'login',
  prevScreen: null,
  activeTab: 'home', // bottom nav

  // Cached data
  sops: [],

  finishedGoodsItems: [],
  consumableItems: [],
  suppliers: [],
  equipment: [],

  haccp: [],
  users: [],

  // Work order execution state
  woExec: {

    currentStep: 0,

/* ═══════════════════════════════════════════════
   UTILITY FUNCTIONS
   ═══════════════════════════════════════════════ */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
const $id = (id) => document.getElementById(id);

// ── 중복 제출 방지 유틸리티 ──
const _actionLocks = {};
function acquireLock(name) {
  if (_actionLocks[name]) { toast('처리 중입니다. 잠시만 기다려주세요.', 'warn'); return false; }
  _actionLocks[name] = true;
  return true;
}
function releaseLock(name) { _actionLocks[name] = false; }

function showLoading() { $id('loading').classList.remove('hidden'); }
function hideLoading() { $id('loading').classList.add('hidden'); }

function toast(msg, type = 'info', duration = 2500) {
  const el = $id('toast');
  el.style.whiteSpace = 'pre-line';
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), duration);
}

function confirm(title, msg, onOk, onCancel) {
  $id('dialog-title').textContent = title;
  $id('dialog-msg').textContent = msg;
  $id('dialog-actions').innerHTML = `
    <button class="btn btn-sm btn-outline btn-gray" id="dialog-cancel">취소</button>
    <button class="btn btn-sm btn-pri" id="dialog-ok">확인</button>
  `;
  $id('dialog-overlay').classList.remove('hidden');
  $id('dialog-ok').onclick = () => { $id('dialog-overlay').classList.add('hidden'); onOk && onOk(); };
  $id('dialog-cancel').onclick = () => { $id('dialog-overlay').classList.add('hidden'); onCancel && onCancel(); };
}

function formatDate(d) {
  if (!d) d = new Date();
  if (typeof d === 'string') d = new Date(d);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function formatDateTime(d) {
  if (!d) d = new Date();
  if (typeof d === 'string') d = new Date(d);
  return `${formatDate(d)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatTime(d) {
  if (!d) d = new Date();
  if (typeof d === 'string') d = new Date(d);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function dayOfWeek(d) {
  return ['일','월','화','수','목','금','토'][d.getDay()];
}

// UI 표시용 날짜 포맷 (CON-015: 통일된 표시 형식)
function displayDate(d) {
  if (!d) d = new Date();
  if (typeof d === 'string') d = new Date(d);
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}.${m}.${dd}`;
}

function displayDateTime(d) {
  if (!d) d = new Date();
  if (typeof d === 'string') d = new Date(d);
  return `${displayDate(d)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// YYMMDD 포맷 유틸
function toYYMMDD(dateStr) {
  if (!dateStr) return '000000';
  const d = dateStr.replace(/-/g, '');  // "2026-04-06" → "20260406"
  return d.length >= 8 ? d.substring(2) : d; // → "260406"
}

// 품목코드에서 숫자부분 추출: "RM001" → "001", "FG001" → "001"
function extractItemNum(itemCode) {
  return (itemCode || '').replace(/[A-Za-z]/g, '').padStart(3, '0');
}

// 기존 순번 ID (생산요청 REQ, 입고기록 RCV, 작업지시 WO 등)
async function generateSeqId(prefix, tab, idCol = 0) {
  const today = formatDate().replace(/-/g, '');
  const pattern = `${prefix}-${today}-`;
  try {
    const rows = await SheetsAPI.getAll(tab);
    let max = 0;
    rows.forEach(r => {
      if (r[idCol] && r[idCol].startsWith(pattern)) {
        const n = parseInt(r[idCol].split('-').pop());
        if (n > max) max = n;
      }
    });
    return `${pattern}${String(max + 1).padStart(3, '0')}`;
  } catch (e) {
    return `${pattern}001`;
  }
}

// 새 LOT ID 포맷: [대분류]-[품목번호]-[입고일YYMMDD]-[사용기한YYMMDD]-[입고순번NNN]
// 예: RM-001-260406-260706-001
/**
 * generateLotId: LOT ID 채번
 * @param {string} prefix - 'RM', 'FG', 'SP'
 * @param {string} itemCode - 품목코드 (FG002 등)
 * @param {string} expDate - 소비기한 (YYYY-MM-DD)
 * @param {string} tab - 시트 탭명
 * @param {number} idCol - LOT ID 컬럼 인덱스
 * @param {string} mfgDate - 제조일/입고일 (YYYY-MM-DD). 미지정 시 오늘 날짜
 */
async function generateLotId(prefix, itemCode, expDate, tab, idCol = 0, mfgDate = null) {
  // 제조일 기준 채번 — 승인일이 아닌 실제 생산일/입고일 사용
  const mfgYM = toYYMMDD(mfgDate || formatDate());
  const expYM = toYYMMDD(expDate);
  const itemNum = extractItemNum(itemCode);
  const searchPrefix = `${prefix}-${itemNum}-${mfgYM}-`;

  try {
    const rows = await SheetsAPI.getAll(tab);
    let max = 0;
    rows.forEach(r => {
      if (r[idCol] && r[idCol].startsWith(searchPrefix)) {
        const parts = r[idCol].split('-');
        const seq = parseInt(parts[4]) || 0;
        if (seq > max) max = seq;
      }
    });
    const lotId = `${prefix}-${itemNum}-${mfgYM}-${expYM}-${String(max + 1).padStart(3, '0')}`;
    console.log(`[LOT채번] ${lotId} (mfgDate=${mfgDate||'today'}, prefix=${searchPrefix}, maxSeq=${max})`);
    return lotId;
  } catch (e) {
    const lotId = `${prefix}-${itemNum}-${mfgYM}-${expYM}-001`;
    console.warn(`[LOT채번] fallback: ${lotId}`, e.message);
    return lotId;
  }
}

/* ═══════════════════════════════════════════════
   GOOGLE OAUTH 2.0
   ═══════════════════════════════════════════════ */
const Auth = {
  _tokenExpiry: 0,        // 토큰 만료 시각 (ms)
  _refreshTimer: null,    // 자동 갱신 타이머

  init() {
    // Check for token in URL hash (OAuth redirect)
    const hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      const params = new URLSearchParams(hash.substring(1));
      State.token = params.get('access_token');
      const expiresIn = parseInt(params.get('expires_in')) || 3600;
      this._tokenExpiry = Date.now() + expiresIn * 1000;
      localStorage.setItem('mt_token', State.token);
      localStorage.setItem('mt_token_expiry', String(this._tokenExpiry));
      window.location.hash = '';
      this._scheduleRefresh(expiresIn);
      this.loadUserInfo();
      return true;
    }
    // Check localStorage
    const saved = localStorage.getItem('mt_token');
    if (saved) {
      State.token = saved;
      this._tokenExpiry = parseInt(localStorage.getItem('mt_token_expiry')) || 0;
      // 남은 시간 계산 후 갱신 스케줄
      const remaining = Math.max(0, Math.floor((this._tokenExpiry - Date.now()) / 1000));
      if (remaining > 60) {
        this._scheduleRefresh(remaining);
      }
      return true;
    }
    return false;
  },

  // 토큰 만료 5분 전에 자동 갱신 (silent refresh via hidden iframe)
  _scheduleRefresh(expiresInSec) {
    if (this._refreshTimer) clearTimeout(this._refreshTimer);
    // 만료 5분 전 또는 최소 30초 후에 갱신
    const refreshIn = Math.max(30, expiresInSec - 300) * 1000;
    this._refreshTimer = setTimeout(() => this._silentRefresh(), refreshIn);
    console.log(`Token refresh scheduled in ${Math.round(refreshIn/1000)}s`);
  },

  _silentRefresh() {
    // 숨겨진 iframe으로 토큰 자동 갱신 (prompt=none)
    let redirect = window.location.origin + window.location.pathname;
    redirect = redirect.replace(/\/index\.html.*$/, '/').replace(/\?.*$/, '');
    const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CONFIG.CLIENT_ID}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=${encodeURIComponent(CONFIG.SCOPES)}&prompt=none`;

    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = url;
    let handled = false;

    const cleanup = () => {
      if (handled) return;
      handled = true;
      try { document.body.removeChild(iframe); } catch(e) {}
    };

    iframe.onload = () => {
      try {
        const iframeHash = iframe.contentWindow.location.hash;
        if (iframeHash && iframeHash.includes('access_token')) {
          const params = new URLSearchParams(iframeHash.substring(1));
          State.token = params.get('access_token');
          const expiresIn = parseInt(params.get('expires_in')) || 3600;
          this._tokenExpiry = Date.now() + expiresIn * 1000;
          localStorage.setItem('mt_token', State.token);
          localStorage.setItem('mt_token_expiry', String(this._tokenExpiry));
          this._scheduleRefresh(expiresIn);
          console.log('Token silently refreshed');
        }
      } catch (e) {
        // cross-origin 차단 — 팝업 방식 폴백
        console.warn('Silent refresh blocked, will prompt on next 401');
      }
      cleanup();
    };

    // 10초 타임아웃
    setTimeout(cleanup, 10000);
    document.body.appendChild(iframe);
  },

  // 토큰 유효 여부 빠른 체크 (API 호출 없이)
  isTokenFresh() {
    return this._tokenExpiry > Date.now() + 60000; // 1분 이상 남았으면 유효
  },

  login() {
    let redirect = window.location.origin + window.location.pathname;
    redirect = redirect.replace(/\/index\.html.*$/, '/').replace(/\?.*$/, '');
    const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CONFIG.CLIENT_ID}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=${encodeURIComponent(CONFIG.SCOPES)}&prompt=select_account`;
    window.location.href = url;
  },

  logout() {
    if (this._refreshTimer) clearTimeout(this._refreshTimer);
    State.token = null;
    State.user = null;
    this._tokenExpiry = 0;
    localStorage.removeItem('mt_token');
    localStorage.removeItem('mt_token_expiry');
    localStorage.removeItem('mt_user');
    SheetsAPI.invalidateAllCache();
    Router.go('login');
  },

  async loadUserInfo() {
    try {
      const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: `Bearer ${State.token}` }
      });
      if (!res.ok) { this.logout(); return; }
      const data = await res.json();
      State.user = { email: data.email, name: data.name, picture: data.picture, role: 'worker' };
      localStorage.setItem('mt_user', JSON.stringify(State.user));
      await this.checkRole();
    } catch (e) {
      console.error('Auth error:', e);
      this.logout();
    }
  },

  async checkRole() {
    try {
      const users = await SheetsAPI.getAll('사용자');
      const u = users.find(r => r[0] === State.user.email);
      if (u) {
        State.user.role = u[2] || 'worker';
        State.user.name = u[1] || State.user.name;
      } else {
        toast('등록되지 않은 계정입니다. 관리자에게 문의하세요.', 'err');
        this.logout();
        return;
      }
      localStorage.setItem('mt_user', JSON.stringify(State.user));
    } catch (e) {
      console.warn('Role check failed, using default:', e);
    }
  },

  async validateToken() {
    if (!State.token) return false;
    // 빠른 로컬 체크 먼저
    if (this.isTokenFresh()) return true;
    // 만료 임박하면 서버에 확인
    try {
      const res = await fetch(`https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=${State.token}`);
      if (res.ok) {
        const data = await res.json();
        const expiresIn = parseInt(data.expires_in) || 0;
        this._tokenExpiry = Date.now() + expiresIn * 1000;
        localStorage.setItem('mt_token_expiry', String(this._tokenExpiry));
        if (expiresIn > 60) this._scheduleRefresh(expiresIn);
        return true;
      }
      return false;
    } catch { return false; }
  },
};

/* ═══════════════════════════════════════════════
   GOOGLE SHEETS API WRAPPER
   ═══════════════════════════════════════════════ */
const SheetsAPI = {
  baseUrl() {
    return `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}`;
  },

  headers() {
    return { Authorization: `Bearer ${State.token}`, 'Content-Type': 'application/json' };
  },

  // ── 캐시 레이어 (TTL 기반) ──
  _cache: {},
  _cacheTTL: 30000, // 30초 캐시
  _getCached(key) {
    const entry = this._cache[key];
    if (entry && Date.now() - entry.ts < this._cacheTTL) return entry.data;
    return null;
  },
  _setCache(key, data) {
    this._cache[key] = { data, ts: Date.now() };
  },
  invalidateCache(tab) {
    // 특정 탭 캐시 무효화
    Object.keys(this._cache).forEach(k => { if (k.startsWith(tab)) delete this._cache[k]; });
  },
  invalidateAllCache() {
    this._cache = {};
  },

  // ── Retry + 401/429 처리 ──
  async _fetch(url, opts = {}, retries = 3) {
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const res = await fetch(url, { ...opts, headers: { ...this.headers(), ...(opts.headers || {}) } });
        // 401: 토큰 만료 → 재로그인
        if (res.status === 401) {
          toast('인증이 만료되었습니다. 다시 로그인합니다…', 'warn', 3000);
          localStorage.removeItem('mt_token');
          setTimeout(() => Auth.login(), 1500);
          throw new Error('토큰 만료 — 재로그인 필요');
        }
        // 429: Rate Limit → 지수 백오프 후 재시도
        if (res.status === 429 && attempt < retries) {
          const wait = Math.min(1000 * Math.pow(2, attempt) + Math.random() * 500, 10000);
          console.warn(`Rate limited (429), retry ${attempt + 1}/${retries} in ${Math.round(wait)}ms`);
          await new Promise(r => setTimeout(r, wait));
          continue;
        }
        // 5xx: 서버 오류 → 재시도
        if (res.status >= 500 && attempt < retries) {
          const wait = 1000 * Math.pow(2, attempt);
          console.warn(`Server error (${res.status}), retry ${attempt + 1}/${retries} in ${wait}ms`);
          await new Promise(r => setTimeout(r, wait));
          continue;
        }
        return res;
      } catch (e) {
        // 네트워크 에러 (오프라인 등) → 재시도
        if (e.message === '토큰 만료 — 재로그인 필요') throw e;
        if (attempt < retries) {
          const wait = 1000 * Math.pow(2, attempt);
          console.warn(`Network error, retry ${attempt + 1}/${retries} in ${wait}ms:`, e.message);
          await new Promise(r => setTimeout(r, wait));
          continue;
        }
        throw new Error(`네트워크 오류: ${e.message}`);
      }
    }
  },

  // Get all rows (캐시 적용)
  async getAll(tab, useCache = true) {
    if (useCache) {
      const cached = this._getCached(`getAll:${tab}`);
      if (cached) return JSON.parse(JSON.stringify(cached)); // deep copy
    }
    const res = await this._fetch(`${this.baseUrl()}/values/${encodeURIComponent(tab)}`);
    if (!res.ok) throw new Error(`Sheets GET ${tab}: ${res.status}`);
    const data = await res.json();
    const rows = data.values ? data.values.slice(1) : [];
    this._setCache(`getAll:${tab}`, rows);
    return rows;
  },

  // Get specific range (캐시 적용)
  async getRange(range, useCache = true) {
    if (useCache) {
      const cached = this._getCached(`getRange:${range}`);
      if (cached) return JSON.parse(JSON.stringify(cached));
    }
    const res = await this._fetch(`${this.baseUrl()}/values/${encodeURIComponent(range)}`);
    if (!res.ok) throw new Error(`Sheets GET ${range}: ${res.status}`);
    const data = await res.json();
    const rows = data.values || [];
    this._setCache(`getRange:${range}`, rows);
    return rows;
  },

  // Append rows — 반드시 A열부터 시작하도록 범위 지정 (데이터 밀림 방지)
  async append(tab, rows) {
    const body = { values: Array.isArray(rows[0]) ? rows : [rows] };
    const colCount = Array.isArray(rows[0]) ? rows[0].length : rows.length;
    const endCol = String.fromCharCode(64 + Math.min(colCount, 26)); // A=65, 최대 Z
    const range = `${tab}!A:${endCol}`;
    const res = await this._fetch(
      `${this.baseUrl()}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
      { method: 'POST', body: JSON.stringify(body) }
    );
    if (!res.ok) {
      const errText = await res.text().catch(() => '');
      console.error(`[SheetsAPI] APPEND 실패: ${tab}, status=${res.status}`, errText);
      throw new Error(`Sheets APPEND ${tab}: ${res.status}`);
    }
    this.invalidateCache(tab);
    console.log(`[SheetsAPI] APPEND 성공: ${range}, ${colCount}cols`);
    return res.json();
  },

  // Update specific cell(s)
  async update(range, values) {
    const body = { values: Array.isArray(values[0]) ? values : [values] };
    const res = await this._fetch(
      `${this.baseUrl()}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,
      { method: 'PUT', body: JSON.stringify(body) }
    );
    if (!res.ok) throw new Error(`Sheets UPDATE ${range}: ${res.status}`);
    const tab = range.split('!')[0];
    this.invalidateCache(tab);
    return res.json();
  },

  // Batch update (청크 분할 내장)
  async batchUpdate(data) {
    if (data.length === 0) return;
    const CHUNK = 50;
    for (let i = 0; i < data.length; i += CHUNK) {
      const chunk = data.slice(i, i + CHUNK);
      const body = { valueInputOption: 'USER_ENTERED', data: chunk };
      const res = await this._fetch(
        `${this.baseUrl()}/values:batchUpdate`,
        { method: 'POST', body: JSON.stringify(body) }
      );
      if (!res.ok) throw new Error(`Sheets BATCHUPDATE: ${res.status}`);
    }
    // 관련 탭 캐시 무효화
    const tabs = [...new Set(data.map(d => d.range.split('!')[0]))];
    tabs.forEach(t => this.invalidateCache(t));
  },

  // Batch get
  async batchGet(ranges) {
    const params = ranges.map(r => `ranges=${encodeURIComponent(r)}`).join('&');
    const res = await this._fetch(`${this.baseUrl()}/values:batchGet?${params}`);
    if (!res.ok) throw new Error(`Sheets BATCHGET: ${res.status}`);
    const data = await res.json();
    return data.valueRanges || [];
  },

  // Find row index (캐시 활용)
  async findRowIndex(tab, colIndex, value) {
    const all = await this.getRange(tab);
    // 삭제 상태가 아닌 행 우선 매칭 (중복 ID 문제 방지)
    const statusCols = { '작업지시서': 12, '생산요청': 7 };
    const statusCol = statusCols[tab];
    let fallback = -1;
    for (let i = 1; i < all.length; i++) {
      if (all[i] && all[i][colIndex] === value) {
        if (statusCol !== undefined && all[i][statusCol] === '삭제') {
          if (fallback === -1) fallback = i + 1;
          continue;
        }
        return i + 1;
      }
    }
    return fallback; // 삭제 상태만 있으면 그거라도 반환
  },

  // Update a specific cell — batchUpdate 활용 (API 1회)
  async updateCell(tab, searchCol, searchVal, updateCol, newVal) {
    const rowIdx = await this.findRowIndex(tab, searchCol, searchVal);
    if (rowIdx === -1) throw new Error(`Row not found: ${searchVal}`);
    const colLetter = String.fromCharCode(65 + updateCol);
    await this.batchUpdate([{ range: `${tab}!${colLetter}${rowIdx}`, values: [[newVal]] }]);
  },

  // Update row by direct row index (1-based Google Sheets row)
  async updateRowByIndex(tab, rowIdx, updates) {
    const data = Object.entries(updates).map(([col, val]) => ({
      range: `${tab}!${String.fromCharCode(65 + parseInt(col))}${rowIdx}`,
      values: [[val]]
    }));
    await this.batchUpdate(data);
  },

  // Update multiple cells in ONE batch call (기존: 열 개수만큼 API → 개선: 1회)
  async updateRow(tab, searchCol, searchVal, updates) {
    const rowIdx = await this.findRowIndex(tab, searchCol, searchVal);
    if (rowIdx === -1) throw new Error(`Row not found: ${searchVal}`);
    const data = Object.entries(updates).map(([col, val]) => ({
      range: `${tab}!${String.fromCharCode(65 + parseInt(col))}${rowIdx}`,
      values: [[val]]
    }));
    await this.batchUpdate(data);
  },
};

/* ═══════════════════════════════════════════════
   GOOGLE DRIVE API (Photo Upload)
   ═══════════════════════════════════════════════ */
const DriveAPI = {
  async uploadPhoto(file) {
    const metadata = {
      name: `${Date.now()}_${file.name}`,
      mimeType: file.type,
    };
    if (CONFIG.DRIVE_FOLDER_ID) {
      metadata.parents = [CONFIG.DRIVE_FOLDER_ID];
    }

    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', file);

    // supportsAllDrives: 공유 드라이브 폴더 지원
    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink&supportsAllDrives=true', {
      method: 'POST',
      headers: { Authorization: `Bearer ${State.token}` },
      body: form,
    });
    if (res.status === 401) {
      toast('인증이 만료되었습니다. 다시 로그인합니다…', 'warn', 3000);
      localStorage.removeItem('mt_token');
      setTimeout(() => Auth.login(), 1500);
      throw new Error('토큰 만료 — 재로그인 필요');
    }
    if (!res.ok) throw new Error(`Drive upload: ${res.status}`);
    const data = await res.json();

    // 파일을 링크 공유 가능하게 설정 (썸네일 복원용)
    try {
      await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions?supportsAllDrives=true`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${State.token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ role: 'reader', type: 'anyone' }),
      });
    } catch (e) { console.warn('Permission set failed:', e); }

    return `https://drive.google.com/file/d/${data.id}/view`;
  },

  async uploadPdf(pdfBlob, fileName) {
    const metadata = {
      name: fileName,
      mimeType: 'application/pdf',
    };
    if (CONFIG.PDF_FOLDER_ID) {
      metadata.parents = [CONFIG.PDF_FOLDER_ID];
    } else if (CONFIG.DRIVE_FOLDER_ID) {
      metadata.parents = [CONFIG.DRIVE_FOLDER_ID];
    }
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    form.append('file', pdfBlob);

    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink&supportsAllDrives=true', {
      method: 'POST',
      headers: { Authorization: `Bearer ${State.token}` },
      body: form,
    });
    if (res.status === 401) {
      toast('인증이 만료되었습니다. 다시 로그인합니다…', 'warn', 3000);
      localStorage.removeItem('mt_token');
      setTimeout(() => Auth.login(), 1500);
      throw new Error('토큰 만료 — 재로그인 필요');
    }
    if (!res.ok) throw new Error(`Drive PDF upload: ${res.status}`);
    const data = await res.json();

    // 공유 링크 설정
    try {
      await fetch(`https://www.googleapis.com/drive/v3/files/${data.id}/permissions?supportsAllDrives=true`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${State.token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ role: 'reader', type: 'anyone' }),
      });
    } catch (e) { console.warn('PDF Permission set failed:', e); }

    return { id: data.id, url: `https://drive.google.com/file/d/${data.id}/view` };
  },
};

/* ═══════════════════════════════════════════════
   ROUTER
   ═══════════════════════════════════════════════ */
const Router = {
  _historyStack: [],   // screen history for back navigation
  _isPopping: false,   // flag to prevent double push on popstate

  go(screen, params = {}) {
    // Push current screen to history stack before navigating
    if (State.currentScreen && State.currentScreen !== screen) {
      this._historyStack.push(State.currentScreen);
    }
    State.prevScreen = State.currentScreen;
    State.currentScreen = screen;

    // Push browser history state so Android back button triggers popstate
    if (!this._isPopping) {
      history.pushState({ screen, params }, '', '#' + screen);
    }

    this.render(params);
  },

  back() {
    if (this._historyStack.length > 0) {
      const prev = this._historyStack.pop();
      this._isPopping = true;
      State.prevScreen = State.currentScreen;
      State.currentScreen = prev;
      history.replaceState({ screen: prev }, '', '#' + prev);
      this.render();
      this._isPopping = false;
    }
  },

  render(params = {}) {
    const s = State.currentScreen;
    // Update bottom nav
    const tabMap = {
      dashboard: 'home',
      production: 'prod', 'wo-create': 'prod', 'wo-execute': 'prod',
      'approval-detail': 'prod', 'req-form': 'prod', 'reject-modal': 'prod',
      inventory: 'inv', 'receive-form': 'inv', 'lot-detail': 'inv',
      'qr-scan': 'scan',
      more: 'more', 'sop-list': 'more', 'sop-detail': 'more',
      equip: 'more', 'label-print': 'more', settings: 'more',
      'items-rm': 'more', 'items-fg': 'more', 'items-sp': 'more',
      vendors: 'more', haccp: 'more',
    };
    State.activeTab = tabMap[s] || State.activeTab;

    // Render header, content, bottom nav
    if (s === 'login') {
      $id('header').style.display = 'none';
      $id('bottom-nav').style.display = 'none';
    } else if (s === 'qr-scan') {
      $id('header').style.display = 'none';
      $id('bottom-nav').style.display = 'none';
    } else {
      $id('header').style.display = '';
      $id('bottom-nav').style.display = '';
      renderBottomNav();
    }

    // Render screen
    const renderer = Screens[s];
    if (renderer) {
      renderer(params);
    } else {
      renderHeader(s, '준비 중');
      $id('content').innerHTML = `<div class="empty-state"><div class="es-icon">🚧</div><div class="es-title">준비 중</div><div class="es-desc">${s} 화면은 준비 중입니다</div></div>`;
    }
  },
};

// Android back button / browser back — navigate to previous screen instead of leaving app
window.addEventListener('popstate', (e) => {
  if (Router._historyStack.length > 0) {
    Router.back();
  } else {
    // At root (dashboard) — push state again to prevent exit
    if (State.currentScreen === 'dashboard') {
      history.pushState({ screen: 'dashboard' }, '', '#dashboard');
    } else {
      // Go to dashboard as final fallback
      Router._isPopping = true;
      Router.go('dashboard');
      Router._isPopping = false;
      history.pushState({ screen: 'dashboard' }, '', '#dashboard');
    }
  }
});

/* ═══════════════════════════════════════════════
   LIVE SYNC — PC↔모바일 실시간 데이터 동기화
   ═══════════════════════════════════════════════ */
const LiveSync = {
  _pollTimer: null,
  _pollInterval: 30000, // 30초 폴링 주기
  _lastSyncTs: 0,
  _minSyncGap: 5000,   // 최소 5초 간격 (중복 방지)
  _isSyncing: false,

  /** 앱 시작 시 호출 — visibilitychange + 폴링 등록 */
  init() {
    // 탭 활성화 시 자동 동기화
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        console.log('[LiveSync] 탭 활성화 → 자동 동기화');
        this.sync('visibility');
      } else {
        // 비활성 시 폴링 중지 (API 호출 절약)
        this.stopPoll();
      }
    });

    // focus 이벤트도 추가 (일부 브라우저에서 visibilitychange 미발생)
    window.addEventListener('focus', () => {
      const gap = Date.now() - this._lastSyncTs;
      if (gap > this._minSyncGap) {
        console.log('[LiveSync] 포커스 복귀 → 자동 동기화');
        this.sync('focus');
      }
    });

    // 초기 폴링 시작
    this.startPoll();
    console.log('[LiveSync] 초기화 완료, 폴링 주기:', this._pollInterval + 'ms');
  },

  /** 폴링 시작 */
  startPoll() {
    this.stopPoll(); // 중복 방지
    this._pollTimer = setInterval(() => {
      if (document.visibilityState === 'visible' && !this._isSyncing) {
        this.sync('poll');
      }
    }, this._pollInterval);
  },

  /** 폴링 중지 */
  stopPoll() {
    if (this._pollTimer) {
      clearInterval(this._pollTimer);
      this._pollTimer = null;
    }
  },

  /** 동기화 실행 — 캐시 무효화 + 현재 화면 리렌더 */
  async sync(trigger = 'manual') {
    const now = Date.now();
    if (now - this._lastSyncTs < this._minSyncGap) {
      console.log(`[LiveSync] 최소 간격 미충족, skip (${now - this._lastSyncTs}ms)`);
      return;
    }
    if (this._isSyncing) {
      console.log('[LiveSync] 이미 동기화 중, skip');
      return;
    }

    this._isSyncing = true;
    this._lastSyncTs = now;

    try {
      // 모든 캐시 무효화 → 다음 getAll 호출 시 API에서 최신 데이터 로드
      SheetsAPI.invalidateAllCache();

      const screen = State.currentScreen;
      console.log(`[LiveSync] 동기화 시작 (trigger=${trigger}, screen=${screen})`);

      // 현재 화면 리렌더 — 화면별 최적화
      if (screen === 'wo-execute' && State.woExec?.woId) {
        // WO 실행 화면: 작업 중 데이터 보존하면서 records만 갱신
        // (전체 리로드는 _scannedLots, _pendingPhotos 등 인메모리 데이터 유실 위험)
        try {
          const freshRecords = await SheetsAPI.getAll('공정기록', false);
          State.woExec.records = freshRecords.filter(r => r[0] === State.woExec.woId);
          console.log(`[LiveSync] wo-execute 경량 동기화: records ${State.woExec.records.length}건 갱신`);
        } catch (e) {
          console.warn('[LiveSync] wo-execute records 갱신 실패:', e.message);
        }
      } else if (screen === 'wo-detail' && State._woDetailId) {
        await Screens['wo-detail']({ woId: State._woDetailId });
      } else if (Screens[screen]) {
        await Screens[screen](State._lastParams || {});
      }

      // 동기화 완료 시각 표시 (토스트는 poll 때만 생략)
      if (trigger !== 'poll') {
        const timeStr = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        toast(`데이터 동기화 완료 (${timeStr})`, 'suc', 1500);
      }

      console.log(`[LiveSync] 동기화 완료 (trigger=${trigger})`);
    } catch (e) {
      console.error('[LiveSync] 동기화 실패:', e.message);
      // 동기화 실패해도 시스템 정상 동작 — 다음 주기에 재시도
    } finally {
      this._isSyncing = false;
    }
  },

  /** 수동 새로고침 버튼 핸들러 */
  manualRefresh() {
    this.sync('manual');
  },
};

// Router.go에서 마지막 params 저장 (동기화 시 리렌더용)
const _origRouterGo = Router.go.bind(Router);
Router.go = function(screen, params = {}) {
  State._lastParams = params;
  if (screen === 'wo-detail' && params.woId) State._woDetailId = params.woId;
  _origRouterGo(screen, params);
  // 화면 전환 시 폴링 재시작 (interval 리셋)
  LiveSync.startPoll();
};

  const right = opts.right ? `<div style="display:flex;align-items:center;gap:6px">${refreshBtn}${opts.right}</div>` : refreshBtn;
  $id('header').innerHTML = `
    <div class="h-row">
      <div style="display:flex;align-items:center;min-width:0;flex:1">
        ${backBtn}
        <div style="min-width:0;flex:1">

          ${sub ? `<div class="h-sub">${sub}</div>` : ''}
        </div>
      </div>

}

// ─── DASHBOARD ───
Screens.dashboard = async () => {
  const role = State.user?.role || 'worker';
  const isAdmin = role === 'admin';
  const today = new Date();

  renderHeader('메이투투 스마트팩토리', `${isAdmin ? '관리자' : '작업자'} · ${displayDate(today)} (${dayOfWeek(today)})`,
    { right: `<div style="width:32px;height:32px;border-radius:16px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer" onclick="Router.go('settings')">👤</div>` });

  // Load data for dashboard
  let pendingApproval = 0, inProgress = 0, lowStock = 0, upcomingChecks = 0;
  let orderAlertItems = [], pendingWOs = [], recentActivity = [], calAlerts = [];

  try {
    const [woData, rmItems, rmLots, eqData] = await Promise.all([
      SheetsAPI.getAll('작업지시서').catch(() => []),
      SheetsAPI.getAll('원재료품목').catch(() => []),
      SheetsAPI.getAll('원재료LOT').catch(() => []),
      SheetsAPI.getAll('기기관리').catch(() => []),
    ]);

    State.workOrders = woData;
    State.rawMaterialItems = rmItems.filter(i => i[12] !== '비활성');
    State.rawMaterialLots = rmLots;
    State.equipment = eqData;

    if (isAdmin) {
      pendingApproval = woData.filter(r => r[12] === '냉동보관중' || r[12] === '승인대기').length;
      inProgress = woData.filter(r => r[12] === '진행중').length;
    } else {
      const myEmail = State.user?.email;
      pendingApproval = woData.filter(r => r[8] === myEmail && (r[12] === '냉동보관중' || r[12] === '승인대기')).length;
      inProgress = woData.filter(r => r[8] === myEmail && r[12] === '진행중').length;
    }

    // Check reorder point (발주 필요 통합 알림)
    rmItems.forEach(item => {
      const code = item[0];
      const reorderPoint = parseFloat(item[9]) || parseFloat(item[6]) || 0;
      const threshold = reorderPoint;
      if (threshold <= 0) return;
      const totalRemain = rmLots.filter(l => l[1] === code && l[9] !== '폐기').reduce((sum, l) => sum + (parseFloat(l[8]) || 0), 0);
      const sku = item[3] || '';
      const skuP = parseSkuUnit(sku);
      let remainDisp = totalRemain + 'kg', threshDisp = threshold + 'kg';
      if (skuP && skuP.perUnit > 0) {
        const sr = Math.floor(totalRemain / skuP.perUnit), srr = Math.round(totalRemain % skuP.perUnit * 10) / 10;
        remainDisp = srr > 0 ? sr + skuP.unitName + ' ' + srr + 'kg' : sr + skuP.unitName;
        threshDisp = Math.round(threshold / skuP.perUnit) + skuP.unitName;
      }
      if (totalRemain <= threshold) {
        lowStock++;
        orderAlertItems.push({ name: item[1], code, remain: totalRemain, threshold, remainDisp, threshDisp });
      }
    });

    upcomingChecks = eqData.filter(e => {
      if (!e[6]) return false;
      const next = new Date(e[6]);
      const diff = (next - today) / (1000*60*60*24);
      return diff <= 7 && diff >= 0;
    }).length;

    // 검교정 알람: 30일 이내 도래 또는 만료
    calAlerts.length = 0;
    eqData.forEach(e => {
      if (!e[6]) return;
      const next = new Date(e[6]);
      const diff = Math.ceil((next - today) / (1000*60*60*24));
      if (diff < 0) {
        calAlerts.push({ code: e[0], name: e[1], type: e[2], nextDate: e[6], diff, status: '만료', badge: 'err' });
      } else if (diff <= 30) {
        calAlerts.push({ code: e[0], name: e[1], type: e[2], nextDate: e[6], diff, status: diff === 0 ? '오늘' : diff + '일 후', badge: diff <= 7 ? 'warn' : 'info' });
      }
    });
    calAlerts.sort((a, b) => a.diff - b.diff);

    pendingWOs = woData.filter(r => r[12] === '냉동보관중' || r[12] === '승인대기').slice(0, 3);

    // ── 알림 체크 ──
    const lastCheck = localStorage.getItem('lastNotifCheck') || '2000-01-01';
    const now = new Date().toISOString();
    if (isAdmin) {
      // 관리자: 새 승인요청 알림
      const newRequests = woData.filter(r => (r[12] === '냉동보관중' || r[12] === '승인대기') && r[10] > lastCheck);
      if (newRequests.length > 0) {
        toast(`🔔 새 승인요청 ${newRequests.length}건이 있습니다`, 'warn');
      }
    } else {
      // 작업자: 승인완료 알림 (승인완료 또는 냉동보관중 = 승인됨)
      const myApproved = woData.filter(r => r[8] === State.user?.email && (r[12] === '승인완료' || r[12] === '냉동보관중') && r[16] > lastCheck);
      if (myApproved.length > 0) {
        toast(`🔔 작업지시서 ${myApproved.length}건이 승인완료 되었습니다`, 'suc');
      }
      // 작업자: 거부 알림
      const myRejected = woData.filter(r => r[8] === State.user?.email && r[12]?.startsWith('거부') && r[16] > lastCheck);
      if (myRejected.length > 0) {
        toast(`🔔 작업지시서 ${myRejected.length}건이 거부되었습니다`, 'err');
      }
    }
    // 검교정 알림 토스트 (관리자 + 작업자 모두)
    if (calAlerts.length > 0) {
      const overdue = calAlerts.filter(a => a.badge === 'err');
      const upcoming = calAlerts.filter(a => a.badge !== 'err');
      if (overdue.length > 0) {
        toast(`🔧 검교정 만료 ${overdue.length}건: ${overdue.map(a=>a.name).join(', ')}`, 'err');
      }
      if (upcoming.length > 0) {
        toast(`🔧 검교정 임박 ${upcoming.length}건: ${upcoming.map(a=>a.name).join(', ')}`, 'warn');
      }
    }

    localStorage.setItem('lastNotifCheck', now);
  } catch (e) {
    console.warn('Dashboard data load error:', e);
  }

  $id('content').innerHTML = `
    <div style="padding:16px">
      <!-- Summary Cards -->
      <div class="grid-2 mb-12">
        <div class="card clickable" style="text-align:center;padding:12px;border-left:3px solid ${inProgress === 0 ? 'var(--warn)' : 'var(--suc)'}" onclick="Router.go('production');setTimeout(()=>{const t=document.querySelector('.tab-filter .tab:nth-child(${isAdmin ? 3 : 2})');if(t)t.click();},200)">
          <div style="font-size:20px">${inProgress === 0 ? '⚠️' : '🏭'}</div>
          <div class="fs-20 fw-8 ${inProgress === 0 ? 'c-warn' : 'c-suc'}" style="margin:4px 0">${inProgress}건</div>
          <div class="fs-11 c-txt-l">${inProgress === 0 ? '생산 없음' : '생산 진행'}</div>
        </div>
        <div class="card clickable" style="text-align:center;padding:12px;border-left:3px solid ${pendingApproval > 0 ? 'var(--warn)' : 'var(--suc)'}" onclick="Router.go('production');setTimeout(()=>{const t=document.querySelector('.tab-filter .tab:nth-child(2)');if(t)t.click();},200)">
          <div style="font-size:20px">${pendingApproval > 0 ? '📋' : '✅'}</div>
          <div class="fs-20 fw-8 ${pendingApproval > 0 ? 'c-warn' : 'c-suc'}" style="margin:4px 0">${pendingApproval}건</div>
          <div class="fs-11 c-txt-l">${isAdmin ? '승인 대기' : '내 작업'}</div>
        </div>
        <div class="card clickable" style="text-align:center;padding:12px;border-left:3px solid ${lowStock > 0 ? 'var(--warn)' : 'var(--suc)'}" onclick="Router.go('inventory')">
          <div style="font-size:20px">${lowStock > 0 ? '📦' : '✅'}</div>
          <div class="fs-20 fw-8 ${lowStock > 0 ? 'c-warn' : 'c-suc'}" style="margin:4px 0">${lowStock}건</div>
          <div class="fs-11 c-txt-l">${lowStock > 0 ? '발주 필요' : '재고 정상'}</div>
        </div>
        <div class="card clickable" style="text-align:center;padding:12px;border-left:3px solid ${calAlerts.length > 0 ? (calAlerts.some(a=>a.badge==='err') ? 'var(--err)' : 'var(--warn)') : 'var(--suc)'}" onclick="Router.go('equip')">
          <div style="font-size:20px">${calAlerts.length > 0 ? '🔧' : '✅'}</div>
          <div class="fs-20 fw-8 ${calAlerts.length > 0 ? (calAlerts.some(a=>a.badge==='err') ? 'c-err' : 'c-warn') : 'c-suc'}" style="margin:4px 0">${calAlerts.length}건</div>
          <div class="fs-11 c-txt-l">${calAlerts.length > 0 ? '검교정 알림' : '검교정 정상'}</div>
        </div>
      </div>

      ${isAdmin && pendingWOs.length > 0 ? `
        <div class="fs-14 fw-7 mb-8">🔔 냉동보관 · 출하승인</div>
        ${pendingWOs.map(wo => {
          const fs = wo[11] ? new Date(wo[11]) : null;
          const fh = fs ? ((Date.now() - fs.getTime()) / (1000*60*60)).toFixed(1) : 0;
          const ca = fh >= 12;
          return `
          <div class="card clickable" onclick="Router.go('approval-detail', {woId:'${wo[0]}'})">
            <div class="row between">
              <div>
                <div class="fs-14 fw-6">${wo[4] || '앙호두 (호두과자 전용반죽)'} ${wo[5] || ''}kg</div>
                <div class="fs-12 c-txt-l">${wo[0]} · ${wo[8] || ''} · 냉동 ${fh}h/12h</div>
              </div>
              <span class="badge badge-${ca ? 'suc' : 'warn'}">${ca ? '출하승인 가능' : '냉동보관중'}</span>
            </div>
          </div>
        `}).join('')}
      ` : ''}

      ${!isAdmin ? (() => {
        const myEmail = State.user?.email;
        const myPending = State.workOrders.filter(r => r[8] === myEmail && (r[12] === '냉동보관중' || r[12] === '승인대기'));
        const myRecent = State.workOrders.filter(r => r[8] === myEmail && (r[12] === '승인완료' || r[12]?.startsWith('거부'))).slice(0, 3);
        let notifHtml = '';
        if (myPending.length > 0) {
          notifHtml += '<div class="fs-14 fw-7 mb-8">⏳ 승인 대기 중</div>' +
            myPending.map(wo => '<div class="card bl-warn"><div class="row between"><div><div class="fs-14 fw-6">' + (wo[4]||'') + ' ' + (wo[5]||'') + 'kg</div><div class="fs-12 c-txt-l">' + wo[0] + ' · 승인 대기 중</div></div><span class="badge badge-warn">승인 대기</span></div></div>').join('');
        }
        if (myRecent.length > 0) {
          notifHtml += '<div class="fs-14 fw-7 mb-8 mt-8">🔔 최근 승인 결과</div>' +
            myRecent.map(wo => '<div class="card bl-' + (wo[12]==='승인완료'?'suc':'err') + '"><div class="row between"><div><div class="fs-14 fw-6">' + (wo[4]||'') + ' ' + (wo[5]||'') + 'kg</div><div class="fs-12 c-txt-l">' + wo[0] + ' · ' + (wo[16]||'').substring(0,16) + '</div></div><span class="badge badge-' + (wo[12]==='승인완료'?'suc':'err') + '">' + wo[12] + '</span></div></div>').join('');
        }
        return notifHtml;
      })() : ''}

      ${orderAlertItems.length > 0 ? `
        <div class="fs-14 fw-7 mb-8 mt-8">📦 발주 필요</div>
        ${orderAlertItems.map(item => `
          <div class="card clickable" onclick="Router.go('inventory')" style="border-left:3px solid var(--warn)">
            <div class="row between">
              <div>
                <div class="fs-14 fw-6" style="color:var(--warn)">${item.name} 발주 필요</div>
                <div class="fs-12 c-txt-l">현재고 ${item.remainDisp} / 발주점 ${item.threshDisp}</div>
              </div>
              <span class="badge badge-warn">발주</span>
            </div>
          </div>
        `).join('')}
      ` : ''}

      ${calAlerts.length > 0 ? `
        <div class="fs-14 fw-7 mb-8 mt-8">🔧 검교정 알림</div>
        ${calAlerts.map(a => `
          <div class="card clickable" onclick="Router.go('equip')" style="border-left:3px solid ${a.badge==='err'?'var(--err,#c62828)':a.badge==='warn'?'var(--warn,#e65100)':'var(--info,#1565c0)'}">
            <div class="row between">
              <div>
                <div class="fs-14 fw-6" style="color:${a.badge==='err'?'var(--err,#c62828)':a.badge==='warn'?'var(--warn,#e65100)':'var(--txt,#222)'}">${a.name}</div>
                <div class="fs-12 c-txt-l">${a.code} · ${a.type || ''} · 다음 검교정: ${a.nextDate}</div>
              </div>
              <span class="badge badge-${a.badge}">${a.status}</span>
            </div>
          </div>
        `).join('')}
      ` : ''}
    </div>
  `;

  // ── 로그인 시 발주 알림 팝업 (하루 1회) ──
  if (orderAlertItems.length > 0) {
    const todayStr = new Date().toISOString().substring(0, 10);
    const lastPopup = localStorage.getItem('invAlertPopupDate');
    if (lastPopup !== todayStr) {
      const alertRows = orderAlertItems.map(item => `
          <div style="padding:10px 12px;border-radius:8px;margin-bottom:8px;background:#f57f1710;border-left:3px solid var(--warn)">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-weight:700;font-size:14px;color:var(--warn)">📦 ${item.name}</span>
              <span class="badge badge-warn" style="font-size:10px">발주필요</span>
            </div>
            <div style="font-size:12px;color:var(--txt-l);margin-top:4px">현재고 ${item.remainDisp} / 발주점 ${item.threshDisp}</div>
          </div>`).join('');

      // 팝업 닫기 함수를 전역에 등록 (inline onclick에서 호출)
      window._closeInvAlertPopup = function() {
        try {
          localStorage.setItem('invAlertPopupDate', todayStr);
          const el = document.getElementById('inv-alert-popup');
          if (el) el.remove();
          console.log('[발주알림] 팝업 닫힘');
        } catch (err) { console.error('[발주알림] 닫기 실패:', err); }
      };

      const popupOverlay = document.createElement('div');
      popupOverlay.id = 'inv-alert-popup';
      popupOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;touch-action:none;';
      popupOverlay.setAttribute('onclick', 'if(event.target===this)window._closeInvAlertPopup()');
      popupOverlay.innerHTML = `
        <div style="background:#fff;border-radius:14px;width:90%;max-width:380px;max-height:80vh;overflow-y:auto;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.2)" onclick="event.stopPropagation()">
          <div style="text-align:center;margin-bottom:14px">
            <div style="font-size:28px;margin-bottom:4px">📦</div>
            <div style="font-size:17px;font-weight:800;color:var(--txt)">발주 알림</div>
            <div style="font-size:12px;color:var(--txt-l);margin-top:2px">${todayStr} 기준 · ${orderAlertItems.length}건 발주 필요</div>
          </div>
          ${alertRows}
          <button onclick="window._closeInvAlertPopup()" style="width:100%;padding:14px;border:none;border-radius:8px;background:var(--pri);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;-webkit-tap-highlight-color:rgba(0,0,0,0.1);touch-action:manipulation;user-select:none">확인</button>
        </div>`;
      document.body.appendChild(popupOverlay);
    }
  }
};

// ─── PRODUCTION ───
Screens.production = async () => {
  const role = State.user?.role || 'worker';
  const isAdmin = role === 'admin';

  renderHeader('생산관리');

  try {
    // 캐시 무효화 — 다른 기기에서 업데이트된 WO 목록 반영
    SheetsAPI.invalidateCache('작업지시서');
    State.workOrders = await SheetsAPI.getAll('작업지시서', false).catch(() => []);
    State.productionRequests = await SheetsAPI.getAll('생산요청').catch(() => []);
  } catch (e) { console.warn(e); }

  const defaultTab = isAdmin ? '생산요청' : '새 작업';
  renderProductionContent(defaultTab, isAdmin);
};

function renderProductionContent(activeTab, isAdmin) {
  const tabs = isAdmin ? ['생산요청', '승인대기', '전체작업'] : ['새 작업', '작업 현황', '완료된 작업'];

  $id('content').innerHTML = `
    <div class="tab-filter">
      ${tabs.map(t => `<div class="tab ${activeTab === t ? 'active' : ''}" onclick="renderProductionContent('${t}', ${isAdmin})">${t}</div>`).join('')}
    </div>
    <div style="padding:16px;position:relative" id="prod-list"></div>
  `;

  const listEl = $id('prod-list');

  if (activeTab === '생산요청') {
    const reqs = State.productionRequests.filter(r => r[7] !== '삭제');
    if (reqs.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><div class="es-title">생산요청이 없습니다</div><div class="es-desc">+ 버튼을 눌러 새 생산요청을 등록하세요</div></div>`;
    } else {
      listEl.innerHTML = reqs.map(r => `
        <div class="card" oncontextmenu="event.preventDefault();deleteRequest('${r[0]}')" ontouchstart="this._ts=Date.now()" ontouchend="if(Date.now()-this._ts>600){event.preventDefault();deleteRequest('${r[0]}');}">
          <div class="row between mb-4">
            <span class="fs-13 fw-6">${r[2] || ''} ${r[3] || ''}kg</span>
            <span class="badge badge-${r[7]==='대기'?'warn':r[7]==='배정완료'?'info':'gray'}">${r[7] || '대기'}</span>
          </div>
          <div class="fs-11 c-txt-l">${r[0]} · 납기 ${(r[6]||'').substring(5)}</div>
          <div class="long-press-hint">길게 누르면 삭제</div>
        </div>
      `).join('');
    }
    listEl.innerHTML += `<div class="fab" onclick="Router.go('req-form')">+</div>`;
  }

  else if (activeTab === '승인대기') {
    const pending = State.workOrders.filter(r => r[12] === '냉동보관중' || r[12] === '승인대기');
    if (pending.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="es-icon">✅</div><div class="es-title">승인 대기 없음</div></div>`;
    } else {
      listEl.innerHTML = pending.map(wo => {
        const freezeStart = wo[11] ? new Date(wo[11]) : null;
        const elapsed = freezeStart ? ((Date.now() - freezeStart.getTime()) / (1000*60*60)).toFixed(1) : 0;
        const canApprove = elapsed >= 12;
        return `
          <div class="card clickable" onclick="Router.go('approval-detail', {woId:'${wo[0]}'})">
            <div class="row between mb-4">
              <span class="fs-13 fw-6">${wo[4] || ''} ${wo[5] || ''}kg</span>
              <span class="badge badge-${canApprove ? 'suc' : 'warn'}">${canApprove ? '출하승인 가능' : '냉동보관중'}</span>
            </div>
            <div class="fs-11 c-txt-l">${wo[0]} · ${wo[8] || ''} · 포장 ${wo[7]||'-'}개</div>
            ${freezeStart ? `<div class="fs-11 ${canApprove ? 'c-suc fw-6' : 'c-warn'} mt-4">냉동: ${(wo[11]||'').substring(11,16)} · 경과 ${elapsed}시간 / 12시간 ${canApprove ? '✅' : ''}</div>` : ''}
          </div>
        `;
      }).join('');
    }
  }

  else if (activeTab === '작업 현황') {
    const myWO = State.workOrders.filter(r => r[8] === State.user?.email && (r[12] === '진행중' || r[12] === '냉동보관중' || r[12] === '승인대기'));
    if (myWO.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="es-icon">🔧</div><div class="es-title">진행 중인 작업 없음</div><div class="es-desc">"새 작업" 탭에서 작업을 시작하세요</div></div>`;
    } else {
      listEl.innerHTML = myWO.map(wo => {
        const lastStep = parseInt(wo[13]) || 0;
        const progress = Math.round((lastStep / 11) * 100);
        const canDelete = wo[12] !== '진행중' || lastStep === 0;
        const isPending = wo[12] === '승인대기';
        return `
          <div class="card ${isPending ? 'bl-warn' : 'clickable'}" ${!isPending ? `onclick="Router.go('wo-execute', {woId:'${wo[0]}'})"` : ''}
            ${!isPending ? `oncontextmenu="event.preventDefault();${canDelete ? `deleteWorkOrder('${wo[0]}')` : ''}"
            ontouchstart="this._ts=Date.now()" ontouchend="if(Date.now()-this._ts>600){event.preventDefault();${canDelete ? `deleteWorkOrder('${wo[0]}')` : 'toast(\"진행중인 건은 삭제할 수 없습니다\",\"err\")'}}"` : ''}>
            <div class="row between mb-4">
              <span class="fs-13 fw-6">${wo[4] || ''} ${wo[5] || ''}kg</span>
              <span class="badge badge-${isPending?'warn':'info'}">${wo[12]}</span>
            </div>
            <div class="fs-11 c-txt-l">${wo[0]} · 공정 ${lastStep}/11${isPending ? ' · 관리자 승인 대기 중' : lastStep > 0 ? ' · 임시저장됨' : ''}</div>
            <div class="progress-bar mt-8"><div class="fill" style="width:${progress}%"></div></div>
            ${isPending ? `<button class="btn btn-sm btn-outline btn-err mt-8" style="width:100%" onclick="event.stopPropagation();cancelApprovalRequest('${wo[0]}')">승인요청 취소</button>` : ''}
            ${!isPending && canDelete ? '<div class="long-press-hint">길게 누르면 삭제</div>' : ''}
          </div>
        `;
      }).join('');
    }
  }

  else if (activeTab === '새 작업') {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">📋</div>
        <div class="es-title">새 작업지시서 생성</div>
        <div class="es-desc">SOP를 선택하여 작업을 시작합니다</div>
        <button class="btn btn-pri btn-full" onclick="Router.go('wo-create')">SOP 선택하여 시작</button>
      </div>
    `;
  }

  else if (activeTab === '완료된 작업') {
    const allDone = State.workOrders.filter(r => r[8] === State.user?.email && (r[12] === '승인완료' || r[12] === '냉동보관중' || r[12] === '출하가능' || r[12] === '출하완료' || r[12]?.startsWith('거부')));

    // Date range filter
    const today = new Date();
    const weekAgo = new Date(today.getTime() - 7*86400000);
    const monthAgo = new Date(today.getTime() - 30*86400000);
    const savedRange = window._doneFilterRange || 'all';

    listEl.innerHTML = `
      <div class="row mb-12" style="gap:6px">
        <button class="btn btn-sm ${savedRange==='week'?'btn-pri':'btn-outline btn-gray'}" onclick="window._doneFilterRange='week';renderProductionContent('완료된 작업',${isAdmin})">최근 1주</button>
        <button class="btn btn-sm ${savedRange==='month'?'btn-pri':'btn-outline btn-gray'}" onclick="window._doneFilterRange='month';renderProductionContent('완료된 작업',${isAdmin})">최근 1개월</button>
        <button class="btn btn-sm ${savedRange==='all'?'btn-pri':'btn-outline btn-gray'}" onclick="window._doneFilterRange='all';renderProductionContent('완료된 작업',${isAdmin})">전체</button>
      </div>
      <div id="done-list-inner"></div>
    `;

    let filtered = allDone;
    if (savedRange === 'week') {
      filtered = allDone.filter(wo => wo[16] && new Date(wo[16]) >= weekAgo);
    } else if (savedRange === 'month') {
      filtered = allDone.filter(wo => wo[16] && new Date(wo[16]) >= monthAgo);
    }

    const innerEl = $id('done-list-inner');
    if (filtered.length === 0) {
      innerEl.innerHTML = `<div class="empty-state"><div class="es-icon">📝</div><div class="es-title">완료된 작업 없음</div><div class="es-desc">선택 기간 내 완료된 작업이 없습니다</div></div>`;
    } else {
      innerEl.innerHTML = `<div class="fs-11 c-txt-l mb-8">총 ${filtered.length}건</div>` +
        filtered.map(wo => `
          <div class="card">
            <div class="row between mb-4">
              <span class="fs-13 fw-6">${wo[4] || ''} ${wo[5] || ''}kg</span>
              <span class="badge badge-${wo[12]==='승인완료'||wo[12]==='출하가능'||wo[12]==='출하완료'?'suc':wo[12]==='냉동보관중'?'warn':'err'}">${wo[12]}</span>
            </div>
            <div class="fs-11 c-txt-l">${wo[0]} · ${(wo[16]||'').substring(0,16)}</div>
          </div>
        `).join('');
    }
  }

  else if (activeTab === '전체작업') {
    const all = State.workOrders.filter(r => r[12] !== '삭제');

    // 상태별 건수 집계
    const statusCounts = {};
    all.forEach(wo => { const s = wo[12] || '미지정'; statusCounts[s] = (statusCounts[s] || 0) + 1; });
    const statusOrder = ['진행중','승인대기','냉동보관중','출하가능','출하완료','승인완료'];
    const statusBadgeMap = { '진행중':'info','승인대기':'warn','냉동보관중':'warn','출하가능':'suc','출하완료':'suc','승인완료':'suc' };

    // 필터/정렬 상태
    const curFilter = window._allWoFilter || '전체';
    const curSort = window._allWoSort || 'desc';

    // 필터링
    let filtered = curFilter === '전체' ? all : all.filter(wo => wo[12] === curFilter);

    // 날짜 정렬 (wo[9] = 생성일시)
    filtered.sort((a, b) => {
      const da = new Date(a[9] || '2000-01-01'), db = new Date(b[9] || '2000-01-01');
      return curSort === 'desc' ? db - da : da - db;
    });

    // 요약 카드
    const summaryCards = statusOrder.filter(s => statusCounts[s]).map(s =>
      `<div style="text-align:center;padding:8px 0;min-width:60px;flex:1;border-radius:8px;background:${curFilter===s?'var(--pri)':'var(--bg)'};color:${curFilter===s?'#fff':'var(--txt)'};cursor:pointer" onclick="window._allWoFilter='${s}';renderProductionContent('전체작업',${isAdmin})">
        <div style="font-size:18px;font-weight:800">${statusCounts[s]}</div>
        <div style="font-size:10px;margin-top:2px">${s}</div>
      </div>`
    ).join('');

    listEl.innerHTML = `
      <div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:10px;padding:2px 0">
        ${summaryCards}
      </div>
      <div class="row between mb-8" style="gap:6px;align-items:center">
        <div style="display:flex;gap:4px;flex-wrap:wrap;flex:1">
          <button class="btn btn-sm ${curFilter==='전체'?'btn-pri':'btn-outline btn-gray'}" onclick="window._allWoFilter='전체';renderProductionContent('전체작업',${isAdmin})">전체 (${all.length})</button>
          ${statusOrder.filter(s => statusCounts[s]).map(s =>
            `<button class="btn btn-sm ${curFilter===s?'btn-pri':'btn-outline btn-gray'}" onclick="window._allWoFilter='${s}';renderProductionContent('전체작업',${isAdmin})">${s}</button>`
          ).join('')}
        </div>
        <button class="btn btn-sm btn-outline btn-gray" onclick="window._allWoSort=window._allWoSort==='desc'?'asc':'desc';renderProductionContent('전체작업',${isAdmin})" style="white-space:nowrap;flex-shrink:0">
          ${curSort === 'desc' ? '↓ 최신순' : '↑ 오래된순'}
        </button>
      </div>
      <div class="fs-11 c-txt-l mb-8">${curFilter !== '전체' ? curFilter + ' · ' : ''}${filtered.length}건</div>
      ${filtered.length === 0 ? `<div class="empty-state"><div class="es-icon">📝</div><div class="es-title">${curFilter} 작업 없음</div></div>` :
        filtered.map(wo => `
          <div class="card clickable" onclick="Router.go('wo-detail',{woId:'${wo[0]}'})">
            <div class="row between mb-4">
              <span class="fs-13 fw-6">${wo[4] || ''} ${wo[5] || ''}kg</span>
              <span class="badge badge-${statusBadgeMap[wo[12]]||'err'}">${wo[12]}</span>
            </div>
            <div class="fs-11 c-txt-l">${wo[0]} · ${wo[8] || ''} · ${(wo[9]||'').substring(0,10)}</div>
          </div>
        `).join('')}
    `;
  }
}

// Delete handlers
async function deleteRequest(reqId) {
  confirm('생산요청 삭제', `${reqId}을(를) 삭제하시겠습니까?`, async () => {
    try {
      showLoading();
      await SheetsAPI.updateCell('생산요청', 0, reqId, 7, '삭제');

async function submitProductionRequest() {
  if (!acquireLock('submitProdReq')) return;
  const product = $id('req-product')?.value;
  const qty = $id('req-qty')?.value;
  const unit = $id('req-unit')?.value;
  const due = $id('req-due')?.value;
  const notes = $id('req-notes')?.value;

  if (!qty || parseFloat(qty) <= 0) { toast('수량을 입력하세요', 'err'); releaseLock('submitProdReq'); return; }

  try {
    showLoading();
    const reqId = await generateSeqId('REQ', '생산요청');
    const productName = product?.includes(' ') ? product.split(' ').slice(1).join(' ') : '앙호두 (호두과자 전용반죽)';
    const productCode = product?.split(' ')[0] || 'FG002';

    await SheetsAPI.append('생산요청', [
      reqId, productCode, productName, qty, unit, formatDate(), due, '대기', State.user?.email, notes || ''
    ]);

    toast('생산요청이 등록되었습니다', 'suc');
    Router.go('production');
  } catch (e) {
    toast('등록 실패: ' + e.message, 'err');
  } finally {
    hideLoading();
    releaseLock('submitProdReq');
  }
}

Screens.inventory = async () => {

  try {
    const _warnLoad = (tab) => (e) => { console.warn(`${tab} 로드 실패:`, e); return []; };
    const [rmItems, rmLots, fgLots, spLots, rcvRecords] = await Promise.all([
      SheetsAPI.getAll('원재료품목').catch(_warnLoad('원재료품목')),
      SheetsAPI.getAll('원재료LOT').catch(_warnLoad('원재료LOT')),
      SheetsAPI.getAll('완제품LOT').catch(_warnLoad('완제품LOT')),
      SheetsAPI.getAll('소모품LOT').catch(_warnLoad('소모품LOT')),
      SheetsAPI.getAll('입고기록').catch(_warnLoad('입고기록')),
    ]);
    State.rawMaterialItems = rmItems.filter(i => i[12] !== '비활성');

async function renderInventoryContent(activeTab) {
  const tabs = ['원재료', '완제품', '소모품'];

  $id('content').innerHTML = `
    <div class="tab-filter">
      ${tabs.map(t => `<div class="tab ${activeTab === t ? 'active' : ''}" onclick="renderInventoryContent('${t}')">${t}</div>`).join('')}
    </div>
    <div style="padding:16px;position:relative" id="inv-list"></div>
  `;

  const listEl = $id('inv-list');

  if (activeTab === '원재료') {
    const items = State.rawMaterialItems || [];
    if (items.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="es-icon">📦</div><div class="es-title">원재료 품목이 없습니다</div></div>`;
    } else {
      listEl.innerHTML = items.map(item => {
        const code = item[0], name = item[1];
        const sku = item[3] || '';
        const storageTemp = item[8] || '실온';
        const reorderPoint = parseFloat(item[9]) || parseFloat(item[6]) || 0;
        const isWater = code === 'RM002';

        // Calculate remain from LOTs
        const totalRemain = isWater ? '-' :
          (State.rawMaterialLots || []).filter(l => l[1] === code && l[9] !== '폐기')
            .reduce((sum, l) => sum + (parseFloat(l[8]) || 0), 0);

        const needsOrder = !isWater && reorderPoint > 0 && totalRemain <= reorderPoint;

        // Find earliest expiry
        const lots = (State.rawMaterialLots || []).filter(l => l[1] === code && l[9] !== '폐기' && l[9] !== '소진');
        const earliestExp = lots.reduce((min, l) => {
          if (!l[7]) return min;
          return !min || l[7] < min ? l[7] : min;
        }, null);

        // Unit conversion for display — parseSkuUnit 활용 (알/판 포함)
        let stockDisp = totalRemain + 'kg', rpDisp = reorderPoint + 'kg';
        if (!isWater && sku && typeof totalRemain === 'number') {
          const skuP = parseSkuUnit(sku);
          if (skuP && skuP.perUnit > 0) {
            const stockUnits = Math.floor(totalRemain / skuP.perUnit);
            const stockRem = Math.round(totalRemain % skuP.perUnit * 10) / 10;
            stockDisp = stockRem > 0 ? stockUnits + skuP.unitName + ' ' + stockRem + 'kg' : stockUnits + skuP.unitName;
            rpDisp = Math.round(reorderPoint / skuP.perUnit) + skuP.unitName;
          }
        }

        const badgeClass = isWater ? 'gray' : needsOrder ? 'warn' : 'suc';
        const badgeText = isWater ? '-' : needsOrder ? '발주필요' : '정상';

        return `
          <div class="card ${isWater ? '' : 'clickable'}" ${isWater ? '' : `onclick="Router.go('lot-detail', {itemCode:'${code}', itemName:'${name}'})"`} ${needsOrder ? 'style="border-left:3px solid var(--warn)"' : ''}>
            <div class="row between">
              <div>
                <div class="fs-14 fw-6">
                  ${name} <span class="fs-11 c-txt-l">${code}</span>
                  ${!isWater ? '<span class="fs-10 c-info" style="margin-left:4px">▸ LOT상세</span>' : ''}
                </div>
                <div class="fs-12 c-txt-l mt-4">현재고: ${isWater ? '-' : stockDisp}</div>
                <div class="fs-11 ${needsOrder ? 'c-warn fw-6' : 'c-txt-l'}">${isWater ? '관리대상 외' : `발주점: ${rpDisp}`}</div>
                <div class="fs-11 c-txt-l">소비기한: ${earliestExp ? earliestExp.substring(0,10) : '-'} · ${storageTemp}</div>
              </div>
              <span class="badge badge-${badgeClass}">${badgeText}</span>
            </div>
          </div>
        `;
      }).join('');
    }
    listEl.innerHTML += `<div class="fab" onclick="Router.go('receive-form')">+</div>`;
  }

  else if (activeTab === '완제품') {
    // 개별 항목도 함께 로드하여 정확한 재고 카운트
    let fgIndivs = [];
    try { fgIndivs = await SheetsAPI.getAll('완제품개별').catch(() => []); } catch(e) {}
    const activeStatuses = ['냉동보관중','출하가능'];

    const fgLots = (State.finishedGoodsLots || []).filter(l => l[9] !== '폐기' && l[9] !== '소진' && l[9] !== '출하완료');
    // Group by itemCode
    const grouped = {};
    fgLots.forEach(l => {
      const code = l[1] || 'FG002';
      if (!grouped[code]) grouped[code] = { name: l[2] || '', lots: [], totalActiveIndivs: 0 };
      // 출하완료/폐기 제외한 실제 개별 수량 카운트
      const lotActiveIndivs = fgIndivs.filter(iv => iv[1] === l[0] && activeStatuses.includes(iv[3]));
      l._activeCount = lotActiveIndivs.length;
      grouped[code].lots.push(l);
      grouped[code].totalActiveIndivs += lotActiveIndivs.length;
    });

    if (Object.keys(grouped).length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="es-icon">🎁</div><div class="es-title">완제품 재고 없음</div></div>`;
    } else {
      let html = '';
      Object.entries(grouped).forEach(([code, g]) => {
        // 품목 헤더
        const freezingCount = g.lots.filter(l => (l[9]||'') === '냉동보관중').length;
        const readyCount = g.lots.filter(l => (l[9]||'') === '출하가능').length;
        html += `
          <div class="card info-box suc" style="margin-bottom:8px">
            <div class="row between">
              <div>
                <div class="fs-14 fw-7">${g.name} <span class="fs-11 c-txt-l">${code}</span></div>
                <div class="fs-12 c-txt-l mt-4">총 ${g.lots.length} LOT · ${g.totalActiveIndivs}개 · 냉동 -18°C</div>
              </div>
              <div style="text-align:right">
                ${freezingCount > 0 ? `<span class="badge badge-warn" style="display:block;margin-bottom:2px">냉동중 ${freezingCount}</span>` : ''}
                ${readyCount > 0 ? `<span class="badge badge-suc" style="display:block">출하가능 ${readyCount}</span>` : ''}
              </div>
            </div>
          </div>
        `;
        // LOT별 카드
        g.lots.forEach(l => {
          const lotId = l[0];
          const status = l[9] || '냉동보관중';
          const stColor = status === '출하가능' ? 'suc' : status === '냉동보관중' ? 'warn' : 'gray';
          const activeCount = l._activeCount || 0;
          const totalCount = parseFloat(l[10]) || parseFloat(l[3]) || 0;
          const mfgDate = (l[5] || '').substring(0,10);
          const expDate = (l[6] || '').substring(0,10);
          html += `
            <div class="card bl-${stColor} clickable" style="margin-bottom:6px" onclick="showLotIndividuals('${lotId}','${g.name}','fg')">
              <div class="lot-card-header mb-4">
                <span class="lot-id">${lotId}</span>
                <div class="lot-actions">
                  <button class="btn btn-sm btn-pri" style="padding:4px 10px;font-size:11px" onclick="event.stopPropagation();printLotLabels('${lotId}','${g.name}','fg')">🖨️ 라벨</button>
                  <span class="badge badge-${stColor}">${status}</span>
                </div>
              </div>
              <div class="fs-12 c-txt-l">재고: ${activeCount}개 / 전체 ${totalCount}개 · 제조: ${mfgDate}</div>
              <div class="fs-11 c-txt-l">소비기한: ${expDate}</div>
              ${totalCount > 0 ? `<div class="progress-bar mt-6"><div class="fill" style="width:${Math.min(100,(activeCount/totalCount)*100)}%;background:var(--${stColor})"></div></div>` : ''}
              <div id="indiv-list-${lotId.replace(/[^a-zA-Z0-9]/g,'_')}" style="display:none" class="mt-8"></div>
            </div>
          `;
        });
      });
      listEl.innerHTML = html;
    }
  }

  else if (activeTab === '소모품') {
    const spLots = State.consumableLots || [];
    const grouped = {};
    spLots.forEach(l => {
      const code = l[1] || 'SP001';
      if (!grouped[code]) grouped[code] = { name: l[2] || '', lots: [], totalRemain: 0 };
      grouped[code].lots.push(l);
      grouped[code].totalRemain += parseFloat(l[6]) || 0;
    });

    if (Object.keys(grouped).length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="es-icon">🧴</div><div class="es-title">소모품 재고 없음</div></div>`;
    } else {
      listEl.innerHTML = Object.entries(grouped).map(([code, g]) => `
        <div class="card clickable" onclick="Router.go('lot-detail', {itemCode:'${code}', itemName:'${g.name}', type:'sp'})">
          <div class="row between">
            <div>
              <div class="fs-14 fw-6">${g.name} <span class="fs-11 c-txt-l">${code}</span></div>
              <div class="fs-12 c-txt-l mt-4">현재고: ${g.totalRemain} (${g.lots.length} LOT)</div>
            </div>
            <span class="badge badge-suc">정상</span>
          </div>
        </div>
      `).join('');
    }
  }

  else if (activeTab === '입고') {
    const records = (State.receivingRecords || []).slice().reverse().slice(0, 20);
    if (records.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="es-icon">📥</div><div class="es-title">입고 내역 없음</div></div>`;
    } else {
      listEl.innerHTML = records.map(r => `
        <div class="card">
          <div class="row between mb-4">
            <span class="fs-13 fw-6">${r[4] || ''} ${r[6] || ''}${r[7] || ''}</span>
            <span class="badge badge-gray">${r[1] || ''}</span>
          </div>
          <div class="fs-11 c-txt-l">${r[0] || ''} · ${r[5] || ''} · ${(r[8]||'').substring(0,10)}</div>
        </div>
      `).join('');
    }
    listEl.innerHTML += `<div class="fab" onclick="Router.go('receive-form')">+</div>`;
  }
}

// ─── LOT DETAIL ───
Screens['lot-detail'] = async (params = {}) => {
  const { itemCode, itemName, type } = params;
  renderHeader('LOT 상세', `${itemCode || ''} ${itemName || ''}`, { back: 'inventory' });

  const isFG = type === 'fg';
  const isSP = type === 'sp';
  const lotTab = isFG ? '완제품LOT' : isSP ? '소모품LOT' : '원재료LOT';
  const indivTab = isFG ? '완제품개별' : isSP ? '소모품개별' : '원재료개별';

  let lots = [], indivs = [], rmSku = '';
  try {
    lots = (await SheetsAPI.getAll(lotTab).catch(() => [])).filter(l => l[1] === itemCode);
    indivs = await SheetsAPI.getAll(indivTab).catch(() => []);
    if (!isFG && !isSP) {
      const item = State.rawMaterialItems?.find(i => i[0] === itemCode);
      rmSku = item?.[3] || '';
    }
  } catch (e) { console.warn(e); }

  // 완제품: 출하완료 제외한 실제 재고 카운트
  let totalRemain;
  if (isFG) {
    const activeStatuses = ['냉동보관중','출하가능'];
    totalRemain = indivs.filter(iv => lots.some(l => l[0] === iv[1]) && activeStatuses.includes(iv[3])).length;
  } else {
    totalRemain = lots.reduce((sum, l) => sum + (parseFloat(l[8]) || 0), 0);
  }
  const rmItem = !isFG && !isSP ? State.rawMaterialItems?.find(i => i[0] === itemCode) : null;
  const lotReorderPoint = parseFloat(rmItem?.[9]) || parseFloat(rmItem?.[6]) || 0;
  const needsOrder = lotReorderPoint > 0 && totalRemain <= lotReorderPoint;

  // Unit conversion for display — parseSkuUnit 활용 (알/판 포함)
  let lotStockDisp = totalRemain + (isFG ? '개' : 'kg'), lotRpDisp = lotReorderPoint + 'kg';
  if (!isFG && !isSP && rmSku) {
    const skuP2 = parseSkuUnit(rmSku);
    if (skuP2 && skuP2.perUnit > 0) {
      const su2 = Math.floor(totalRemain / skuP2.perUnit), sr2 = Math.round(totalRemain % skuP2.perUnit * 10) / 10;
      lotStockDisp = sr2 > 0 ? su2 + skuP2.unitName + ' ' + sr2 + 'kg' : su2 + skuP2.unitName;
      if (lotReorderPoint > 0) lotRpDisp = Math.round(lotReorderPoint / skuP2.perUnit) + skuP2.unitName;
    }
  }

  // 완제품: 출하완료 LOT 제외
  const displayLots = isFG ? lots.filter(l => l[9] !== '출하완료' && l[9] !== '폐기' && l[9] !== '소진') : lots;

  const lotBadgeClass = needsOrder ? 'warn' : 'suc';
  const lotBadgeText = needsOrder ? '발주필요' : '정상';
  const lotBoxClass = needsOrder ? 'warn' : 'suc';

  $id('content').innerHTML = `
    <div style="padding:16px">
      <div class="card info-box ${lotBoxClass}">
        <div class="row between">
          <div>
            <div class="fs-16 fw-7">${itemName}</div>
            <div class="fs-12 c-txt-l">${itemCode} · 현재고 ${lotStockDisp}${!isFG && !isSP && lotReorderPoint > 0 ? ` · 발주점 ${lotRpDisp}` : ''}</div>
          </div>
          ${!isFG && !isSP ? `<span class="badge badge-${lotBadgeClass}">${lotBadgeText}</span>` : ''}
        </div>
      </div>

      <div class="fs-13 fw-7 mb-8">LOT 목록 <span class="fs-11 c-txt-l">${isFG ? '(클릭하여 개별 항목 확인/출하)' : '(미사용/사용중만 인쇄 가능)'}</span></div>
      ${displayLots.length === 0 ? '<div class="fs-12 c-txt-l">LOT 없음</div>' : displayLots.map(l => {
        const status = isFG ? (l[9] || '냉동보관중') : (l[9] || '미사용');
        const lotIndivs = indivs.filter(iv => iv[1] === l[0]);

        if (isFG) {
          // 완제품 LOT: 개별 기반 카운트
          const activeStatuses = ['냉동보관중','출하가능'];
          const activeIndivs = lotIndivs.filter(iv => activeStatuses.includes(iv[3]));
          const totalIndivs = lotIndivs.length;
          const stColor = status === '출하가능' ? 'suc' : status === '냉동보관중' ? 'warn' : 'gray';
          const canPrint = activeIndivs.length > 0;
          return `
            <div class="card bl-${stColor}" style="cursor:pointer" onclick="showLotIndividuals('${l[0]}','${itemName}','fg')">
              <div class="lot-card-header mb-4">
                <span class="lot-id">${l[0]}</span>
                <div class="lot-actions">
                  ${canPrint ? `<button class="btn btn-sm btn-pri" style="padding:4px 10px;font-size:11px" onclick="event.stopPropagation();printLotLabels('${l[0]}','${itemName}','fg')">🖨️ 전체 ${activeIndivs.length}매</button>` : ''}
                  <span class="badge badge-${stColor}">${status}</span>
                </div>
              </div>
              <div class="fs-12 c-txt-l">재고: ${activeIndivs.length}개 / 전체 ${totalIndivs}개 · 제조: ${(l[5]||'').substring(0,10)}</div>
              <div class="fs-11 c-txt-l">소비기한: ${(l[6]||'').substring(0,10)}</div>
              ${totalIndivs > 0 ? `<div class="progress-bar mt-8"><div class="fill" style="width:${Math.min(100,(activeIndivs.length/totalIndivs)*100)}%;background:var(--${stColor})"></div></div>` : ''}
              <div id="indiv-list-${l[0].replace(/[^a-zA-Z0-9]/g,'_')}" style="display:none" class="mt-8"></div>
            </div>
          `;
        }

        // 원재료/소모품 LOT (기존 로직)
        const remain = parseFloat(l[8]) || 0;
        const qty = parseFloat(l[4]) || 1;
        const stColor = status === '미사용' ? 'suc' : status === '사용중' ? 'info' : 'gray';
        const canPrint = ['미사용','사용중'].includes(status);
        const printableIndivs = lotIndivs.filter(iv => ['미사용','사용중'].includes(iv[3]));
        // SKU 단위 변환 for LOT display — unit이 이미 비-kg 단위이면 이중 변환 방지
        const lotUnit = (l[5]||'kg').trim();
        let lotQtyDisp = qty + lotUnit, lotRemDisp = remain + lotUnit;
        if (!isSP && rmSku && lotUnit === 'kg') {
          const skuP = parseSkuUnit(rmSku);
          if (skuP && skuP.perUnit > 0) {
            const qU = Math.floor(qty / skuP.perUnit), qR = Math.round(qty % skuP.perUnit * 10) / 10;
            lotQtyDisp = qR > 0 ? qU + skuP.unitName + ' ' + qR + 'kg' : qU + skuP.unitName;
            const rU = Math.floor(remain / skuP.perUnit), rR = Math.round(remain % skuP.perUnit * 10) / 10;

          }
        }
        return `

  const indivGroup = $id('rcv-indiv-group');
